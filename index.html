      if (mapelName === 'WALI KELAS') return { type: 'wali', keys: [] };

      if (!special) {
         const normHeaders = schemasObj["NORMAL"].headers;
         return { type: 'normal', keys: normHeaders, headers: normHeaders };
      }
      
      const keys = ['penguji'];
      special.categories.forEach((cat, cIdx) => {
        cat.items.forEach((item, iIdx) => {
          keys.push(`${cIdx}_${iIdx}_UH`); keys.push(`${cIdx}_${iIdx}_STS`); keys.push(`${cIdx}_${iIdx}_SAT`);
        });
      });
      return { type: 'special', keys, schema: special };

      if (!show) return null;
      let desc = `Beneran mau menghapus ${targetName}? Nanti kalau kangen gimana?`;

      return (
        <div className="fixed inset-0 z-[99999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">

                <div className="bg-indigo-50/80 p-4 rounded-xl mb-5 shadow-inner border border-indigo-100 max-h-48 overflow-y-auto">

    // =========================================================================
    // --- 4. KOMPONEN INDUK APLIKASI ---
    // =========================================================================
    function App() {
      const [masterData, setMasterData] = useState(DEFAULT_MASTER_DATA);
      const [currentUser, setCurrentUser] = useState(null);
      const [activeAssignment, setActiveAssignment] = useState(null);
      const [popup, setPopup] = useState({ show: false, type: 'success', index: 0 });
      const [kocakPopup, setKocakPopup] = useState({ show: false, message: '', isSAS: true });
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [isLoading, setIsLoading] = useState(true);

      // PWA Install & Update States
      const [installPromptEvent, setInstallPromptEvent] = useState(null);
      const [showInstallPopup, setShowInstallPopup] = useState(false);
      const [showUpdatePopup, setShowUpdatePopup] = useState(false);

      // INJEKSI MANIFEST & SERVICE WORKER UNTUK PWA
      useEffect(() => {
         const iconSvg = encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='#4f46e5'><path d='M22 10v6M2 10l10-5 10 5-10 5z'/><path d='M6 12v5c3 3 9 3 12 0v-5'/></svg>`);
         const manifest = {
            name: "ASTAGA - Asisten Guru",
            short_name: "ASTAGA",
            start_url: window.location.href,
            display: "standalone",
            background_color: "#f8fafc",
            theme_color: "#4f46e5",
            icons: [
               { src: `data:image/svg+xml;charset=utf-8,${iconSvg}`, sizes: "192x192", type: "image/svg+xml" },
               { src: `data:image/svg+xml;charset=utf-8,${iconSvg}`, sizes: "512x512", type: "image/svg+xml" }
            ]
         };
         
         const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
         const manifestURL = URL.createObjectURL(blob);
         let link = document.querySelector('link[rel="manifest"]');
         if (!link) {
            link = document.createElement('link');
            link.rel = 'manifest';
            document.head.appendChild(link);
         }
         link.href = manifestURL;

         // Dummy Service Worker
         const swCode = `self.addEventListener('fetch', function(e) {});`;
         const swBlob = new Blob([swCode], {type: 'application/javascript'});
         const swUrl = URL.createObjectURL(swBlob);
         if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swUrl).catch(()=>{});
         }

         // PWA Install Event
         const handleBeforeInstall = (e) => {
            e.preventDefault();
            setInstallPromptEvent(e);
            setTimeout(() => setShowInstallPopup(true), 2500); // Tunda dikit
         };
         window.addEventListener('beforeinstallprompt', handleBeforeInstall);

         // Version Check
         const savedVer = localStorage.getItem('astaga_version');
         if (savedVer !== APP_VERSION) {
            setShowUpdatePopup(true);
            localStorage.setItem('astaga_version', APP_VERSION);
         }

         return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstall);
      }, []);

      const executeInstall = async () => {
         if (installPromptEvent) {
            installPromptEvent.prompt();
            const { outcome } = await installPromptEvent.userChoice;
            if (outcome === 'accepted') {
                showToast("Makasih bosku udah install! 🎉", "success");
            } else {
                showToast("Yah dibatalin... reload halaman ya kalau mau install lagi!", "error");
            }
            setInstallPromptEvent(null);
            setShowInstallPopup(false);
         }
      };

      const fetchCloudMasterData = async (silent = false) => {
        if (!silent) setIsLoading(true);
        try {
          const response = await fetch(SCRIPT_URL);
          const data = await response.json();
          setMasterData(data);
        } catch (err) {
          showToast("Gagal memuat data dari server.", "error");
        } finally {
          if (!silent) setIsLoading(false);
        }
      };

      useEffect(() => { fetchCloudMasterData(); }, []);

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
      };

      const currentSchemas = useMemo(() => {
         if (masterData.students?.["__SCHEMA__"]) {
            try { return JSON.parse(masterData.students["__SCHEMA__"][0].name); } catch(e){}
         }
         return DEFAULT_SCHEMAS;
      }, [masterData.students]);

      if (isLoading) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
            <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-3"></div>
            <p className="text-[11px] text-slate-500 font-bold tracking-widest uppercase animate-pulse">Menghubungkan ke Cloud ASTAGA...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen max-h-screen h-screen bg-slate-50 flex flex-col overflow-hidden text-xs">
          {!currentUser ? (
            <LoginScreen masterData={masterData} onLogin={(user, assignment) => { setCurrentUser(user); setActiveAssignment(assignment); if(user !== 'ADMIN') setPopup({ show: true, type: 'success', index: Math.floor(Math.random() * 10) }); }} onLoginFail={() => setPopup({ show: true, type: 'error', index: Math.floor(Math.random() * 10) })} />
          ) : currentUser === 'ADMIN' ? (
            <AdminDashboard masterData={masterData} setMasterData={setMasterData} schemas={currentSchemas} onLogout={() => setCurrentUser(null)} showToast={showToast} toast={toast} onRefreshData={() => fetchCloudMasterData(true)} />
          ) : (
            <Dashboard user={currentUser} activeAssignment={activeAssignment} masterData={masterData} schemas={currentSchemas} onLogout={() => setCurrentUser(null)} showToast={showToast} toast={toast} onUpdateSuccess={(silent) => fetchCloudMasterData(silent)} setActiveAssignment={setActiveAssignment} triggerKocakPopup={(msg, isSAS) => setKocakPopup({show: true, message: msg, isSAS})} />
          )}
          
          <FunnyPopup show={popup.show} type={popup.type} msgIndex={popup.index} onClose={() => setPopup({ ...popup, show: false })} />
          <FunnyKocakPopup show={kocakPopup.show} message={kocakPopup.message} isSAS={kocakPopup.isSAS} onClose={() => setKocakPopup({ show: false, message: '', isSAS: true })} />
          <UpdatePopup show={showUpdatePopup} onClose={() => setShowUpdatePopup(false)} />
          <InstallPromptPopup show={showInstallPopup} onInstall={executeInstall} />

          {toast.show && (
            <div className="fixed bottom-4 right-4 z-[99999] animate-in slide-in-from-bottom-2">
              <div className={`rounded-xl shadow-lg px-4 py-2.5 flex items-center space-x-2 text-white font-bold text-xs ${toast.type === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`}>
                {toast.type === 'success' ? <IconCheckCircle className="w-4 h-4" /> : <IconAlertCircle className="w-4 h-4" />}
                <span>{toast.message}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // =========================================================================
    // --- 5. KOMPONEN LAYAR LOGIN ---
    // =========================================================================
    function LoginScreen({ masterData, onLogin, onLoginFail }) {
      const [mode, setMode] = useState('guru'); 
      const [selectedGuru, setSelectedGuru] = useState('');
      const [selectedAssign, setSelectedAssign] = useState('');
      const [password, setPassword] = useState('');
      const [adminPass, setAdminPass] = useState('');

      const sortedTeachersForLogin = useMemo(() => {
        return [...(masterData.teachers || [])].sort((a, b) => a.name.localeCompare(b.name));
      }, [masterData.teachers]);

      const guruObj = masterData.teachers?.find(t => t.name === selectedGuru);

      const handleLogin = (e) => {
        e.preventDefault();
        if (mode === 'admin') {
          if (adminPass === getAdminPassword(masterData)) onLogin('ADMIN', null); else onLoginFail();
        } else {
          if (guruObj && guruObj.password === password && selectedAssign) {
            if (selectedAssign.startsWith('WALI|')) {
              onLogin(guruObj, { type: 'WALI', classId: selectedAssign.split('|')[1], mapel: 'WALI KELAS' });
            } else {
              const [kelas, mapel] = selectedAssign.split('|');
              onLogin(guruObj, { classId: kelas, mapel: mapel });
            }
          } else onLoginFail();
        }
      };

      return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-3 font-sans bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] w-full">
          <div className="max-w-sm w-full bg-white rounded-[24px] shadow-xl border border-slate-200 relative animate-in fade-in duration-300 hover:shadow-2xl transition-all">
            <div className={`p-6 text-center transition-colors duration-500 ${mode === 'admin' ? 'bg-slate-900' : 'bg-indigo-600'}`}>
              <div className="bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 backdrop-blur-md shadow-inner">
                {mode === 'admin' ? <IconSettings className="text-white w-7 h-7 animate-[spin_4s_linear_infinite]" /> : <IconGraduationCap className="text-white w-7 h-7" />}
              </div>
              <h1 className="text-2xl font-black text-white tracking-widest leading-none animate-pulse">ASTAGA</h1>
              <p className="text-white/80 text-[10px] font-semibold uppercase tracking-wider mt-1">{mode === 'admin' ? 'Ruang Kendali Admin' : 'Asisten Sistem Terpadu Guru Al Kautsar'}</p>
            </div>
            
            <div className="p-6">
              <form onSubmit={handleLogin} className="space-y-4">
                {mode === 'guru' && (
                  <React.Fragment>
                    <div>
                      <label className="block text-[11px] font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Pilih Nama Guru</label>
                      <div className="relative hover:scale-[1.02] active:scale-95 transition-all duration-300">
                        <IconUser className="absolute left-3 top-2.5 h-4 w-4 text-slate-400 pointer-events-none" />
                        <select className="pl-9 w-full rounded-xl border border-slate-200 py-2.5 px-3 text-xs text-slate-800 font-bold bg-slate-50 focus:outline-none focus:border-indigo-500 cursor-pointer" value={selectedGuru} onChange={(e) => { setSelectedGuru(e.target.value); setSelectedAssign(''); }} required>
                          <option value="" className="text-slate-400">-- Klik untuk memilih --</option>
                          {sortedTeachersForLogin.map((t, i) => <option key={i} value={t.name}>{t.name}</option>)}
                        </select>
                      </div>
                    </div>
                    {guruObj && (
                      <div className="animate-in fade-in slide-in-from-top-2">
                        <label className="block text-[11px] font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Pilih Kelas & Mata Pelajaran</label>
                        <div className="relative hover:scale-[1.02] active:scale-95 transition-all duration-300">
                          <IconBookOpen className="absolute left-3 top-2.5 h-4 w-4 text-slate-400 pointer-events-none" />
                          <select className="pl-9 w-full rounded-xl border border-slate-200 py-2.5 px-3 text-xs text-slate-800 focus:outline-none focus:border-indigo-500 font-bold appearance-none cursor-pointer bg-slate-50 hover:bg-indigo-50 transition-colors" value={selectedAssign} onChange={(e) => setSelectedAssign(e.target.value)} required>
                            <option value="">-- Pilih Kelas --</option>

                              return <option key={i} value={`${a.classId}|${a.mapel}`}>Kelas {a.classId} - {a.mapel}</option>;
                            })}

                )}
                <div>
                  <label className="block text-[11px] font-bold text-slate-600 mb-1.5 uppercase tracking-wider">{mode==='admin' ? 'Akses Admin' : 'Password / PIN'}</label>

                    <input type="password" placeholder="Masukkan password" value={mode==='admin'?adminPass:password} onChange={(e) => mode==='admin'?setAdminPass(e.target.value):setPassword(e.target.value)} className={`pl-9 w-full rounded-xl border-2 py-2.5 px-3 text-xs text-slate-800 font-bold bg-slate-50 focus:outline-none ${mode==='admin'?'border-slate-300 focus:border-slate-800':'border-slate-200 focus:border-indigo-500'}`} required />

            <div className="bg-slate-50 border-t border-slate-200 p-4 text-center">
              <button onClick={() => { setMode(mode === 'guru' ? 'admin' : 'guru'); setPassword(''); setAdminPass(''); }} className="text-[11px] font-extrabold text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-wider">

    // =========================================================================
    // --- 6. KOMPONEN PANEL ADMIN UTAMA ---
    // =========================================================================
    function AdminDashboard({ masterData, setMasterData, schemas, onLogout, showToast, toast, onRefreshData }) {
      const [activeTab, setActiveTab] = useState('overview'); 
      const [selectedSemester, setSelectedSemester] = useState('S');
      const [isSyncing, setIsSyncing] = useState(false);
      const [expandedGuru, setExpandedGuru] = useState({});
      const [showResetConfirm, setShowResetConfirm] = useState(false);

      const totalGuru = masterData.teachers?.length || 0;
      const totalSiswa = Object.values(masterData.students || {}).flat().length - ((masterData.students || {})["__MAPELS__"] ? masterData.students["__MAPELS__"].length : 0) - ((masterData.students || {})["__SCHEMA__"] ? 1 : 0) - ((masterData.students || {})["__ADMIN__"] ? 1 : 0);
      const totalKelas = Object.keys(masterData.students || {}).filter(k => k !== "__MAPELS__" && k !== "__SCHEMA__" && k !== "__ADMIN__").length;
      
      const trackingData = useMemo(() => {
        let totalCellsExpected = 0, totalCellsFilled = 0;
        const list = (masterData.teachers || []).flatMap(t => 
          t.assignments.filter(a => a.type !== 'WALI').map(a => {
            const sheetName = `${a.classId}-${selectedSemester}`;
            const key = `${sheetName}|${a.mapel}|${t.name}`;
            const sum = masterData.gradesSummary?.[key] || { uhCount: 0, uhTotal: 0, stsCount: 0, stsTotal: 0, sasCount: 0, sasTotal: 0 };
            const expected = sum.uhTotal + sum.stsTotal + sum.sasTotal;
            const filled = sum.uhCount + sum.stsCount + sum.sasCount;
            totalCellsExpected += expected; totalCellsFilled += filled;
            const progress = expected === 0 ? 0 : Math.round((filled / expected) * 100);
            return { guru: t.name, kelas: a.classId, mapel: a.mapel, progress, completed: progress===100 };
          })
        );
        const globalProgress = totalCellsExpected === 0 ? 0 : Math.round((totalCellsFilled / totalCellsExpected) * 100);
        return { list, globalProgress };
      }, [masterData, selectedSemester]);

      const teachersProgress = useMemo(() => {
        const map = {};
        (masterData.teachers || []).forEach(t => map[t.name] = { name: t.name, total: 0, completed: 0, assignments: [] });
        trackingData.list.forEach(item => {
          if (!map[item.guru]) map[item.guru] = { name: item.guru, total: 0, completed: 0, assignments: [] };
          map[item.guru].assignments.push(item);
          map[item.guru].total++;
          if (item.completed) map[item.guru].completed++;
        });
        return Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
      }, [masterData, trackingData]);

      const downloadTemplateGuru = () => {
        const header = ["No", "Nama Guru", "Password", "Wali Kelas", "Mapel 1", "Kelas Mapel 1 (Pisahkan dgn koma)", "Mapel 2", "Kelas Mapel 2", "Mapel 3", "Kelas Mapel 3", "Mapel 4", "Kelas Mapel 4", "Mapel 5", "Kelas Mapel 5"];
        const ws = window.XLSX.utils.aoa_to_sheet([header, [1, "Pak Budi", "123", "", "MATEMATIKA", "10A, 10B", "", "", "", "", "", "", "", ""]]);
        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, "MasterGuru"); window.XLSX.writeFile(wb, "Template_Master_Guru.xlsx");
      };

      const downloadTemplateSiswa = () => {
        const header = ["Kelas", "No Presensi", "Nama Siswa"];
        const ws = window.XLSX.utils.aoa_to_sheet([header, ["10A", "1", "Agus Contoh"]]);
        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, "MasterSiswa"); window.XLSX.writeFile(wb, "Template_Master_Siswa.xlsx");
      };

      const syncToCloud = async (action, payloadKey, payloadData, successMsg) => {
        setIsSyncing(true);
        try {
          await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, [payloadKey]: payloadData }) });
          showToast(successMsg, "success");
        } catch (err) { showToast("Koneksi gagal, tidak tersimpan ke server.", "error"); } finally { setIsSyncing(false); }
      };

      const handleResetGrades = async () => {
        setShowResetConfirm(false); setIsSyncing(true);
        try {
          await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "resetGrades" }) });
          showToast("Berhasil! Semua rekap nilai di-reset.", "success"); onRefreshData();
        } catch (err) { showToast("Gagal reset. Cek koneksi!", "error"); } finally { setIsSyncing(false); }
      };

      const handleUploadGuru = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result); const workbook = window.XLSX.read(data, {type: 'array'});
            if (!workbook.SheetNames.length) { showToast("File Excel kosong!", "error"); return; }
            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
            const teachersMap = {};
            rows.slice(1).forEach(parts => {
              if(parts.length > 2 && parts[1]) {
                const nama = parts[1].toString().trim(); const pass = parts[2] !== "" ? String(parts[2]).trim() : "123";
                const wali = parts[3] ? String(parts[3]).trim().toUpperCase() : "";
                if(nama) {
                  if(!teachersMap[nama]) {
                     const assigns = [];
                     if (wali) assigns.push({ type: 'WALI', classId: wali, mapel: 'WALI KELAS' });
                     teachersMap[nama] = { name: nama, password: pass, assignments: assigns };
                  }
                  for(let i = 0; i < 5; i++) {
                    const mIdx = 4 + (i * 2); const kIdx = 5 + (i * 2);
                    if (parts[mIdx] !== undefined && parts[kIdx] !== undefined) {
                       const mName = parts[mIdx].toString().trim();
                       const kArr = String(parts[kIdx]).split(',').map(k => k.trim()).filter(k => k);
                       if (mName && kArr.length > 0) {
                         kArr.forEach(k => { if(!teachersMap[nama].assignments.find(a => a.classId === k && a.mapel === mName)) teachersMap[nama].assignments.push({ classId: k, mapel: mName }); });
                       }
                    }
                  }
                }
              }
            });
            const newTeachers = Object.values(teachersMap).filter(t => t.assignments.length > 0);
            if(newTeachers.length > 0) { setMasterData(p => ({ ...p, teachers: newTeachers })); syncToCloud("saveMasterGuru", "teachers", newTeachers, "Data Guru tersimpan ke Cloud!"); } 
            else showToast(`Format Excel salah!`, 'error');
          } catch(err) { showToast(`Gagal baca Excel Guru.`, 'error'); }
        }; reader.readAsArrayBuffer(file); e.target.value = ''; 
      };

      const handleUploadSiswa = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result); const workbook = window.XLSX.read(data, {type: 'array'});
            if (!workbook.SheetNames.length) { showToast("File Excel kosong!", "error"); return; }
            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
            const studentsMap = { ...masterData.students }; 
            for (let k in studentsMap) { if (k !== "__MAPELS__" && k !== "__SCHEMA__" && k !== "__ADMIN__") delete studentsMap[k]; }
            rows.slice(1).forEach((parts, idx) => {
              if(parts.length >= 3 && parts[0]) {
                const kelas = String(parts[0]).trim().toUpperCase(); const idSiswa = parts[1] !== "" ? String(parts[1]).trim() : String(idx + 1); const namaSiswa = parts[2].toString().trim();
                if(kelas && namaSiswa) { if(!studentsMap[kelas]) studentsMap[kelas] = []; studentsMap[kelas].push({ id: idSiswa, name: namaSiswa }); }
              }
            });
            if(Object.keys(studentsMap).length > 0) { setMasterData(p => ({ ...p, students: studentsMap })); syncToCloud("saveMasterSiswa", "students", studentsMap, "Data Siswa tersimpan ke Cloud!"); } 
            else showToast(`Format Excel salah!`, 'error');
          } catch(err) { showToast(`Gagal baca Excel Siswa.`, 'error'); }
        }; reader.readAsArrayBuffer(file); e.target.value = ''; 
      };

      return (
        <div className="h-screen max-h-screen flex flex-col font-sans text-xs overflow-hidden bg-slate-50">

              <div className="bg-indigo-500 p-1 rounded-lg"><IconSettings className="w-4 h-4 text-white" /></div>
              <h1 className="font-extrabold text-[13px] tracking-widest flex items-center gap-1.5">ASTAGA <span className="bg-indigo-700 px-1.5 py-0.5 rounded text-[8px]">ADMIN</span></h1>
            </div>
            <div className="flex space-x-1 border border-slate-700 bg-slate-800 rounded-lg p-0.5 shadow-inner">

              <button onClick={() => setActiveTab('database')} className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase transition-all hover:scale-[1.03] ${activeTab === 'database' ? 'bg-indigo-500 shadow' : 'text-slate-400 hover:text-white'}`}>Database</button>
              <button onClick={() => setActiveTab('settings')} className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase transition-all hover:scale-[1.03] ${activeTab === 'settings' ? 'bg-indigo-500 shadow' : 'text-slate-400 hover:text-white'}`}>Setting</button>
            </div>
            <button onClick={onLogout} className="text-slate-400 hover:text-rose-400 p-1.5 rounded-lg transition-all hover:scale-[1.03] hover:bg-slate-800"><IconLogOut className="w-4 h-4" /></button>
          </header>

          <main className="flex-1 overflow-y-auto scrollbar-hide p-3 sm:p-4 pb-10 max-w-5xl mx-auto w-full">
            {isSyncing && <div className="bg-indigo-50 text-indigo-700 px-3 py-2 rounded-xl flex justify-center space-x-2 font-bold animate-pulse mb-3"><div className="w-3.5 h-3.5 border-2 border-indigo-700 border-t-transparent rounded-full animate-spin"></div><span>Menyelaraskan Data...</span></div>}

            {activeTab === 'overview' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="flex bg-slate-200/70 p-1 rounded-xl w-full max-w-sm mx-auto mb-4">
                   <button onClick={() => setSelectedSemester('S')} className={`flex-1 py-2 text-[11px] font-black uppercase rounded-lg transition-all ${selectedSemester === 'S' ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500 hover:text-slate-700'}`}>Semester 1 (SAS)</button>
                   <button onClick={() => setSelectedSemester('T')} className={`flex-1 py-2 text-[11px] font-black uppercase rounded-lg transition-all ${selectedSemester === 'T' ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500 hover:text-slate-700'}`}>Semester 2 (SAT)</button>
                </div>

                <div className="grid grid-cols-2 md:grid-cols-4 gap-2.5">
                  <div className="bg-gradient-to-br from-sky-100 to-sky-50 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5"><IconUsers className="w-6 h-6 text-sky-600 p-1 bg-white rounded-lg shadow-inner" /><div><p className="text-[9px] text-sky-700 font-bold uppercase">Guru Aktif</p><h3 className="text-sm font-black text-slate-800">{totalGuru}</h3></div></div>
                  <div className="bg-gradient-to-br from-emerald-100 to-emerald-50 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5"><IconGraduationCap className="w-6 h-6 text-emerald-600 p-1 bg-white rounded-lg shadow-inner" /><div><p className="text-[9px] text-emerald-700 font-bold uppercase">Siswa</p><h3 className="text-sm font-black text-slate-800">{totalSiswa}</h3></div></div>
                  <div className="bg-gradient-to-br from-amber-100 to-amber-50 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5"><IconBookOpen className="w-6 h-6 text-amber-600 p-1 bg-white rounded-lg shadow-inner" /><div><p className="text-[9px] text-amber-700 font-bold uppercase">Kelas</p><h3 className="text-sm font-black text-slate-800">{totalKelas}</h3></div></div>
                  <div className="bg-gradient-to-br from-indigo-100 to-indigo-50 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5 relative overflow-hidden"><IconActivity className="w-6 h-6 text-indigo-600 p-1 bg-white rounded-lg shadow-inner z-10" /><div className="z-10"><p className="text-[9px] text-indigo-700 font-bold uppercase">Global {selectedSemester === 'S' ? '(SAS)' : '(SAT)'}</p><h3 className="text-sm font-black text-indigo-800">{trackingData.globalProgress}%</h3></div><div className="absolute bottom-0 left-0 h-1 bg-indigo-400" style={{width: `${trackingData.globalProgress}%`}}></div></div>
                </div>

                <div className="space-y-2">
                  <div className="pb-1.5 flex justify-between items-center">
                    <div><h2 className="text-xs font-black text-slate-800 uppercase">Progres Per Guru</h2></div>
                    <button onClick={onRefreshData} className="bg-white border text-slate-600 font-bold px-2.5 py-1.5 rounded-lg shadow-sm flex items-center gap-1 text-[10px]"><IconRefresh className="w-3.5 h-3.5" /> Sync</button>
                  </div>

                  {teachersProgress.map((g, idx) => {
                    const pct = g.total === 0 ? 0 : Math.round((g.completed / g.total) * 100);
                    const isExpanded = !!expandedGuru[g.name];
                    return (
                      <div key={idx} className={`rounded-xl border overflow-hidden shadow-sm hover:scale-[1.01] transition-all ${TEACHER_CARD_COLORS[idx%TEACHER_CARD_COLORS.length]}`}>
                        <div onClick={() => setExpandedGuru(p => ({...p, [g.name]: !p[g.name]}))} className="p-3 flex items-center justify-between cursor-pointer hover:bg-white/40">
                          <div className="flex items-center space-x-3">
                            <div className={`w-9 h-9 rounded-xl border flex items-center justify-center font-bold text-base shadow-sm ${AVATAR_COLORS[idx%AVATAR_COLORS.length]}`}>{g.name.charAt(0)}</div>
                            <div><h3 className="font-extrabold text-slate-800 text-xs">{g.name}</h3><p className="text-[9px] text-slate-500 font-bold uppercase">Mengajar {g.total} Mapel</p></div>
                          </div>
                          <div className="flex items-center gap-3">
                            <div className="text-right hidden sm:block"><span className="text-[9px] font-extrabold text-slate-400 block uppercase">Status</span><p className="text-[10px] font-black text-slate-700">{g.completed}/{g.total} Selesai</p></div>
                            <span className={`px-2 py-0.5 rounded-lg text-[10px] font-black border shadow-sm ${pct===100?'bg-emerald-50 text-emerald-800 border-emerald-300':pct>0?'bg-amber-50 text-amber-800 border-amber-300 animate-pulse':'bg-slate-50 text-slate-400'}`}>{pct}%</span>
                          </div>
                        </div>
                        {isExpanded && (
                          <div className="border-t border-slate-200/50 bg-white/40 p-3">
                            {g.assignments.length === 0 ? <p className="text-[10px] text-center text-slate-400">Belum ada tugas.</p> : (
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                {g.assignments.map((a, i) => (
                                  <div key={i} className="bg-white/80 p-2 rounded-lg border border-slate-200/60 flex items-center justify-between shadow-sm">
                                    <div><p className="font-extrabold text-slate-800 text-[11px]">{a.mapel}</p><span className="inline-block mt-0.5 bg-slate-100 text-slate-600 font-bold px-1.5 py-0.5 rounded text-[9px]">Kls {a.classId}</span></div>
                                    <span className={`px-2 py-0.5 rounded text-[9px] font-extrabold border ${a.progress===100?'bg-teal-100 text-teal-800 border-teal-300':a.progress>0?'bg-amber-100 text-amber-800 border-amber-300 animate-pulse':'bg-slate-50 text-slate-400'}`}>{a.progress}% DONE</span>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {activeTab === 'database' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in">
                <div className="bg-gradient-to-br from-indigo-50/60 to-indigo-50/10 rounded-2xl shadow-sm border border-indigo-200 flex flex-col p-5">
                  <div className="flex justify-between items-start mb-4">
                    <div className="flex items-center gap-2"><IconUser className="w-5 h-5 text-indigo-500 bg-white p-1 rounded-lg shadow-inner"/><h2 className="text-sm font-black text-slate-800">Master Guru</h2></div>
                    <button onClick={downloadTemplateGuru} className="bg-white border text-indigo-600 font-bold px-2 py-1 rounded text-[9px]">Template</button>
                  </div>
                  <div className="border-2 border-dashed border-indigo-300 rounded-xl p-4 text-center bg-white/80 cursor-pointer group hover:bg-white" onClick={e=>{if(e.target.tagName!=='INPUT') e.currentTarget.querySelector('input').click()}}>
                    <IconFileText className="w-7 h-7 text-indigo-400 mx-auto mb-1 group-hover:text-indigo-600" />
                    <span className="text-[10px] font-extrabold text-slate-600 group-hover:text-indigo-800">Klik & Pilih Excel Guru</span>
                    <input type="file" accept=".xls,.xlsx,.csv" className="hidden" onChange={handleUploadGuru} />
                  </div>
                </div>
                
                <div className="bg-gradient-to-br from-emerald-50/60 to-emerald-50/10 rounded-2xl shadow-sm border border-emerald-200 flex flex-col p-5">
                  <div className="flex justify-between items-start mb-4">
                    <div className="flex items-center gap-2"><IconGraduationCap className="w-5 h-5 text-emerald-500 bg-white p-1 rounded-lg shadow-inner"/><h2 className="text-sm font-black text-slate-800">Master Siswa</h2></div>
                    <button onClick={downloadTemplateSiswa} className="bg-white border text-emerald-600 font-bold px-2 py-1 rounded text-[9px]">Template</button>
                  </div>
                  <div className="border-2 border-dashed border-emerald-300 rounded-xl p-4 text-center bg-white/80 cursor-pointer group hover:bg-white" onClick={e=>{if(e.target.tagName!=='INPUT') e.currentTarget.querySelector('input').click()}}>
                    <IconFileText className="w-7 h-7 text-emerald-400 mx-auto mb-1 group-hover:text-emerald-600" />
                    <span className="text-[10px] font-extrabold text-slate-600 group-hover:text-emerald-800">Klik & Pilih Excel Siswa</span>
                    <input type="file" accept=".xls,.xlsx,.csv" className="hidden" onChange={handleUploadSiswa} />
                  </div>
                </div>

                <div className="bg-rose-50 border border-rose-300 rounded-2xl p-5 col-span-1 md:col-span-2 shadow-sm hover:scale-[1.01] transition-all">
                  <div className="flex items-center gap-2 mb-2"><IconAlertCircle className="w-4 h-4 text-rose-500 bg-white p-0.5 rounded shadow-inner" /><h2 className="text-sm font-black text-rose-950">Zona Bahaya</h2></div>
                  <p className="text-rose-800 text-[10px] mb-3 font-bold">Hapus semua tab nilai di Google Sheets. Master guru/siswa aman.</p>
                  <button onClick={()=>setShowResetConfirm(true)} className="bg-rose-500 hover:bg-rose-600 text-white font-bold py-2 px-4 rounded-xl text-xs shadow-md active:scale-95 transition-all">Reset Semua Rekap Nilai Siswa</button>
                </div>
              </div>
            )}

            {activeTab === 'settings' && (
              <AdminSettingsTab masterData={masterData} setMasterData={setMasterData} schemas={schemas} syncGuru={syncToCloud} syncSiswa={syncToCloud} showToast={showToast} />
            )}
          </main>
        </div>
      );
    }

    // =========================================================================
    // --- 7. KOMPONEN PENGATURAN ADMIN (TAB SETTINGS) ---
    // =========================================================================
    function AdminSettingsTab({ masterData, setMasterData, schemas, syncGuru, syncSiswa, showToast }) {
      const [view, setView] = useState('rubrik'); 
      const [newTeacherName, setNewTeacherName] = useState('');
      const [newTeacherPass, setNewTeacherPass] = useState('123');
      const [newTeacherWali, setNewTeacherWali] = useState('');
      const [selClass, setSelClass] = useState('');
      const [newClassName, setNewClassName] = useState('');
      const [newMapelName, setNewMapelName] = useState('');

      const [editingTeacherObj, setEditingTeacherObj] = useState(null);
      const [editingTeacherName, setEditingTeacherName] = useState('');
      const [editingTeacherPass, setEditingTeacherPass] = useState('');
      const [editingTeacherWali, setEditingTeacherWali] = useState('');

      const [editingStudentObj, setEditingStudentObj] = useState(null);
      const [editStudentNumber, setEditStudentNumber] = useState('');
      const [editStudentName, setEditStudentName] = useState('');

      const [editingMapel, setEditingMapel] = useState(null);
      const [editMapelName, setEditMapelName] = useState('');
      const [deletePrompt, setDeletePrompt] = useState({ show: false, type: '', target: null });

      // Premium Schema Editor State
      const [selRubrikMapel, setSelRubrikMapel] = useState('NORMAL');
      const [rubrikForm, setRubrikForm] = useState(JSON.parse(JSON.stringify(schemas)));
      
      const [newAdminPass, setNewAdminPass] = useState('');
      
      useEffect(() => {
          setNewAdminPass(getAdminPassword(masterData));
      }, [masterData]);

      const mapelsList = useMemo(() => (masterData.students["__MAPELS__"] || DEFAULT_MAPELS).sort(), [masterData.students]);
      const sortedTeachers = useMemo(() => [...masterData.teachers].sort((a, b) => a.name.localeCompare(b.name)), [masterData.teachers]);
      const sortedStudents = useMemo(() => {
        if (!selClass || !masterData.students[selClass] || selClass === "__MAPELS__" || selClass === "__SCHEMA__" || selClass === "__ADMIN__") return [];
        return [...masterData.students[selClass]].sort((a, b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
      }, [masterData.students, selClass]);

      // Schema actions
      const handleRubrikNormalChange = (idx, val) => {
         const newHeaders = [...rubrikForm.NORMAL.headers];
         newHeaders[idx] = val;
         setRubrikForm({...rubrikForm, NORMAL: {...rubrikForm.NORMAL, headers: newHeaders}});
      };

      const handleRubrikCatChange = (mType, cIdx, val) => {
         const newCats = [...rubrikForm[mType].categories];
         newCats[cIdx].name = val;
         setRubrikForm({...rubrikForm, [mType]: {...rubrikForm[mType], categories: newCats}});
      };

      const handleRubrikItemsChange = (mType, cIdx, val) => {
         const newCats = [...rubrikForm[mType].categories];
         newCats[cIdx].items = val.split(',').map(s => s.trim());
         setRubrikForm({...rubrikForm, [mType]: {...rubrikForm[mType], categories: newCats}});
      };

      const saveRubrik = () => {
         const newData = {...masterData.students, "__SCHEMA__": [{id: "schema", name: JSON.stringify(rubrikForm)}]};
         setMasterData(m => ({...m, students: newData}));
         syncSiswa("saveMasterSiswa", "students", newData, "Rubrik & Kolom berhasil disimpan permanen!");
      };

      const saveAdminPassword = () => {
         if(!newAdminPass.trim()) return;
         const newData = {...masterData.students, "__ADMIN__": [{id: "admin", password: newAdminPass.trim()}]};
         setMasterData(m => ({...m, students: newData}));
         syncSiswa("saveMasterSiswa", "students", newData, "Password Admin berhasil diperbarui!");
      };

      const saveTeacher = () => {
        const n = editingTeacherName.trim(), p = editingTeacherPass.trim();
        if(!n || !p) return;
        const newData = masterData.teachers.map(t => {
          if(t.name === editingTeacherObj.name) {
             const otherAssigns = t.assignments.filter(a => a.type !== 'WALI');
             if (editingTeacherWali.trim()) otherAssigns.unshift({ type: 'WALI', classId: editingTeacherWali.trim().toUpperCase(), mapel: 'WALI KELAS' });
             return {...t, name:n, password:p, assignments: otherAssigns};
          }
          return t;
        });
        setMasterData(m => ({...m, teachers: newData})); syncGuru("saveMasterGuru", "teachers", newData, "Tersimpan."); setEditingTeacherObj(null);
      };
      
      const saveStudent = () => {
        const i = editStudentNumber.trim(), n = editStudentName.trim();
        if(!i || !n) return;
        const list = masterData.students[selClass].map(s => s.id === editingStudentObj.id ? {id:i, name:n} : s);
        const newData = {...masterData.students, [selClass]: list};
        setMasterData(m => ({...m, students: newData})); syncSiswa("saveMasterSiswa", "students", newData, "Tersimpan."); setEditingStudentObj(null);
      };

      const openEditStudentModal = (student) => {
        setEditingStudentObj(student);
        setEditStudentNumber(student.id);
        setEditStudentName(student.name);
      };
      
      const saveMapel = () => {
        const n = editMapelName.trim(); if(!n) return;
        const list = mapelsList.map(m => m === editingMapel ? n : m);
        const tList = masterData.teachers.map(t => ({...t, assignments: t.assignments.map(a => a.mapel===editingMapel?{...a, mapel:n}:a)}));
        const newData = {...masterData.students, "__MAPELS__": list};
        setMasterData(m => ({...m, students: newData, teachers: tList})); syncSiswa("saveMasterSiswa", "students", newData, "Tersimpan."); setEditingMapel(null);
      };

      const executeDelete = () => {
        const type = deletePrompt.type, tar = deletePrompt.target;
        if(type==='teacher') {
          const dt = masterData.teachers.filter(t => t.name !== tar);
          setMasterData(m => ({...m, teachers: dt})); syncGuru("saveMasterGuru", "teachers", dt, "Terhapus.");
        } else if(type==='class') {
          const ds = {...masterData.students}; delete ds[tar];
          setMasterData(m => ({...m, students: ds})); syncSiswa("saveMasterSiswa", "students", ds, "Terhapus."); setSelClass('');
        } else if(type==='student') {
          const ds = {...masterData.students, [selClass]: masterData.students[selClass].filter(s=>s.id!==tar)};
          setMasterData(m => ({...m, students: ds})); syncSiswa("saveMasterSiswa", "students", ds, "Terhapus.");
        } else if(type==='mapel') {
          const ds = {...masterData.students, "__MAPELS__": mapelsList.filter(m=>m!==tar)};
          setMasterData(m => ({...m, students: ds})); syncSiswa("saveMasterSiswa", "students", ds, "Terhapus.");
        }
        setDeletePrompt({show:false});
      };

      const handleAddTeacher = (e) => {
        e.preventDefault();
        const name = newTeacherName.trim(); const pass = newTeacherPass.trim();
        if(!name || !pass) return;
        if(masterData.teachers.find(t => t.name === name)) { showToast("Guru sudah ada!", "error"); return; }
        const assigns = [];
        if (newTeacherWali.trim()) assigns.push({ type: 'WALI', classId: newTeacherWali.trim().toUpperCase(), mapel: 'WALI KELAS' });
        const newData = [...masterData.teachers, { name, password: pass, assignments: assigns }];
        setMasterData(p => ({...p, teachers: newData}));
        syncGuru("saveMasterGuru", "teachers", newData, `Guru ditambahkan.`);
        setNewTeacherName(''); setNewTeacherPass('123'); setNewTeacherWali('');
      };

      const handleDeleteAssign = (teacherName, assignIdx) => {
        const newData = masterData.teachers.map(t => {
          if (t.name === teacherName) {
             const newAssigns = [...t.assignments]; newAssigns.splice(assignIdx, 1);
             return { ...t, assignments: newAssigns };
          }
          return t;
        });
        setMasterData(p => ({...p, teachers: newData}));
        syncGuru("saveMasterGuru", "teachers", newData, "Jadwal diperbarui.");
      };

      const handleAddMapel = (e) => {
        e.preventDefault();
        const mapel = newMapelName.trim().toUpperCase();
        if(!mapel) return;
        if(mapelsList.includes(mapel)) { showToast("Mapel sudah ada!", "error"); return; }
        const newList = [...mapelsList, mapel].sort();
        const newData = {...masterData.students, "__MAPELS__": newList};
        setMasterData(m => ({...m, students: newData}));
        syncSiswa("saveMasterSiswa", "students", newData, "Mapel ditambahkan.");
        setNewMapelName('');
      };

      const handleAddClass = (e) => {
        e.preventDefault();
        const c = newClassName.trim();
        if(!c || masterData.students[c]) { showToast("Kelas kosong/ada!", "error"); return; }
        const newStudents = { ...masterData.students, [c]: [] };
        setMasterData(p => ({...p, students: newStudents}));
        syncSiswa("saveMasterSiswa", "students", newStudents, `Kelas dibuat.`);
        setNewClassName(''); setSelClass(c);
      };

      const handleAddStudent = (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const id = fd.get('id').trim(); const name = fd.get('name').trim();
        if(!id || !name || !selClass) return;
        const classList = [...(masterData.students[selClass] || [])];
        if(classList.find(s => s.id === id)) { showToast("ID sudah ada!", "error"); return; }
        classList.push({id, name});
        const newStudents = { ...masterData.students, [selClass]: classList };
        setMasterData(p => ({...p, students: newStudents}));
        syncSiswa("saveMasterSiswa", "students", newStudents, "Siswa ditambahkan.");
        e.target.reset();
      };

      return (
        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in pb-4">
          <FunnyDeletePopup show={deletePrompt.show} targetName={deletePrompt.target} type={deletePrompt.type} onConfirm={executeDelete} onCancel={() => setDeletePrompt({show:false})} />

          {/* Centered Modals */}
          {editingMapel && (
            <div className="fixed inset-0 z-[99999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in">
              <div className="w-full max-w-sm rounded-[28px] bg-white border border-slate-200 shadow-2xl p-6 transform hover:scale-[1.01] transition-all">

        tableHover: isSAS ? 'hover:bg-indigo-50/50' : 'hover:bg-orange-100/60',
        rowBg: isSAS ? 'bg-white' : 'bg-[#fffcf8]',
        inputBg: isSAS ? 'bg-[#eef2ff]' : 'bg-[#fff7ed]',
        inputBorder: isSAS ? 'border-indigo-200' : 'border-orange-200',
        stickyHeader: isSAS ? 'bg-[#e2e8f0] text-slate-700' : 'bg-[#fed7aa] text-rose-900',
        stickyColBg: isSAS ? 'group-hover:bg-[#eef2ff]' : 'group-hover:bg-[#fff7ed]', 
        modalBg: isSAS ? 'bg-indigo-50 border-indigo-200' : 'bg-rose-50 border-rose-200',
        modalTextH2: isSAS ? 'text-indigo-950' : 'text-rose-950',
        modalTextP: isSAS ? 'text-indigo-800' : 'text-rose-800',
        modalBtnCancel: isSAS ? 'hover:bg-indigo-100 text-indigo-700 border-indigo-200' : 'hover:bg-rose-100 text-rose-700 border-rose-200',
        modalBtnConfirm: isSAS ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-rose-600 hover:bg-rose-700',
      };

      // Dinamis Label dr Skema Normal (Premium)
      const labelSTS = schemas.NORMAL.headers[7] || (isSAS ? 'STS 1' : 'STS 2');
      const labelSAS = schemas.NORMAL.headers[8] || (isSAS ? 'SAS' : 'SAT');

      const isWaliMode = activeAssignment?.type === 'WALI';

      const teacherProgress = useMemo(() => {
        let totalExpected = 0, totalFilled = 0;
        let assignmentsProgress = [];
        user.assignments.filter(a => a.type !== 'WALI').forEach(a => {
          const sheetName = `${a.classId}-${selectedSemester}`;
          const key = `${sheetName}|${a.mapel}|${user.name}`;
          const sum = masterData.gradesSummary?.[key] || { uhCount: 0, uhTotal: 0, stsCount: 0, stsTotal: 0, sasCount: 0, sasTotal: 0 };
          const expected = sum.uhTotal + sum.stsTotal + sum.sasTotal;
          const filled = sum.uhCount + sum.stsCount + sum.sasCount;
          totalExpected += expected; totalFilled += filled;
          assignmentsProgress.push({ ...a, pct: expected === 0 ? 0 : Math.round((filled / expected) * 100) });
        });
        return { globalPct: totalExpected === 0 ? 0 : Math.round((totalFilled / totalExpected) * 100), assignmentsProgress };
      }, [user.assignments, masterData.gradesSummary, selectedSemester]);

      useEffect(() => {
        if (activeAssignment && masterData.students && !isWaliMode) {
          const classStudents = [...(masterData.students[activeAssignment.classId] || [])].sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
          setStudents(classStudents);
          
          const serverKey = `${activeAssignment.classId}-${selectedSemester}|${activeAssignment.mapel.toUpperCase()}`;
          const serverGradesRaw = masterData.gradesData?.[serverKey] || {};

          const initialGrades = {};
          classStudents.forEach(s => { 
            const rawData = serverGradesRaw[s.id];
            if (rawData && rawData.length > 0) {
               const mapped = {};
               colData.keys.forEach((key, idx) => { mapped[key] = rawData[idx] !== undefined ? rawData[idx] : ""; });
               initialGrades[s.id] = mapped;
            } else {
               initialGrades[s.id] = colData.keys.reduce((acc, col) => ({ ...acc, [col]: '' }), {}); 
            }
          });
          
          setGrades(initialGrades); setGradesHistory([initialGrades]); setHistoryIndex(0);
        }
      }, [activeAssignment, colData.keys, user.name, masterData, selectedSemester, isWaliMode]);

      const isGradesEmpty = () => {
        if (!students.length) return true;
        return !Object.values(grades).some(studentGrades => Object.entries(studentGrades).some(([k, v]) => k !== 'penguji' && v !== '' && v !== null && v !== undefined));
      };

      const updateGrades = (newGrades) => {
        const updatedHistory = gradesHistory.slice(0, historyIndex + 1);
        setGradesHistory([...updatedHistory, newGrades]); setHistoryIndex(updatedHistory.length); setGrades(newGrades);
      };

      const handleGradeChange = (studentId, columnKey, value) => {
        if (columnKey === 'penguji') { updateGrades({ ...grades, [studentId]: { ...grades[studentId], [columnKey]: value } }); return; }
        const numericVal = value.replace(/[^0-9]/g, '');
        if (numericVal === '') { updateGrades({ ...grades, [studentId]: { ...grades[studentId], [columnKey]: '' } }); return; }
        const num = Number(numericVal);
        if (num >= 0 && num <= 100) { updateGrades({ ...grades, [studentId]: { ...grades[studentId], [columnKey]: num.toString() } }); }
      };

      const handleKeyDown = (e, rowIdx, colIdx) => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', 'Tab'].includes(e.key)) {
          if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'Enter') e.preventDefault(); 
          let nextRow = rowIdx; let nextCol = colIdx;
          
          if (e.key === 'ArrowUp') nextRow = Math.max(0, rowIdx - 1);
          else if (e.key === 'ArrowDown' || e.key === 'Enter') nextRow = Math.min(students.length - 1, rowIdx + 1);
          else if (e.key === 'ArrowLeft') { if (e.target.selectionStart === 0) { e.preventDefault(); nextCol = Math.max(0, colIdx - 1); } }
          else if (e.key === 'ArrowRight') { if (e.target.selectionEnd === e.target.value.length) { e.preventDefault(); nextCol = Math.min(colData.keys.length - 1, colIdx + 1); } }
          else if (e.key === 'Tab') { e.preventDefault(); if (e.shiftKey) { nextCol = colIdx - 1; if (nextCol < 0) { nextCol = colData.keys.length - 1; nextRow = Math.max(0, rowIdx - 1); } } else { nextCol = colIdx + 1; if (nextCol >= colData.keys.length) { nextCol = 0; nextRow = Math.min(students.length - 1, rowIdx + 1); } } }
          
          if (nextRow !== rowIdx || nextCol !== colIdx) { e.preventDefault(); const nextInput = document.getElementById(`input-${nextRow}-${nextCol}`); if (nextInput) { nextInput.focus(); setTimeout(() => nextInput.select(), 10); } }
        }
      };

      const handlePasteBlock = () => {
        if (!pasteText.trim()) return;
        const rows = pasteText.split('\n').map(row => row.split('\t'));
        let newGrades = { ...grades }; let pasteCount = 0;
        const startColIdx = colData.type === 'special' ? 1 : 0; 
        rows.forEach((row, i) => {
          const student = students[i]; if (!student) return;
          let studentGrades = { ...newGrades[student.id] };
          row.forEach((val, j) => {
            const colKey = colData.keys[startColIdx + j]; if (!colKey) return;
            const cleanVal = val.replace(/\r/g, '').trim();
            if (cleanVal === '' || (!isNaN(cleanVal) && Number(cleanVal) >= 0 && Number(cleanVal) <= 100)) { studentGrades[colKey] = cleanVal; pasteCount++; }
          });
          newGrades[student.id] = studentGrades;
        });
        updateGrades(newGrades); setShowPasteModal(false); setPasteText(''); showToast(`Tertempel ${pasteCount} nilai!`, "success");
      };

      const handlePaste = (e, startRowIdx, startColIdx) => {
        e.preventDefault();
        const pasteData = e.clipboardData.getData('Text'); if (!pasteData) return;
        const rows = pasteData.split('\n').map(row => row.split('\t'));
        let newGrades = { ...grades }; let pasteCount = 0;
        rows.forEach((row, i) => {
          const student = students[startRowIdx + i]; if (!student) return;
          let studentGrades = { ...newGrades[student.id] };
          row.forEach((val, j) => {
            const colKey = colData.keys[startColIdx + j]; if (!colKey) return;
            const cleanVal = val.replace(/\r/g, '').trim();
            if (colKey === 'penguji') { if (cleanVal !== '') { studentGrades[colKey] = cleanVal; pasteCount++; } } 
            else { if (cleanVal === '' || (!isNaN(cleanVal) && Number(cleanVal) >= 0 && Number(cleanVal) <= 100)) { studentGrades[colKey] = cleanVal; pasteCount++; } }
          });
          newGrades[student.id] = studentGrades;
        });
        updateGrades(newGrades); showToast(`Berhasil menempelkan ${pasteCount} data!`, 'success');
      };

      const handleUndo = () => { if (historyIndex > 0) { const prevIndex = historyIndex - 1; setHistoryIndex(prevIndex); setGrades(gradesHistory[prevIndex]); showToast("Undo berhasil!", "success"); } };
      const handleRedo = () => { if (historyIndex < gradesHistory.length - 1) { const nextIndex = historyIndex + 1; setHistoryIndex(nextIndex); setGrades(gradesHistory[nextIndex]); showToast("Redo berhasil!", "success"); } };

      const handleSaveToSpreadsheet = async () => {
        if (isGradesEmpty()) { triggerKocakPopup(KOCAK_EMPTY_WARNINGS[0], isSAS); return; }
        setIsSaving(true);
        const dataToSubmit = { 
          action: "saveGrades", guru: user.name, kelas: activeAssignment.classId, semester: selectedSemester, mapel: activeAssignment.mapel, 
          isSpecial: colData.type === 'special', schema: colData.schema, keys: colData.keys,
          grades: students.map(student => ({ id: student.id, nama: student.name, ...grades[student.id] })) 
        };
        try {
          await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dataToSubmit) });
          showToast('Selesai! Nilai tersimpan di Awan ☁️', 'success'); setTimeout(() => { onUpdateSuccess(true); }, 1500);
        } catch (error) { showToast('Gagal kirim ke Awan.', 'error'); } finally { setIsSaving(false); }
      };

      const executeResetServer = async () => {
        setShowConfirmReset(false); setIsSaving(true);
        const emptyGrades = {};
        students.forEach(s => { emptyGrades[s.id] = colData.keys.reduce((acc, col) => ({ ...acc, [col]: '' }), {}); });
        const dataToSubmit = { 
          action: "saveGrades", guru: user.name, kelas: activeAssignment.classId, semester: selectedSemester, mapel: activeAssignment.mapel, 
          isSpecial: colData.type === 'special', schema: colData.schema, keys: colData.keys,
          grades: students.map(student => ({ id: student.id, nama: student.name, ...emptyGrades[student.id] })) 
        };
        try {
          await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dataToSubmit) });
          showToast('Berhasil! Data di GAS dikosongkan ☁️', 'success'); updateGrades(emptyGrades); setTimeout(() => { onUpdateSuccess(true); }, 1000);
        } catch (error) { showToast('Gagal mereset ke GAS.', 'error'); } finally { setIsSaving(false); }
      };

      const requestSwitchClass = (assignment) => {
        if (assignment.classId === activeAssignment.classId && assignment.mapel === activeAssignment.mapel) return;
        setSwitchIndex(Math.floor(Math.random() * SWITCH_CLASS_MSGS.length)); setTargetAssignment(assignment); setShowSwitchPopup(true);
      };

      const confirmSwitchClass = () => { setActiveAssignment(targetAssignment); setShowSwitchPopup(false); };

      const downloadDetailedGradesExcel = () => {
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"]; const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const now = new Date(); const timeString = `${days[now.getDay()]} , ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} - Jam ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')} WIB`;

        if (isWaliMode) {
           const classId = activeAssignment.classId;
           const waliStudents = [...(masterData.students[classId] || [])].sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
           const allMapelsSchema = DEFAULT_MAPELS.map(m => ({ name: m, ...getMapelSchema(m, schemas) }));
           const tfHeaders = schemas.NORMAL.headers.slice(0, 7); // Utk excel header

           const rowsData = [
             [`REKAP NILAI MATA PELAJARAN WALI KELAS - SEMESTER ${isSAS ? '1 (SAS)' : '2 (SAT)'}`],
             [`Kelas: ${classId}`],
             [`Guru Pengajar: ${user.name}`],
             [`Waktu Diunduh: ${timeString}`],
             []
           ];

           const headerRow1 = ["No", "ID Siswa", "Nama Siswa"];
           const headerRow2 = ["", "", ""];
           const headerRow3 = ["", "", ""];
           const headerRow4 = ["", "", ""];

           allMapelsSchema.forEach(m => {
               headerRow1.push(m.name);
               for(let i=1; i<m.keys.length; i++) headerRow1.push("");
               
               if (m.type === 'normal') {
                   headerRow2.push("FORMATIF (UH)", "", "", "", "", "", "", labelSTS, labelSAS);
                   headerRow3.push(...tfHeaders, "", "");
                   headerRow4.push("","","","","","","","","");
               } else {
                   headerRow2.push("Penguji");
                   m.schema.categories.forEach(cat => {
                       headerRow2.push(cat.name);
                       for(let i=1; i<cat.items.length*3; i++) headerRow2.push("");
                   });
                   headerRow3.push(""); // empty for penguji
                   m.schema.categories.forEach(cat => {
                       cat.items.forEach(item => {
                           headerRow3.push(item, "", "");
                       });
                   });
                   headerRow4.push(""); // empty for penguji
                   m.schema.categories.forEach(cat => {
                       cat.items.forEach(item => {
                           headerRow4.push(schemas.NORMAL.headers[0], labelSTS, labelSAS);
                       });
                   });
               }
           });

           rowsData.push(headerRow1, headerRow2, headerRow3, headerRow4);

           waliStudents.forEach((s, idx) => {
               const row = [idx + 1, s.id, s.name];
               allMapelsSchema.forEach(m => {
                   const serverKey = `${classId}-${selectedSemester}|${m.name.toUpperCase()}`;
                   const rawData = masterData.gradesData?.[serverKey]?.[s.id] || [];
                   m.keys.forEach((k, i) => {
                       row.push(rawData[i] || "");
                   });
               });
               rowsData.push(row);
           });

           const ws = window.XLSX.utils.aoa_to_sheet(rowsData);
           const wb = window.XLSX.utils.book_new(); 
           window.XLSX.utils.book_append_sheet(wb, ws, "Rekap_Wali");
           window.XLSX.writeFile(wb, `Rekap_Wali_Kls_${classId}_${isSAS ? 'SAS' : 'SAT'}.xlsx`);
           showToast("Template/Rekap Wali Kelas diekspor!", "success");
           return;
        }

        const theKeys = colData.keys;
        const rowsData = [
          [`REKAP NILAI MATA PELAJARAN ${activeAssignment.mapel.toUpperCase()} - SEMESTER ${isSAS ? '1 (SAS)' : '2 (SAT)'}`],
          [`Kelas: ${activeAssignment.classId}`],
          [`Guru Pengajar: ${user.name}`],
          [`Waktu Diunduh: ${timeString}`],
          [], ["No", "ID Siswa", "Nama Siswa", ...theKeys.map((k,i) => colData.type === 'normal' ? colData.headers[i] : k)] 
        ];

        students.forEach((s, idx) => {
          const studentRow = [idx + 1, s.id, s.name];
          theKeys.forEach(col => studentRow.push(grades[s.id]?.[col] || ""));
          rowsData.push(studentRow);
        });

        const ws = window.XLSX.utils.aoa_to_sheet(rowsData);
        ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 5 } }];
        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, "Rekap_Nilai");
        window.XLSX.writeFile(wb, `Laporan_Nilai_${isSAS ? 'SAS' : 'SAT'}_${activeAssignment.mapel}_Kls_${activeAssignment.classId}.xlsx`); showToast("Template/Rekap Nilai diekspor!", "success");
      };

      const handleUploadExcelGrades = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result); const workbook = window.XLSX.read(data, {type: 'array'});
            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            let newGrades = { ...grades }; let imported = 0;
            const theKeys = colData.keys;
            rows.slice(1).forEach(parts => {
              const idSiswa = parts[1] !== undefined ? String(parts[1]).trim() : "";
              if (students.find(s => s.id === idSiswa)) {
                 let studentGrades = { ...newGrades[idSiswa] };
                 theKeys.forEach((col, idx) => {
                    const valIndex = 3 + idx;
                    if (parts[valIndex] !== undefined) {
                        const cleanVal = String(parts[valIndex]).trim();
                        if (col === 'penguji') { if(cleanVal !== '') studentGrades[col] = cleanVal; } 
                        else if (cleanVal === '' || (!isNaN(cleanVal) && Number(cleanVal) >= 0 && Number(cleanVal) <= 100)) { studentGrades[col] = cleanVal; imported++; }
                    }
                 });
                 newGrades[idSiswa] = studentGrades;
              }
            });
            if (imported === 0) {
               triggerKocakPopup("Tidak ada nilai yang berhasil dibaca dari file Excel! Pastikan Anda sudah mengisi angkanya ya.", isSAS);
            } else {
               updateGrades(newGrades); showToast(`Berhasil mengunggah ${imported} baris nilai!`, 'success');
            }
          } catch(err) { showToast(`Gagal membaca file Excel.`, 'error'); }
        }; reader.readAsArrayBuffer(file); e.target.value = ''; 
      };

      const copyMapelGrades = (mapelName, mapelKeys) => {
          const classId = activeAssignment.classId;
          const waliStudents = [...(masterData.students[classId] || [])].sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
          const serverKey = `${classId}-${selectedSemester}|${activeAssignment.mapel === 'WALI KELAS' ? mapelName.toUpperCase() : activeAssignment.mapel.toUpperCase()}`;
          
          let copyText = "";
          waliStudents.forEach(student => {
              const rawData = masterData.gradesData?.[serverKey]?.[student.id] || [];
              const rowValues = mapelKeys.map((key, idx) => rawData[idx] || "");
              copyText += rowValues.join("\t") + "\n";
          });

          const textArea = document.createElement("textarea");
          textArea.value = copyText;
          document.body.appendChild(textArea);
          textArea.select();
          try {
              document.execCommand('copy');
              showToast(`Data nilai ${mapelName} berhasil disalin! Siap dipaste ke Raport.`, 'success');
          } catch (err) {
              showToast(`Gagal menyalin data ${mapelName}.`, 'error');
          }
          document.body.removeChild(textArea);
      };

      const getThickBorderClass = (colKey, type, isLastCol = false) => {
          const baseClass = "border-slate-300";
          const thickClass = "border-r-[3px] !border-r-slate-400";
          if (type === 'normal') { if (colKey === 'UH7' || colKey === 'STS' || colKey === 'SAS') return thickClass; } 
          else { if (colKey === 'penguji' || colKey.endsWith('_SAT')) return thickClass; }
          if (isLastCol) return thickClass;
          return baseClass;
      };

      // Komponen View Wali Kelas
      const renderWaliKelasView = () => {
         const classId = activeAssignment.classId;
         const waliStudents = [...(masterData.students[classId] || [])].sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
         const allMapelsSchema = DEFAULT_MAPELS.map(m => ({ name: m, ...getMapelSchema(m, schemas) }));
         const tfHeaders = schemas.NORMAL.headers.slice(0, 7); 
         const firstUhLabel = schemas.NORMAL.headers[0] || 'UH';

         return (
            <div className="flex-1 flex flex-col min-h-0 overflow-hidden mt-3 mx-2 sm:mx-4 mb-2">
              <div className="flex-none p-4 flex justify-between items-center border border-slate-200 bg-white rounded-t-2xl shadow-sm z-50">
                <h2 className={`text-sm font-black ${theme.modalTextH2}`}>👑 REKAPITULASI WALI KELAS - KELAS {classId} ({isSAS ? 'SAS' : 'SAT'})</h2>
                <button onClick={downloadDetailedGradesExcel} className={`flex items-center gap-1 bg-white border border-slate-300 ${isSAS ? 'text-indigo-700 hover:bg-indigo-50' : 'text-rose-700 hover:bg-rose-50'} px-4 py-2 rounded-lg text-xs font-black active:scale-95 shadow-sm whitespace-nowrap transition-colors`}><IconDownload className="w-4 h-4"/> Unduh Template / Rekap Kelas</button>
              </div>
              <div className={`flex-1 overflow-auto relative rounded-b-2xl border-x border-b border-slate-200 bg-white`}>
                <div className="min-w-max bg-white">
                  <table className="w-full text-xs text-left text-slate-600 border-separate border-spacing-0">
                    <thead className="text-[10px] font-extrabold uppercase tracking-wider">
                      <tr className="h-[60px]">
                        <th rowSpan="4" className={`w-[45px] min-w-[45px] max-w-[45px] p-2 text-center sticky left-0 z-[70] border-b border-r border-slate-300 shadow-sm top-0 bg-clip-padding ${theme.stickyHeader}`}>No</th>
                        <th rowSpan="4" className={`w-[180px] min-w-[180px] max-w-[180px] p-3 sticky left-[45px] z-[70] border-b border-r-[3px] !border-r-slate-400 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.15)] top-0 bg-clip-padding ${theme.stickyHeader}`}>Nama Siswa</th>
                        {allMapelsSchema.map(m => {
                          if (m.type === 'normal') {
                             return (
                                <th key={m.name} colSpan={m.keys.length} className="px-2 text-center border-b border-r-[3px] !border-r-slate-400 sticky top-0 z-[40]" style={{ backgroundColor: MAPEL_THEMES[m.name]?.bg, color: MAPEL_THEMES[m.name]?.text }}>
                                   <div className="flex flex-col items-center justify-center gap-1">
                                      <span className="font-bold text-[11px] uppercase tracking-widest">{m.name}</span>
                                      <button onClick={() => copyMapelGrades(m.name, m.keys)} className="flex items-center justify-center gap-1 bg-black/20 hover:bg-black/40 text-white active:scale-95 transition-all px-2 py-0.5 rounded shadow-sm text-[9px] font-black border border-white/20">
                                         <IconFileText className="w-3 h-3" /> COPY NILAI
                                      </button>
                                   </div>
                                </th>
                             );
                          } else {
                             return (
                                <th key={m.name} colSpan={m.keys.length} className="px-2 text-center border-b border-r-[3px] !border-r-slate-400 sticky top-0 z-[40]" style={{ backgroundColor: MAPEL_THEMES[m.name]?.bg, color: MAPEL_THEMES[m.name]?.text }}>
                                   <div className="flex flex-col items-center justify-center h-full">
                                      <span className="font-bold text-[11px] uppercase tracking-widest">{m.name}</span>
                                   </div>
                                </th>
                             );
                          }
                        })}
                      </tr>
                      <tr className="h-[50px]">
                        {allMapelsSchema.map(m => {
                           if (m.type === 'normal') {
                              return (
                                <React.Fragment key={m.name}>
                                  <th colSpan="7" className="px-2 text-center border-b border-r-[3px] !border-r-slate-400 sticky top-[60px] z-[40]" style={{ backgroundColor: MAPEL_THEMES[m.name]?.light, color: MAPEL_THEMES[m.name]?.textDark }}>FORMATIF (UH)</th>
                                  <th rowSpan="3" className="px-2 text-center border-b border-r-[3px] !border-r-slate-400 sticky top-[60px] z-[40]" style={{ backgroundColor: MAPEL_THEMES[m.name]?.light, color: MAPEL_THEMES[m.name]?.textDark }}>{labelSTS}</th>
                                  <th rowSpan="3" className="px-2 text-center border-b border-r-[3px] !border-r-slate-400 sticky top-[60px] z-[40]" style={{ backgroundColor: MAPEL_THEMES[m.name]?.light, color: MAPEL_THEMES[m.name]?.textDark }}>{labelSAS}</th>
                                </React.Fragment>
                              );
                           } else {
                              return (
                                <React.Fragment key={m.name}>
                                  <th rowSpan="3" className="px-2 text-center border-b border-r-[3px] !border-r-slate-400 sticky top-[60px] z-[40]" style={{ backgroundColor: MAPEL_THEMES[m.name]?.light, color: MAPEL_THEMES[m.name]?.textDark }}>Penguji</th>

                              if (colKey === 'penguji') {
                                return (
                                  <td key={colKey} className={`p-1 border-b align-middle ${tBorder} transition-colors ${theme.inputBg}`}>
                                    <input id={`input-${rowIdx}-${colIdx}`} type="text" value={val||''} onChange={e=>handleGradeChange(student.id, colKey, e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rowIdx, colIdx)} onPaste={(e) => handlePaste(e, rowIdx, colIdx)} className={`w-full h-8 px-2 rounded border text-[10px] font-bold ${theme.focusRing} focus:ring-2 transition-all text-center shadow-inner ${theme.inputBorder} bg-white/70 ${isSAS ? 'text-slate-800' : 'text-rose-950'}`}/>
                                  </td>
                                );
                              }
                              
                              const isRemedi = val !== '' && Number(val) < 70;
                              const isSuccess = val !== '' && Number(val) >= 70;
                              const parts = colKey.split('_');
                              const itemIdx = parts.length > 1 ? parseInt(parts[0]) : 0; // Use cat index for color
                              const bgClass = colData.type === 'special' ? ITEM_BG_COLORS[itemIdx % ITEM_BG_COLORS.length] : theme.inputBg;

                              return (
                                <td key={colKey} className={`p-1 border-b align-middle ${tBorder} ${bgClass}`}>
                                  <input id={`input-${rowIdx}-${colIdx}`} type="text" inputMode="numeric" placeholder="-" value={val || ''} 
                                    onChange={(e) => handleGradeChange(student.id, colKey, e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rowIdx, colIdx)} onPaste={(e) => handlePaste(e, rowIdx, colIdx)}
                                    className={`w-11 h-8 mx-auto block text-center rounded border focus:outline-none focus:ring-2 ${theme.focusRing} transition-all font-black text-[11px] shadow-sm box-border
                                      ${theme.rowBg} ${theme.inputBorder}
                                      ${isRemedi ? 'text-rose-600 shadow-[inset_0_1px_3px_rgba(225,29,72,0.3)]' 
                                      : isSuccess ? 'text-emerald-700 shadow-[inset_0_1px_3px_rgba(16,185,129,0.3)]' 
                                      : (isSAS ? 'text-slate-900 shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)]' : 'text-rose-950 shadow-[inset_0_1px_2px_rgba(234,88,12,0.1)]')}
                                    `} 
                                  />
                                </td>
                              );
                            })}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
