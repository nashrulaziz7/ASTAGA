      }
    } catch(e) {}

    function applyAdminExcelStyle(ws) {
       const range = XLSX.utils.decode_range(ws['!ref']);
       for(let R = range.s.r; R <= range.e.r; ++R) {
          for(let C = range.s.c; C <= range.e.c; ++C) {
             const cellRef = XLSX.utils.encode_cell({c:C, r:R});
             if(!ws[cellRef]) continue;
             const cell = ws[cellRef];
             if (R === 0) {
                 cell.s = { fill: { fgColor: { rgb: "1E3A8A" } }, font: { bold: true, color: { rgb: "FFFFFF" } }, alignment: { horizontal: "center", vertical: "center" }, border: { top: {style:"thin", color:{rgb:"94A3B8"}}, bottom: {style:"thin", color:{rgb:"94A3B8"}}, left: {style:"thin", color:{rgb:"94A3B8"}}, right: {style:"thin", color:{rgb:"94A3B8"}} } };
             } else {
                 cell.s = { fill: { fgColor: { rgb: R % 2 === 0 ? "F8FAFC" : "FFFFFF" } }, alignment: { horizontal: "left", vertical: "center" }, border: { top: {style:"thin", color:{rgb:"E2E8F0"}}, bottom: {style:"thin", color:{rgb:"E2E8F0"}}, left: {style:"thin", color:{rgb:"E2E8F0"}}, right: {style:"thin", color:{rgb:"E2E8F0"}} } };
             }
          }
       }
       ws['!cols'] = Array(range.e.c + 1).fill({wch: 25});
       const rows = [];
       for(let R = range.s.r; R <= range.e.r; ++R) rows.push({hpx: 25});
       ws['!rows'] = rows;
    }

    function InstallPromptPopup({ show, onInstall }) {

         onInstall();
         setTimeout(() => setIsInstalling(false), 3000);

    function App() {
      const [masterData, setMasterData] = useState(() => {
          try {
             const cached = localStorage.getItem('astaga_master_cache');
             if (cached) return JSON.parse(cached);
          } catch(e){}
          return DEFAULT_MASTER_DATA;
      });
      const [currentUser, setCurrentUser] = useState(null);
      const [activeAssignment, setActiveAssignment] = useState(null);
      const [popup, setPopup] = useState({ show: false, type: 'success', index: 0 });
      const [kocakPopup, setKocakPopup] = useState({ show: false, message: '', isSAS: true });
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [isFetchingData, setIsFetchingData] = useState(false);
      const [showInstallPopup, setShowInstallPopup] = useState(false);
      const [showUpdatePopup, setShowUpdatePopup] = useState(false);

      useEffect(() => {
         const isIframe = window.self !== window.top;
         const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone || document.referrer.includes('android-app://');
         
         if (isStandalone) {
             localStorage.setItem('astaga_installed', 'true');
             setShowInstallPopup(false);
         }

         if (!isIframe && !isStandalone && localStorage.getItem('astaga_installed') !== 'true') {
            setShowInstallPopup(true); 
         }

         window.addEventListener('appinstalled', () => {
            localStorage.setItem('astaga_installed', 'true');
            setShowInstallPopup(false);
            showToast("Mantap! Aplikasi sudah nempel di HP! 🎉", "success");
         });

         if (isStandalone || localStorage.getItem('astaga_installed') === 'true') {
             const savedVer = localStorage.getItem('astaga_version');
             if (savedVer !== APP_VERSION) {
                setTimeout(() => setShowUpdatePopup(true), 1000);
                localStorage.setItem('astaga_version', APP_VERSION);
             }
         }
      }, []);

      const executeInstall = async () => {
         const promptEvent = window.deferredPWA;
         if (promptEvent) {
            promptEvent.prompt();
            const { outcome } = await promptEvent.userChoice;
            if (outcome === 'accepted') {
                showToast("Berhasil pasang aplikasi! 🎉", "success");
                localStorage.setItem('astaga_installed', 'true');
                setShowInstallPopup(false);
            } else {
                showToast("Dih kok dibatalin? Tekan lagi buruan! 😢", "error");
            }
            window.deferredPWA = null;
         } else {
             showToast("Sistem sedang mengunduh aset instalasi... Klik sekali lagi! 🚀", "success");
         }
      };

      const fetchCloudMasterData = async (silent = false) => {
        setIsFetchingData(true);
        if (!silent) showToast("Membidik data dari server GAS... 📡", "success");
        try {
          const response = await fetch(SCRIPT_URL);
          const data = await response.json();
          setMasterData(data);
          localStorage.setItem('astaga_master_cache', JSON.stringify(data));
          if (!silent) showToast("Data terbaru berhasil ditarik! 🚀", "success");
        } catch (err) {
          if (!silent) showToast("Gagal menarik data. Server sibuk.", "error");
        } finally {
          setIsFetchingData(false);
        }
      };

      useEffect(() => { fetchCloudMasterData(masterData.teachers && masterData.teachers.length > 0); }, []);

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
      };

      const currentSchemas = useMemo(() => {
         if (masterData.students?.["__SCHEMA__"]) { try { return JSON.parse(masterData.students["__SCHEMA__"][0].name); } catch(e){} }
         return DEFAULT_SCHEMAS;
      }, [masterData.students]);

      return (
        <div className="min-h-screen max-h-screen h-screen bg-slate-50 flex flex-col overflow-hidden text-xs">
          {!currentUser ? (
            <LoginScreen masterData={masterData} isFetchingData={isFetchingData} onLogin={(user, assignment) => { setCurrentUser(user); setActiveAssignment(assignment); if(user !== 'ADMIN') setPopup({ show: true, type: 'success', index: Math.floor(Math.random() * 10) }); }} onLoginFail={() => setPopup({ show: true, type: 'error', index: Math.floor(Math.random() * 10) })} />
          ) : currentUser === 'ADMIN' ? (
            <AdminDashboard masterData={masterData} setMasterData={setMasterData} schemas={currentSchemas} onLogout={() => setCurrentUser(null)} showToast={showToast} toast={toast} onRefreshData={() => fetchCloudMasterData(false)} isFetchingData={isFetchingData} />
          ) : (
            <Dashboard user={currentUser} activeAssignment={activeAssignment} masterData={masterData} schemas={currentSchemas} onLogout={() => setCurrentUser(null)} showToast={showToast} toast={toast} setActiveAssignment={setActiveAssignment} triggerKocakPopup={(msg, isSAS) => setKocakPopup({show: true, message: msg, isSAS})} isFetchingData={isFetchingData} onForceRefresh={() => fetchCloudMasterData(false)} setMasterData={setMasterData} />
          )}
          <FunnyPopup show={popup.show} type={popup.type} msgIndex={popup.index} onClose={() => setPopup({ ...popup, show: false })} />
          <FunnyKocakPopup show={kocakPopup.show} message={kocakPopup.message} isSAS={kocakPopup.isSAS} onClose={() => setKocakPopup({ show: false, message: '', isSAS: true })} />
          <UpdatePopup show={showUpdatePopup} onClose={() => setShowUpdatePopup(false)} />
          <InstallPromptPopup show={showInstallPopup} onInstall={executeInstall} />
          {toast.show && (
            <div className="fixed bottom-4 right-4 z-[99999] animate-in slide-in-from-bottom-2">
              <div className={`rounded-xl shadow-lg px-4 py-2.5 flex items-center space-x-2 text-white font-bold text-xs ${toast.type === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`}>
                {toast.type === 'success' ? <IconCheckCircle className="w-4 h-4" /> : <IconAlertCircle className="w-4 h-4" />}<span>{toast.message}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

                        <div className="absolute inset-0 border-4 border-indigo-600 rounded-full border-t-transparent animate-[spin_1s_linear_infinite] shadow-[0_0_15px_rgba(79,70,229,0.5)]"></div>
                        <div className="absolute inset-0 flex items-center justify-center text-2xl animate-pulse">☁️</div>

              </div>

        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-3 font-sans bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] w-full">
          <div className="max-w-sm w-full bg-white rounded-[24px] shadow-xl border border-slate-200 relative animate-in fade-in duration-300 hover:shadow-2xl transition-all">
            <div className={`p-6 text-center transition-colors duration-500 ${mode === 'admin' ? 'bg-slate-900' : 'bg-indigo-600'}`}>
              <div className="bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 backdrop-blur-md shadow-inner overflow-hidden relative">
                <img src="icon.png" alt="Logo ASTAGA" onError={(e) => { e.target.onerror = null; e.target.style.display = 'none'; }} className="w-12 h-12 object-contain" />
                <IconSettings className={`text-white w-7 h-7 animate-[spin_4s_linear_infinite] ${!document.querySelector('img[src="icon.png"]') ? 'block' : 'hidden'}`} />

              <h1 className="text-2xl font-black text-white tracking-widest leading-none animate-pulse">ASTAGA</h1>
              <p className="text-white/80 text-[10px] font-semibold uppercase tracking-wider mt-1">{mode === 'admin' ? 'Ruang Kendali Admin' : 'Asisten Sistem Terpadu Guru Al Kautsar'}</p>

    function AdminDashboard({ masterData, setMasterData, schemas, onLogout, showToast, toast, onRefreshData, isFetchingData }) {
      const [activeTab, setActiveTab] = useState('overview'); 
      const [selectedSemester, setSelectedSemester] = useState('SAS');
      const [isSyncing, setIsSyncing] = useState(false);
      const [expandedGuru, setExpandedGuru] = useState({});
      const [showResetConfirm, setShowResetConfirm] = useState(false);

      const isSAS = selectedSemester === 'SAS';
      const adminTheme = {
          bg: isSAS ? 'bg-[#f8faff]' : 'bg-[#fffcf8]',
          header: isSAS ? 'bg-indigo-900' : 'bg-rose-900',
          iconBg: isSAS ? 'bg-indigo-600' : 'bg-rose-600',
          badge: isSAS ? 'bg-indigo-700' : 'bg-rose-700',
          tabActive: isSAS ? 'bg-indigo-500' : 'bg-rose-500',
          textHighlight: isSAS ? 'text-indigo-700' : 'text-rose-700',
          btnSync: isSAS ? 'bg-indigo-800 border-indigo-700 hover:bg-indigo-700' : 'bg-rose-800 border-rose-700 hover:bg-rose-700',
          overviewBox: isSAS ? 'bg-indigo-100/50' : 'bg-rose-100/50',
          border: isSAS ? 'border-indigo-100' : 'border-rose-100',
      };

      const totalGuru = masterData.teachers?.length || 0;
      const totalSiswa = Object.values(masterData.students || {}).flat().length - ((masterData.students || {})["__MAPELS__"] ? masterData.students["__MAPELS__"].length : 0) - ((masterData.students || {})["__SCHEMA__"] ? 1 : 0) - ((masterData.students || {})["__ADMIN__"] ? 1 : 0);
      const totalKelas = Object.keys(masterData.students || {}).filter(k => k !== "__MAPELS__" && k !== "__SCHEMA__" && k !== "__ADMIN__").length;
      
      const trackingData = useMemo(() => {
        let totalCellsExpected = 0, totalCellsFilled = 0;
        const semCode = selectedSemester === 'SAS' ? 'S' : 'T';
        (masterData.teachers || []).forEach(t => {
            const tName = String(t.name).toUpperCase().trim();
            t.assignments.filter(a => a.type !== 'WALI').forEach(a => {
                const cId = String(a.classId).toUpperCase().trim();
                const mapel = String(a.mapel).toUpperCase().trim();
                const prefix = `${cId}-${semCode}|${mapel}|`;
                const exactKeyMatch = Object.keys(masterData.gradesSummary || {}).find(k => k.toUpperCase() === `${prefix}${tName}`);
                const matchingKey = exactKeyMatch || Object.keys(masterData.gradesSummary || {}).find(k => k.toUpperCase().startsWith(prefix));
                const sum = masterData.gradesSummary?.[matchingKey] || { uhCount: 0, uhTotal: 0 };
                totalCellsExpected += sum.uhTotal || 0;
                totalCellsFilled += sum.uhCount || 0;
            });
        });
        const globalProgress = totalCellsExpected === 0 ? 0 : Math.round((totalCellsFilled / totalCellsExpected) * 100);
        return { globalProgress };
      }, [masterData, selectedSemester]);

      const teachersProgress = useMemo(() => {
        const semCode = selectedSemester === 'SAS' ? 'S' : 'T';
        return (masterData.teachers || []).map(t => {
            const tName = String(t.name).toUpperCase().trim();
            const assignments = t.assignments.filter(a => a.type !== 'WALI').map(a => {
                const cId = String(a.classId).toUpperCase().trim();
                const mapel = String(a.mapel).toUpperCase().trim();
                const prefix = `${cId}-${semCode}|${mapel}|`;
                const exact = Object.keys(masterData.gradesSummary || {}).find(k => k.toUpperCase() === `${prefix}${tName}`);
                const matchingKey = exact || Object.keys(masterData.gradesSummary || {}).find(k => k.toUpperCase().startsWith(prefix));
                const sum = masterData.gradesSummary?.[matchingKey] || { uhCount: 0, uhTotal: 0 };
                const expected = sum.uhTotal || 0;
                const filled = sum.uhCount || 0;
                return { mapel: a.mapel, classId: a.classId, progress: expected === 0 ? 0 : Math.round((filled / expected) * 100) };
            });
            let total = assignments.length;
            let completed = 0;
            assignments.forEach(a => { if (a.progress === 100) completed++; });
            return { name: t.name, total, completed, assignments };
        }).sort((a, b) => a.name.localeCompare(b.name));

                {selClass && (

    }

    function Dashboard({ user, activeAssignment, masterData, schemas, onLogout, showToast, onUpdateSuccess, triggerKocakPopup, setActiveAssignment, isFetchingData, onForceRefresh, setMasterData }) {
      const [selectedSemester, setSelectedSemester] = useState('SAS'); 
      const [grades, setGrades] = useState({});
      const [isSaving, setIsSaving] = useState(false);
      const [gradesHistory, setGradesHistory] = useState([]);
      const [historyIndex, setHistoryIndex] = useState(-1);
      const [showPasteModal, setShowPasteModal] = useState(false);
      const [pasteText, setPasteText] = useState('');
      const [showSwitchPopup, setShowSwitchPopup] = useState(false);
      const [showConfirmReset, setShowConfirmReset] = useState(false);
      const [switchIndex, setSwitchIndex] = useState(0);
      const [targetAssignment, setTargetAssignment] = useState(null);
      const [initializedAssignment, setInitializedAssignment] = useState(null);

      const colData = useMemo(() => getMapelSchema(activeAssignment?.mapel, schemas, selectedSemester === 'SAS'), [activeAssignment, schemas, selectedSemester]);
      const fileUploadRef = useRef(null);
      const isSAS = selectedSemester === 'SAS';
      const semCode = isSAS ? 'S' : 'T';

      const theme = {
        bg: isSAS ? 'bg-[#f8faff]' : 'bg-[#fffcf8]', headerBg: isSAS ? 'bg-indigo-600' : 'bg-rose-600',
        gradient: isSAS ? 'from-indigo-600 via-blue-500 to-cyan-500' : 'from-rose-600 via-orange-500 to-amber-500', focusRing: isSAS ? 'focus:ring-indigo-500' : 'focus:ring-rose-500',
        border: isSAS ? 'border-indigo-200' : 'border-rose-200', activeBtn: isSAS ? 'bg-indigo-600 border-indigo-700 text-white shadow-md' : 'bg-rose-600 border-rose-700 text-white shadow-md',
        inactiveBtn: isSAS ? 'bg-white border-slate-200 text-slate-600 hover:bg-indigo-50 shadow-sm' : 'bg-white border-orange-200 text-rose-800 hover:bg-orange-50 shadow-sm',
        tableHover: isSAS ? 'hover:bg-indigo-50/50' : 'hover:bg-orange-100/60', rowBg: isSAS ? 'bg-white' : 'bg-[#fffcf8]', inputBg: isSAS ? 'bg-[#eef2ff]' : 'bg-[#fff7ed]', inputBorder: isSAS ? 'border-indigo-200' : 'border-orange-200',
        stickyHeader: isSAS ? 'bg-[#e2e8f0] text-slate-700' : 'bg-[#fed7aa] text-rose-900', stickyColBg: isSAS ? 'group-hover:bg-[#eef2ff]' : 'group-hover:bg-[#fff7ed]', 
        modalBg: isSAS ? 'bg-indigo-50 border-indigo-200' : 'bg-rose-50 border-rose-200', modalTextH2: isSAS ? 'text-indigo-950' : 'text-rose-950', modalTextP: isSAS ? 'text-indigo-800' : 'text-rose-800',
        modalBtnCancel: isSAS ? 'hover:bg-indigo-100 text-indigo-700 border-indigo-200' : 'hover:bg-rose-100 text-rose-700 border-rose-200', modalBtnConfirm: isSAS ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-rose-600 hover:bg-rose-700',
      };

      const labelSTS = isSAS ? (schemas.NORMAL.sts_sas || schemas.NORMAL.headers[7] || 'STS') : (schemas.NORMAL.sts_sat || 'STS');
      const labelSAS = isSAS ? (schemas.NORMAL.sas_sas || schemas.NORMAL.headers[8] || 'SAS') : (schemas.NORMAL.sas_sat || 'SAT');
      const tfHeaders = schemas.NORMAL.headers.slice(0, 7);
      const firstUhLabel = schemas.NORMAL.headers[0] || 'UH';
      const isWaliMode = activeAssignment?.type === 'WALI';

      const classStudents = useMemo(() => {
        if (!activeAssignment || activeAssignment.type === 'WALI' || !masterData.students) return [];
        const cId = String(activeAssignment.classId).toUpperCase().trim();
        return [...(masterData.students[cId] || [])].sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
      }, [activeAssignment, masterData.students]);

      const teacherProgress = useMemo(() => {
        let totalExpected = 0, totalFilled = 0; let assignmentsProgress = [];
        const tName = String(user.name).toUpperCase().trim();
        
        user.assignments.filter(a => a.type !== 'WALI').forEach(a => {
          const cId = String(a.classId).toUpperCase().trim();
          const mapel = String(a.mapel).toUpperCase().trim();
          const prefix = `${cId}-${semCode}|${mapel}|`;
          
          let expected = 0;
          let filled = 0;

          if (activeAssignment && cId === String(activeAssignment.classId).toUpperCase().trim() && mapel === String(activeAssignment.mapel).toUpperCase().trim()) {
              const schema = getMapelSchema(mapel, schemas, isSAS);
              const expItems = schema.type === 'special' ? (schema.keys.length - 1) : schema.keys.length;
              expected = classStudents.length * expItems;
              
              classStudents.forEach(student => {
                  schema.keys.forEach((key, idx) => {
                      const val = grades[student.id]?.[key];
                      if (val !== "" && val !== undefined && val !== null && (schema.type !== 'special' || idx > 0)) {
                          filled++;
                      }
                  });
              });
          } else {
              const exactKeyMatch = Object.keys(masterData.gradesSummary || {}).find(k => k.toUpperCase() === `${prefix}${tName}`);
              const matchingKey = exactKeyMatch || Object.keys(masterData.gradesSummary || {}).find(k => k.toUpperCase().startsWith(prefix));
              const sum = masterData.gradesSummary?.[matchingKey] || { uhCount: 0, uhTotal: 0 };
              expected = sum.uhTotal || 0;
              filled = sum.uhCount || 0;
          }

          totalExpected += expected; totalFilled += filled;
          assignmentsProgress.push({ ...a, pct: expected === 0 ? 0 : Math.round((filled / expected) * 100) });
        });
        return { globalPct: totalExpected === 0 ? 0 : Math.round((totalFilled / totalExpected) * 100), assignmentsProgress };
      }, [user.assignments, masterData.gradesSummary, semCode, user.name, activeAssignment, classStudents, grades, schemas, isSAS]);

      useEffect(() => { setInitializedAssignment(null); }, [activeAssignment, selectedSemester]);

      useEffect(() => {
        if (!activeAssignment || isWaliMode) return;
        const cId = String(activeAssignment.classId).toUpperCase().trim();
        const assignKey = `${cId}-${selectedSemester}-${activeAssignment.mapel}`;
        if (masterData.students && initializedAssignment !== assignKey) {
          const serverKey = `${cId}-${semCode}|${activeAssignment.mapel.toUpperCase()}`;
          const serverGradesRaw = masterData.gradesData?.[serverKey] || {};
          const initialGrades = {};
          classStudents.forEach(s => { 
            const rawData = serverGradesRaw[s.id];
            if (rawData && rawData.length > 0) { const mapped = {}; colData.keys.forEach((key, idx) => { mapped[key] = rawData[idx] !== undefined ? rawData[idx] : ""; }); initialGrades[s.id] = mapped; } 
            else { initialGrades[s.id] = colData.keys.reduce((acc, col) => ({ ...acc, [col]: '' }), {}); }
          });
          setGrades(initialGrades); setGradesHistory([initialGrades]); setHistoryIndex(0); setInitializedAssignment(assignKey);
        }
      }, [activeAssignment, selectedSemester, masterData, colData.keys, semCode, isWaliMode, initializedAssignment, classStudents]);

      const isGradesEmpty = () => { if (!classStudents.length) return true; return !Object.values(grades).some(studentGrades => Object.entries(studentGrades).some(([k, v]) => k !== 'penguji' && v !== '' && v !== null && v !== undefined)); };
      const updateGrades = (newGrades) => { const updatedHistory = gradesHistory.slice(0, historyIndex + 1); setGradesHistory([...updatedHistory, newGrades]); setHistoryIndex(updatedHistory.length); setGrades(newGrades); };
      const handleGradeChange = (studentId, columnKey, value) => { if (columnKey === 'penguji') { updateGrades({ ...grades, [studentId]: { ...grades[studentId], [columnKey]: value } }); return; } const numericVal = value.replace(/[^0-9]/g, ''); if (numericVal === '') { updateGrades({ ...grades, [studentId]: { ...grades[studentId], [columnKey]: '' } }); return; } const num = Number(numericVal); if (num >= 0 && num <= 100) { updateGrades({ ...grades, [studentId]: { ...grades[studentId], [columnKey]: num.toString() } }); } };
      
      const handleKeyDown = (e, rowIdx, colIdx) => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', 'Tab'].includes(e.key)) {
          if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'Enter') e.preventDefault(); 
          let nextRow = rowIdx; let nextCol = colIdx;
          if (e.key === 'ArrowUp') nextRow = Math.max(0, rowIdx - 1); else if (e.key === 'ArrowDown' || e.key === 'Enter') nextRow = Math.min(classStudents.length - 1, rowIdx + 1);
          else if (e.key === 'ArrowLeft') { if (e.target.selectionStart === 0) { e.preventDefault(); nextCol = Math.max(0, colIdx - 1); } }
          else if (e.key === 'ArrowRight') { if (e.target.selectionEnd === e.target.value.length) { e.preventDefault(); nextCol = Math.min(colData.keys.length - 1, colIdx + 1); } }
          else if (e.key === 'Tab') { e.preventDefault(); if (e.shiftKey) { nextCol = colIdx - 1; if (nextCol < 0) { nextCol = colData.keys.length - 1; nextRow = Math.max(0, rowIdx - 1); } } else { nextCol = colIdx + 1; if (nextCol >= colData.keys.length) { nextCol = 0; nextRow = Math.min(classStudents.length - 1, rowIdx + 1); } } }
          if (nextRow !== rowIdx || nextCol !== colIdx) { e.preventDefault(); const nextInput = document.getElementById(`input-${nextRow}-${nextCol}`); if (nextInput) { nextInput.focus(); setTimeout(() => nextInput.select(), 10); } }
        }
      };

      const handlePasteBlock = () => {
        if (!pasteText.trim()) return; const rows = pasteText.split('\n').map(row => row.split('\t')); let newGrades = { ...grades }; let pasteCount = 0; const startColIdx = colData.type === 'special' ? 1 : 0; 
        rows.forEach((row, i) => { const student = classStudents[i]; if (!student) return; let studentGrades = { ...newGrades[student.id] }; row.forEach((val, j) => { const colKey = colData.keys[startColIdx + j]; if (!colKey) return; const cleanVal = val.replace(/\r/g, '').trim(); if (cleanVal === '' || (!isNaN(cleanVal) && Number(cleanVal) >= 0 && Number(cleanVal) <= 100)) { studentGrades[colKey] = cleanVal; pasteCount++; } }); newGrades[student.id] = studentGrades; });
        updateGrades(newGrades); setShowPasteModal(false); setPasteText(''); showToast(`Tertempel ${pasteCount} nilai!`, "success");
      };

      const handlePaste = (e, startRowIdx, startColIdx) => {
        e.preventDefault(); const pasteData = e.clipboardData.getData('Text'); if (!pasteData) return; const rows = pasteData.split('\n').map(row => row.split('\t')); let newGrades = { ...grades }; let pasteCount = 0;
        rows.forEach((row, i) => { const student = classStudents[startRowIdx + i]; if (!student) return; let studentGrades = { ...newGrades[student.id] }; row.forEach((val, j) => { const colKey = colData.keys[startColIdx + j]; if (!colKey) return; const cleanVal = val.replace(/\r/g, '').trim(); if (colKey === 'penguji') { if (cleanVal !== '') { studentGrades[colKey] = cleanVal; pasteCount++; } } else { if (cleanVal === '' || (!isNaN(cleanVal) && Number(cleanVal) >= 0 && Number(cleanVal) <= 100)) { studentGrades[colKey] = cleanVal; pasteCount++; } } }); newGrades[student.id] = studentGrades; });
        updateGrades(newGrades); showToast(`Berhasil menempelkan ${pasteCount} data!`, 'success');
      };

      const handleUndo = () => { if (historyIndex > 0) { const prevIndex = historyIndex - 1; setHistoryIndex(prevIndex); setGrades(gradesHistory[prevIndex]); showToast("Undo berhasil!", "success"); } };
      const handleRedo = () => { if (historyIndex < gradesHistory.length - 1) { const nextIndex = historyIndex + 1; setHistoryIndex(nextIndex); setGrades(gradesHistory[nextIndex]); showToast("Redo berhasil!", "success"); } };

      const applyOptimisticUpdate = (newGradesMap) => {
          if(!activeAssignment || activeAssignment.type === 'WALI') return;
          const cId = String(activeAssignment.classId).toUpperCase().trim();
          const serverKey = `${cId}-${semCode}|${activeAssignment.mapel.toUpperCase()}`;
          const summaryKey = `${cId}-${semCode}|${activeAssignment.mapel.toUpperCase()}|${user.name}`;
          
          let newGradesData = { ...(masterData.gradesData || {}) };
          let newGradesSummary = { ...(masterData.gradesSummary || {}) };
          if (!newGradesData[serverKey]) newGradesData[serverKey] = {};
          
          let uhCount = 0;
          let expectedItems = colData.type === 'special' ? (colData.keys.length - 1) : colData.keys.length;
          let uhTotal = classStudents.length * expectedItems;

          classStudents.forEach(student => {
             let studentGradesRaw = [];
             colData.keys.forEach((key, idx) => {
                 const val = newGradesMap[student.id]?.[key] || "";
                 studentGradesRaw.push(val);
                 if (val !== "" && (colData.type !== 'special' || idx > 0)) uhCount++;
             });
             newGradesData[serverKey][student.id] = studentGradesRaw;
          });

          const existingSummary = newGradesSummary[summaryKey] || { stsCount: 0, stsTotal: 0, sasCount: 0, sasTotal: 0 };
          newGradesSummary[summaryKey] = { ...existingSummary, uhCount: uhCount, uhTotal: uhTotal };

          const updatedMasterData = { ...masterData, gradesData: newGradesData, gradesSummary: newGradesSummary };
          setMasterData(updatedMasterData);
          localStorage.setItem('astaga_master_cache', JSON.stringify(updatedMasterData));
      };

      const handleSaveToSpreadsheet = async () => {
        if (isGradesEmpty()) { triggerKocakPopup(KOCAK_EMPTY_WARNINGS[0], isSAS); return; }

        for (let student of classStudents) {
            const studentGrades = grades[student.id] || {};
            for (let k of colData.keys) {
                if (k !== 'penguji') {
                    const val = studentGrades[k];
                    if (val !== '' && val !== undefined && val !== null && !isNaN(val)) {
                        if (Number(val) < 70) {
                            triggerKocakPopup(`Eh eh, si ${student.name} masih ada nilai merah tuh (< 70)! 🚨 Tolong dong dikatrol dikit aja biar bisa dikirim~ 🙏🥺`, isSAS);
                            return;
                        }
                    }
                }
            }
        }

        if (colData.type === 'normal') {
            for (let student of classStudents) {
                const studentGrades = grades[student.id] || {};
                const hasAnyGrade = colData.keys.some(k => k !== 'penguji' && studentGrades[k] !== '' && studentGrades[k] !== undefined && studentGrades[k] !== null);
                
                if (hasAnyGrade) {
                    const uhValues = [];
                    for (let i = 0; i < 7; i++) { 
                        const val = studentGrades[colData.keys[i]];
                        if (val !== '' && val !== undefined && val !== null) {
                            uhValues.push(Number(val));
                        }
                    }
                    
                    if (uhValues.length < 2) {
                        triggerKocakPopup(`Ups! ${student.name} baru punya ${uhValues.length} nilai UH nih. Kasih minimal 2 dong, biar adil~ ✌️😂`, isSAS);
                        return; 
                    }
                }
            }
        }

        setIsSaving(true);
        applyOptimisticUpdate(grades);
        
        const dataToSubmit = { action: "saveGrades", guru: user.name, kelas: activeAssignment.classId, semester: selectedSemester, mapel: activeAssignment.mapel, isSpecial: colData.type === 'special', schema: colData.schema, keys: colData.keys, grades: classStudents.map(student => ({ id: student.id, nama: student.name, ...grades[student.id] })) };
        try { 
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dataToSubmit) }); 
            showToast('Selesai! Nilai tersimpan di Awan ☁️', 'success'); 
        } catch (error) { 
            showToast('Gagal kirim ke Awan.', 'error'); 
        } finally { 
            setIsSaving(false); 
        }
      };

      const executeResetServer = async () => {
        setShowConfirmReset(false); setIsSaving(true); 
        const emptyGrades = {}; classStudents.forEach(s => { emptyGrades[s.id] = colData.keys.reduce((acc, col) => ({ ...acc, [col]: '' }), {}); });
        applyOptimisticUpdate(emptyGrades); updateGrades(emptyGrades);
        
        const dataToSubmit = { action: "saveGrades", guru: user.name, kelas: activeAssignment.classId, semester: selectedSemester, mapel: activeAssignment.mapel, isSpecial: colData.type === 'special', schema: colData.schema, keys: colData.keys, grades: classStudents.map(student => ({ id: student.id, nama: student.name, ...emptyGrades[student.id] })) };
        try { 
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dataToSubmit) }); 
            showToast('Berhasil! Data di GAS dikosongkan ☁️', 'success'); 
        } catch (error) { 
            showToast('Gagal mereset ke GAS.', 'error'); 
        } finally { 
            setIsSaving(false); 
        }
      };

      const requestSwitchClass = (assignment) => { if (assignment.classId === activeAssignment.classId && assignment.mapel === activeAssignment.mapel) return; setSwitchIndex(Math.floor(Math.random() * SWITCH_CLASS_MSGS.length)); setTargetAssignment(assignment); setShowSwitchPopup(true); };
      const confirmSwitchClass = () => { setActiveAssignment(targetAssignment); setShowSwitchPopup(false); };

      const downloadDetailedGradesExcel = () => {

              <div className={`w-full max-w-sm rounded-[28px] p-5 border shadow-2xl transform hover:scale-[1.02] transition-all ${theme.modalBg}`}>
                <div className="text-4xl mb-2 text-center animate-bounce">🥷</div><h2 className={`text-sm font-black mb-1.5 text-center ${theme.modalTextH2}`}>COPAS JALUR NINJA</h2><p className={`text-[10px] font-semibold mb-3 text-center ${theme.modalTextP}`}>Tinggal Ctrl+C di Excel, trus Ctrl+V di sini. Kelar deh! ✨</p>
                <textarea rows="5" className={`w-full border rounded-xl p-2.5 text-[10px] ${theme.focusRing} mb-4 bg-white/80 ${theme.inputBorder}`} placeholder="Paste (Ctrl+V) di sini..." value={pasteText} onChange={(e) => setPasteText(e.target.value)} />
                <div className="flex gap-2"><button onClick={() => { setShowPasteModal(false); setPasteText(''); }} className={`flex-1 py-2 rounded-xl bg-white border font-bold text-[10px] hover:scale-105 active:scale-95 shadow-sm ${theme.modalBtnCancel}`}>Batal</button><button onClick={handlePasteBlock} className={`flex-1 py-2 rounded-xl text-white font-bold text-[10px] shadow-md hover:scale-105 active:scale-95 ${theme.modalBtnConfirm}`}>Tempel Nilai</button></div>
              </div>
            </div>
          )}
          {showConfirmReset && (
            <div className="fixed inset-0 z-[99999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in">
              <div className={`relative w-full max-w-sm rounded-[28px] p-6 border shadow-2xl transform hover:scale-[1.02] transition-all ${theme.modalBg}`}>
                <div className="text-4xl mb-2 animate-bounce">😱</div><h2 className={`text-sm font-black mb-1.5 text-center ${theme.modalTextH2}`}>SERIUS NIH?</h2><p className={`text-[10px] font-semibold mb-4 text-center leading-relaxed ${theme.modalTextP}`}>Serius mau <strong>HAPUS SEMUA</strong> nilai {activeAssignment?.mapel} Kelas {activeAssignment?.classId}? Ntar hilang beneran lho, no debat!</p>
                <div className="flex gap-2"><button onClick={() => setShowConfirmReset(false)} className={`flex-1 py-2.5 rounded-xl bg-white border font-bold text-[10px] shadow-sm active:scale-95 transition-all ${theme.modalBtnCancel}`}>Gak Jadi</button><button onClick={executeResetServer} className={`flex-1 py-2.5 rounded-xl text-white font-bold text-[10px] shadow-md active:scale-95 transition-all ${theme.modalBtnConfirm}`}>Ya, Hapus GAS!</button></div>
              </div>
            </div>
          )}

          <header className={`flex-none text-white shadow-md h-12 flex items-center justify-between px-4 z-30 transition-colors duration-500 ${theme.headerBg}`}>
            <div className="flex items-center space-x-2"><img src="icon.png" alt="Logo" onError={(e) => { e.target.onerror = null; e.target.style.display = 'none'; }} className="w-6 h-6 object-contain rounded bg-white/20 p-0.5" /><div><h1 className="font-extrabold text-sm tracking-wide leading-none uppercase">{user.name}</h1><p className="text-[9px] text-white/80 font-bold truncate max-w-[200px]">{isWaliMode ? `Guru Kelas ${activeAssignment?.classId}` : `Guru Pengampu Kls ${activeAssignment?.classId} - ${activeAssignment?.mapel}`}</p></div></div>
            <div className="flex items-center space-x-3">{isFetchingData && <div className="text-right hidden sm:block"><p className="text-[10px] font-bold text-white/80 animate-pulse">Sedang menyinkronkan...</p></div>}<div className="text-right hidden sm:block"><p className="text-[10px] font-bold leading-tight">{user.name}</p></div><button onClick={onLogout} className="p-1.5 bg-black/20 hover:bg-red-500 rounded-full transition-all hover:scale-105 shadow-inner" title="Keluar"><IconLogOut className="w-4 h-4" /></button></div>
          </header>

          <main className="flex-1 flex flex-col overflow-hidden w-full">
            <div className="flex-none space-y-2 sm:space-y-3 p-2 sm:p-4 pb-0">
              <div className={`flex p-1.5 rounded-xl w-full max-w-sm mx-auto shadow-inner transition-colors duration-500 ${isSAS ? 'bg-indigo-200/50' : 'bg-rose-200/50'}`}><button onClick={() => setSelectedSemester('SAS')} className={`flex-1 py-2.5 text-[11px] font-black uppercase rounded-lg transition-all duration-300 ${isSAS ? 'bg-indigo-600 shadow-md text-white scale-105' : 'text-indigo-800 hover:bg-indigo-100/50'}`}>Semester 1 (SAS)</button><button onClick={() => setSelectedSemester('SAT')} className={`flex-1 py-2.5 text-[11px] font-black uppercase rounded-lg transition-all duration-300 ${!isSAS ? 'bg-rose-600 shadow-md text-white scale-105' : 'text-rose-800 hover:bg-rose-100/50'}`}>Semester 2 (SAT)</button></div>
              <div className={`bg-gradient-to-r ${theme.gradient} rounded-xl p-3 shadow-md relative overflow-hidden flex items-center justify-between hover:scale-[1.01] transition-all mt-2 duration-500`}>
                <div className="absolute top-0 left-0 w-full h-full bg-white opacity-5 pointer-events-none transform -skew-x-12 scale-150"></div>
                <div className="relative z-10 flex items-center gap-1.5"><IconActivity className="w-4 h-4 text-white animate-pulse"/><h2 className="text-white font-black text-[11px] uppercase tracking-widest hidden sm:block">Progres Kerjamu</h2><h2 className="text-white font-black text-[11px] uppercase tracking-widest sm:hidden">Progres</h2></div>
                <div className="relative z-10 flex-1 ml-4 sm:ml-8 max-w-sm bg-white/10 p-1.5 rounded-xl border border-white/20 backdrop-blur-sm flex items-center justify-between gap-3 shadow-inner"><span className="text-white font-black text-[9px] bg-black/20 px-2 py-0.5 rounded border border-white/10">{teacherProgress.globalPct}%</span><div className="flex-1 bg-black/20 rounded-full h-1.5 overflow-hidden"><div className="h-1.5 rounded-full transition-all duration-1000 ease-out bg-gradient-to-r from-rose-400 via-amber-400 via-emerald-400 to-cyan-300 shadow-[0_0_8px_rgba(255,255,255,0.8)]" style={{ width: `${teacherProgress.globalPct}%` }}></div></div></div>
              </div>
              <div>
                <div className={`grid ${user.assignments.length > 3 ? 'grid-rows-2' : 'grid-rows-1'} grid-flow-col auto-cols-[145px] sm:auto-cols-[180px] gap-2 pb-2 overflow-x-auto scrollbar-hide snap-x`}>
                  {user.assignments.find(a => a.type === 'WALI') && (<button onClick={() => requestSwitchClass(user.assignments.find(a => a.type === 'WALI'))} className={`row-span-2 flex flex-col items-center justify-center px-4 py-3 rounded-xl border transition-all hover:scale-[1.05] active:scale-95 shadow-sm snap-start ${isWaliMode ? 'bg-amber-500 border-amber-600 text-white shadow-md' : 'bg-amber-50 border-amber-200 text-amber-900 hover:bg-amber-100'}`}><span className="text-2xl mb-1 block">👑</span><span className={`block text-[11px] font-black text-center leading-snug`}>WALI KELAS<br/>{user.assignments.find(a => a.type === 'WALI').classId}</span></button>)}
                  {teacherProgress.assignmentsProgress.map((assign, idx) => {
                    const isActive = assign.classId === activeAssignment?.classId && assign.mapel === activeAssignment?.mapel && assign.type !== 'WALI';
                    return (
                      <button key={idx} onClick={() => requestSwitchClass(assign)} className={`flex flex-col justify-center gap-1.5 px-3 py-2.5 rounded-xl border transition-all hover:scale-[1.05] active:scale-95 shadow-sm snap-start ${isActive ? theme.activeBtn : theme.inactiveBtn}`}>
                        <div className="flex items-center justify-between w-full gap-2"><span className={`text-[11px] sm:text-xs font-black truncate ${isActive?'text-white':isSAS?'text-slate-800':'text-rose-950'}`} title={assign.mapel}>{assign.mapel}</span><span className={`text-[9px] font-extrabold px-1.5 py-0.5 rounded-md whitespace-nowrap ${isActive?'bg-white/20 text-white':isSAS?'bg-indigo-100 text-indigo-700':'bg-rose-100 text-rose-700'}`}>{assign.classId}</span></div>
                        <div className="w-full flex items-center gap-2"><div className={`flex-1 rounded-full h-1.5 overflow-hidden ${isActive?'bg-black/20':'bg-slate-200'}`}><div className={`h-1.5 rounded-full ${isActive?'bg-white':isSAS?'bg-indigo-500':'bg-rose-500'}`} style={{ width: `${assign.pct}%` }}></div></div><span className={`text-[9px] font-black ${isActive?'text-white':isSAS?'text-slate-500':'text-rose-600'}`}>{assign.pct}%</span></div>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            {isWaliMode ? renderWaliKelasView() : (
              <div className={`flex-1 flex flex-col overflow-hidden bg-white rounded-2xl shadow-sm border mt-1 min-h-0 mx-2 sm:mx-4 mb-2 transition-colors duration-500 ${theme.border}`}>
                <div className="flex-none bg-slate-50 p-2 sm:p-3 border-b border-slate-200">
                   <div className="flex items-center justify-start sm:justify-between gap-4 overflow-x-auto scrollbar-hide w-full pb-1">
                     <div className="flex items-center gap-1.5 flex-none">
                       <button onClick={downloadDetailedGradesExcel} className={`flex-auto sm:flex-none justify-center flex items-center gap-1 bg-white border border-slate-300 ${isSAS ? 'text-indigo-700 hover:bg-indigo-50' : 'text-rose-700 hover:bg-rose-50'} px-3 py-2 sm:py-1.5 rounded-lg text-[10px] font-black active:scale-95 shadow-sm whitespace-nowrap transition-colors`}><IconDownload className="w-3 h-3"/> Unduh Excel</button>
                       <button onClick={() => fileUploadRef.current.click()} className="flex-auto sm:flex-none justify-center flex items-center gap-1 bg-emerald-50 border border-emerald-200 text-emerald-700 px-3 py-2 sm:py-1.5 rounded-lg text-[10px] font-black hover:bg-emerald-100 active:scale-95 shadow-sm whitespace-nowrap"><IconUploadCloud className="w-3 h-3"/> Upload</button>
                       <input type="file" accept=".xls,.xlsx" ref={fileUploadRef} onChange={handleUploadExcelGrades} className="hidden" />
                       <div className="hidden sm:block w-px h-5 bg-slate-300 mx-1"></div>
                       <button onClick={() => setShowPasteModal(true)} className="flex-auto sm:flex-none justify-center flex items-center gap-1 bg-white border border-slate-300 text-slate-700 px-3 py-2 sm:py-1.5 rounded-lg text-[10px] font-black hover:bg-slate-100 active:scale-95 shadow-sm whitespace-nowrap"><IconFileText className="w-3 h-3"/> Paste</button>
                       <button onClick={handleUndo} disabled={historyIndex <= 0} className="flex-auto sm:flex-none justify-center flex items-center gap-1 bg-white text-slate-700 border border-slate-300 px-3 py-2 sm:py-1.5 rounded-lg text-[10px] font-black hover:bg-slate-50 disabled:opacity-40 shadow-sm whitespace-nowrap">↩️ Undo</button>
                       <button onClick={handleRedo} disabled={historyIndex >= gradesHistory.length - 1} className="flex-auto sm:flex-none justify-center flex items-center gap-1 bg-white text-slate-700 border border-slate-300 px-3 py-2 sm:py-1.5 rounded-lg text-[10px] font-black hover:bg-slate-50 disabled:opacity-40 shadow-sm whitespace-nowrap">↪️ Redo</button>
                     </div>
                     <div className="flex flex-wrap items-center gap-1.5 w-full sm:w-auto flex-1 sm:flex-none mt-1 sm:mt-0">
                       <button onClick={() => onForceRefresh()} disabled={isFetchingData} className="flex-auto sm:flex-none justify-center flex items-center gap-1 bg-sky-50 border border-sky-200 text-sky-700 px-3 py-2 sm:py-1.5 rounded-lg text-[10px] font-black hover:bg-sky-100 active:scale-95 shadow-sm whitespace-nowrap disabled:opacity-50">{isFetchingData ? <IconRefresh className="w-3 h-3 animate-spin"/> : <IconRefresh className="w-3 h-3"/>} Tarik Data</button>
                       <div className="hidden sm:block w-px h-5 bg-slate-300 mx-1"></div>
                       <button onClick={() => { const r = {}; classStudents.forEach(s => r[s.id] = colData.keys.reduce((acc, col) => ({ ...acc, [col]: '' }), {})); updateGrades(r); showToast("Layar Dikosongkan!", "success"); }} className="flex-auto sm:flex-none justify-center flex items-center gap-1 bg-slate-100 border border-slate-300 text-slate-700 px-3 py-2 sm:py-1.5 rounded-lg text-[10px] font-black hover:bg-slate-200 active:scale-95 shadow-sm whitespace-nowrap">🗑️ Kosong</button>
                       <button onClick={() => setShowConfirmReset(true)} className="flex-auto sm:flex-none justify-center flex items-center gap-1 bg-rose-100 border border-rose-300 text-rose-700 px-3 py-2 sm:py-1.5 rounded-lg text-[10px] font-black hover:bg-rose-200 active:scale-95 shadow-sm whitespace-nowrap">⚠️ Reset</button>
                       <button onClick={handleSaveToSpreadsheet} disabled={isSaving || classStudents.length === 0} className={`flex-auto sm:flex-none justify-center flex items-center space-x-1 active:scale-95 text-white px-5 py-2 sm:py-1.5 rounded-lg transition-colors shadow-md disabled:opacity-50 font-black text-[10px] whitespace-nowrap ${theme.headerBg} hover:opacity-90`}>{isSaving ? <span className="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></span> : <IconSend className="w-3 h-3" />}<span>Kirim</span></button>
                     </div>
                   </div>
                </div>

                <div className="flex-1 overflow-auto relative bg-white rounded-b-2xl">
                  <div className="min-w-max bg-white">
                    <table className="w-full text-xs text-left text-slate-600 border-separate border-spacing-0">
                      <thead className="shadow-sm bg-white">
                      {colData.type === 'normal' ? (
                        <React.Fragment>
                        <tr>
                          <th rowSpan="3" className={`w-[30px] min-w-[30px] max-w-[30px] sm:w-[45px] sm:min-w-[45px] sm:max-w-[45px] px-1 sm:px-2 text-center sticky left-0 z-[90] border-b border-r border-slate-300 bg-white bg-clip-padding`}>No</th>
                          <th rowSpan="3" className={`w-[90px] min-w-[90px] max-w-[90px] sm:w-[180px] sm:min-w-[180px] sm:max-w-[180px] px-1.5 sm:px-3 sticky left-[30px] sm:left-[45px] z-[90] border-b border-r-[3px] !border-r-slate-400 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.15)] bg-white bg-clip-padding`}>Nama Siswa</th>
                          <th colSpan={colData.keys.length} className={`px-2 text-center border-b border-r-[3px] !border-r-slate-400 bg-clip-padding ${isSAS ? 'bg-indigo-500 text-white' : 'bg-rose-500 text-white'}`}>{activeAssignment.mapel}</th>
                        </tr>
                        <tr>
                           <th colSpan="7" className="px-1 text-center border-b border-r-[3px] !border-r-slate-400 bg-slate-100 text-slate-800 bg-clip-padding">FORMATIF (UH)</th>
                           <th rowSpan="2" className="px-1 text-center border-b border-r-[3px] !border-r-slate-400 bg-pink-200 text-slate-900 bg-clip-padding">{labelSTS}</th>
                           <th rowSpan="2" className="px-1 text-center border-b border-r-[3px] !border-r-slate-400 bg-orange-200 text-slate-900 bg-clip-padding">{labelSAS}</th>
                        </tr>
                        <tr>
                           {tfHeaders.map((tf, idx) => <th key={tf} className={`px-0.5 sm:px-2 text-center border-b ${idx===6?'border-r-[3px] !border-r-slate-400':'border-r border-slate-300'} bg-white text-slate-800 bg-clip-padding`}>{tf}</th>)}
                        </tr>
                        </React.Fragment>
                        ) : (
                          <React.Fragment>
                          <tr>
                            <th rowSpan="4" className={`w-[30px] min-w-[30px] max-w-[30px] sm:w-[45px] sm:min-w-[45px] sm:max-w-[45px] px-1 sm:px-2 text-center sticky left-0 z-[90] border-b border-r border-slate-300 align-middle bg-white bg-clip-padding`}>No</th>
                            <th rowSpan="4" className={`w-[90px] min-w-[90px] max-w-[90px] sm:w-[180px] sm:min-w-[180px] sm:max-w-[180px] px-1.5 sm:px-3 sticky left-[30px] sm:left-[45px] z-[90] border-b border-r-[3px] !border-r-slate-400 align-middle shadow-[2px_0_5px_-2px_rgba(0,0,0,0.15)] bg-white bg-clip-padding`}>Nama Siswa</th>
                            <th colSpan={colData.keys.length} className={`px-2 text-center border-b border-r-[3px] !border-r-slate-400 bg-clip-padding ${isSAS ? 'bg-indigo-500 text-white' : 'bg-rose-500 text-white'}`}>{activeAssignment.mapel}</th>
                          </tr>
                          <tr>
                            <th rowSpan="3" className={`px-2 min-w-[60px] sm:min-w-[130px] border-b border-r-[3px] !border-r-slate-400 text-center align-middle bg-slate-200 text-slate-900 bg-clip-padding`}>Penguji</th>
                            {colData.schema.categories.map((cat, cIdx) => <th key={cat.name} colSpan={cat.items.length * 3} className={`px-1 text-center border-b border-r-[3px] !border-r-slate-400 font-black text-[11px] bg-clip-padding ${isSAS ? 'text-slate-900' : 'text-rose-950'}`} style={{backgroundColor: cat.color}}>{cat.name}</th>)}
                          </tr>
                          <tr>
                            {colData.schema.categories.map((cat, cIdx) => cat.items.map((item, iIdx) => (
                                <th key={item} colSpan="3" className={`px-0.5 sm:px-2 text-center border-b ${iIdx === cat.items.length -1 ? 'border-r-[3px] !border-r-slate-400' : 'border-r border-slate-300'} text-[10px] font-black bg-clip-padding ${isSAS ? 'text-slate-900' : 'text-rose-950'} ${ITEM_BG_COLORS[cIdx % ITEM_BG_COLORS.length]}`}>{item}</th>
                            )))}
                          </tr>
                          <tr>
                            {colData.schema.categories.map((cat, cIdx) => cat.items.map((item, iIdx) => (
                                <React.Fragment key={`${cat.name}-${item}-sub`}>
                                  <th className={`px-0.5 sm:px-1 text-center border-b border-r border-slate-300 text-[9px] font-bold bg-slate-50 text-slate-800 bg-clip-padding`}>{firstUhLabel}</th>
                                  <th className={`px-0.5 sm:px-1 text-center border-b border-r border-slate-300 text-[9px] font-bold bg-slate-50 text-slate-800 bg-clip-padding`}>{labelSTS}</th>
                                  <th className={`px-0.5 sm:px-1 text-center border-b ${iIdx === cat.items.length -1 ? 'border-r-[3px] !border-r-slate-400' : 'border-r border-slate-300'} text-[9px] font-bold bg-slate-50 text-slate-800 bg-clip-padding`}>{labelSAS}</th>
                                </React.Fragment>
                            )))}
                          </tr>
                          </React.Fragment>
                        )}
                      </thead>
                      <tbody>
                      {classStudents.length === 0 ? (
                        <tr><td colSpan={colData.keys.length + 2} className="text-center py-8 font-bold text-slate-400 text-sm bg-white border-b border-slate-100">Siswa kosong. Hubungi Admin!</td></tr>
                      ) : classStudents.map((student, rowIdx) => (
                        <tr key={student.id} className={`transition-colors duration-200 group ${theme.tableHover} ${theme.rowBg}`}>
                          <td className={`w-[30px] min-w-[30px] max-w-[30px] sm:w-[45px] sm:min-w-[45px] sm:max-w-[45px] px-1 sm:px-2 py-4 font-black text-slate-500 text-center align-middle sticky left-0 z-[50] border-b border-r border-slate-200 transition-colors bg-clip-padding text-[9px] sm:text-xs ${theme.rowBg} ${theme.stickyColBg}`}>{rowIdx + 1}</td>
                          <td className={`w-[90px] min-w-[90px] max-w-[90px] sm:w-[180px] sm:min-w-[180px] sm:max-w-[180px] px-1.5 sm:px-3 py-4 font-bold text-slate-800 align-middle sticky left-[30px] sm:left-[45px] z-[50] truncate border-b border-r-[3px] !border-r-slate-400 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.15)] transition-colors bg-clip-padding text-[10px] sm:text-xs leading-tight ${theme.rowBg} ${theme.stickyColBg}`}>{student.name}</td>
                          {colData.keys.map((colKey, colIdx) => {
                              const val = grades[student.id]?.[colKey];
                              const tBorder = getThickBorderClass(colKey, colData.type, colIdx === colData.keys.length - 1);
                              
                              if (colKey === 'penguji') {
                                return (
                                  <td key={colKey} className={`p-1 border-b align-middle ${tBorder} transition-colors ${theme.inputBg}`}>
                                    <input id={`input-${rowIdx}-${colIdx}`} type="text" value={val||''} onChange={e=>handleGradeChange(student.id, colKey, e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rowIdx, colIdx)} onPaste={(e) => handlePaste(e, rowIdx, colIdx)} className={`w-full min-w-[60px] h-[30px] sm:min-w-[100px] sm:h-[36px] px-1 sm:px-2 rounded border text-[10px] sm:text-xs font-bold ${theme.focusRing} focus:ring-2 transition-all text-center shadow-inner ${theme.inputBorder} bg-white/70 ${isSAS ? 'text-slate-800' : 'text-rose-950'}`}/>
                                  </td>
                                );
                              }
                              
                              const isRemedi = val !== '' && !isNaN(val) && Number(val) < 70;
                              const isSuccess = val !== '' && !isNaN(val) && Number(val) >= 70;
                              const parts = colKey.split('_');
                              const itemIdx = parts.length > 1 ? parseInt(parts[0]) : 0; 
                              const bgClass = colData.type === 'special' ? ITEM_BG_COLORS[itemIdx % ITEM_BG_COLORS.length] : theme.inputBg;

                              return (
                                <td key={colKey} className={`p-1 border-b align-middle ${tBorder} ${bgClass}`}>
                                  <input id={`input-${rowIdx}-${colIdx}`} type="text" inputMode="numeric" placeholder="-" value={val || ''} 
                                    onChange={(e) => handleGradeChange(student.id, colKey, e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rowIdx, colIdx)} onPaste={(e) => handlePaste(e, rowIdx, colIdx)}
                                    className={`w-[28px] h-[30px] sm:w-[45px] sm:h-[36px] mx-auto block text-center rounded border focus:outline-none focus:ring-2 transition-all font-black text-[10px] sm:text-xs shadow-sm box-border px-0.5
                                      ${isRemedi ? 'bg-rose-600 text-white border-rose-700 focus:ring-rose-400 placeholder-rose-300 shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]' 
                                      : `${theme.rowBg} ${theme.inputBorder} ${theme.focusRing} ` + (isSuccess ? 'text-emerald-700 shadow-[inset_0_1px_3px_rgba(16,185,129,0.3)]' : (isSAS ? 'text-slate-900 shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)]' : 'text-rose-950 shadow-[inset_0_1px_2px_rgba(234,88,12,0.1)]'))}
                                    `} 
                                  />
                                </td>
                              );
                            })}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
