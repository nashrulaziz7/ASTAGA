<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ASTAGA - Asisten Sistem Terpadu Guru Al Kautsar</title>
  
  <!-- Memuat Tailwind CSS untuk Desain -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Memuat React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Memuat Babel untuk mentranspilasi React (JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Memuat SheetJS untuk membaca dan membuat file Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Pengaturan Font Inter untuk estetika yang lebih modern & jelas -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body, html, #root { 
      font-family: 'Inter', sans-serif; 
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* CSS STICKY PAKU BUMI ANTI NGEFLY (BOCOR SUDAH DITAMBAL PERMANEN) */
    .sticky-no { 
      position: sticky; left: 0; width: 40px; min-width: 40px; max-width: 40px; 
      z-index: 40 !important; background-color: #ffffff; border-right: 1px solid #e2e8f0; 
      background-clip: padding-box; 
    }
    .sticky-nama { 
      position: sticky; left: 40px; width: 180px; min-width: 180px; max-width: 180px; 
      z-index: 40 !important; background-color: #ffffff; border-right: 2px solid #94a3b8; 
      box-shadow: 2px 0 5px -2px rgba(0,0,0,0.15); background-clip: padding-box; 
    }
    
    .sticky-header-no { z-index: 50 !important; background-color: #f8fafc !important; top: 0; }
    .sticky-header-nama { z-index: 50 !important; background-color: #f8fafc !important; top: 0; border-right: 2px solid #94a3b8; box-shadow: 2px 0 5px -2px rgba(0,0,0,0.15); }
    
    /* Efek hover untuk kolom sticky paku bumi agar selaras dengan barisnya */
    tbody tr:hover .sticky-no, tbody tr:hover .sticky-nama { background-color: #eef2ff !important; }

    .sticky-top-row { position: sticky; top: 0; z-index: 30; }
    .sticky-top-2 { position: sticky; top: 31px; z-index: 30; }
    .sticky-top-3 { position: sticky; top: 62px; z-index: 30; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased text-xs">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // =========================================================================
    // --- 1. DEKLARASI KONSTAN GLOBAL & LINK GAS ---
    // =========================================================================
    // 🔥 LINK GAS TERBARU BOSKU 🔥
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4kVdn7U-DcRxkeSEUaRb9Pv2yXKPdmnI34bZDlXJ1zYWcRolhrNSD-ctGpS_MjV3b/exec';

    const GRADE_COLUMNS_NORMAL = ['UH1', 'UH2', 'UH3', 'UH4', 'UH5', 'UH6', 'UH7', 'STS', 'SAS'];

    const DEFAULT_MAPELS = [
      "PENDIDIKAN AGAMA ISLAM", "KEMUHAMMADIYAHAN", "PENDIDIKAN PANCASILA",
      "BAHASA INDONESIA", "ILMU PENGETAHUAN ALAM DAN SOSIAL", "MATEMATIKA",
      "PENDIDIKAN JASMANI, OLAHRAGA DAN KESEHATAN", "BAHASA INGGRIS", "KESENIAN", 
      "KODING", "BAHASA JAWA", "BAHASA ARAB", "IBADAH (WUDHU, TAYAMUM, SHALAT)", 
      "TAHFIDZ", "IQRA'"
    ];

    // WARNA PASTEL BACKGROUND UNTUK SUB-BAB
    const ITEM_BG_COLORS = ['bg-sky-100', 'bg-emerald-100', 'bg-amber-100', 'bg-violet-100', 'bg-pink-100', 'bg-teal-100', 'bg-orange-100', 'bg-indigo-100'];

    // --- SKEMA MAPEL KHUSUS ---

      "IBADAH (WUDHU, TAYAMUM, SHALAT)": {
        categories: [
          { name: "Wudhu", color: "#86efac", items: ["Niat", "Cuci Tangan", "Kumur", "Hidung", "Muka", "Tangan Siku", "Kepala Telinga", "Kaki", "Tertib", "Doa"] },
          { name: "Tayamum", color: "#67e8f9", items: ["Niat", "Letak Tangan", "Tiup", "Usap Muka", "Usap Tangan", "Tertib"] },
          { name: "Shalat", color: "#c4b5fd", items: ["Takbiratul Ihram", "Bersedekap", "Bacaan Do'a Iftitah", "Bacaan Surat Al-Fatihah", "Gerakan Ruku'", "Do'a Ruku'", "Gerakan I'tidal", "Do'a I'tidal", "Gerakan Sujud", "Do'a Sujud", "Gerakan Duduk Diantara Dua Sujud", "Do'a Diantara Dua Sujud", "Gerakan Duduk Tahiyat Akhir", "Bacaan Attahiyat & Shalawat", "Salam"] }
        ]
      },
      "TAHFIDZ": {
        categories: [
          { name: "Tahfidz", color: "#38bdf8", items: ["Kelancaran", "Tajwid", "Makharijul Huruf", "S-1", "S-2", "S-3", "S-4", "S-5", "S-6", "S-7"] }
        ]
      },
      "IQRA'": {
        categories: [
          { name: "Iqra'", color: "#fdba74", items: ["Ta'awudz & Basmalah", "Kesepatan Membaca", "Kelancaran Membaca", "Suara", "Hal-1", "Hal-2", "Hal-3", "Hal-4", "Hal-5", "Hal-6"] }
        ]
      }
    };

    const getMapelSchema = (mapelName) => {
      const special = SPECIAL_MAPELS[mapelName.toUpperCase().trim()];
      if (!special) return { type: 'normal', keys: GRADE_COLUMNS_NORMAL, headers: GRADE_COLUMNS_NORMAL };
      
      const keys = ['penguji'];
      special.categories.forEach((cat, cIdx) => {
        cat.items.forEach((item, iIdx) => {
          keys.push(`${cIdx}_${iIdx}_UH`); keys.push(`${cIdx}_${iIdx}_STS`); keys.push(`${cIdx}_${iIdx}_SAT`);
        });
      });
      return { type: 'special', keys, schema: special };
    };

    const DEFAULT_MASTER_DATA = { teachers: [], students: {}, gradesSummary: {}, gradesData: {} };

    const AVATAR_COLORS = ['bg-indigo-200 border-indigo-400 text-indigo-900', 'bg-emerald-200 border-emerald-400 text-emerald-900', 'bg-amber-200 border-amber-400 text-amber-900', 'bg-fuchsia-200 border-fuchsia-400 text-fuchsia-900', 'bg-sky-200 border-sky-400 text-sky-900', 'bg-rose-200 border-rose-400 text-rose-900'];
    const TEACHER_CARD_COLORS = ['bg-gradient-to-br from-indigo-100/95 via-indigo-50/50 to-white border-indigo-300/80 shadow-md shadow-indigo-100/40 hover:border-indigo-500 hover:shadow-lg', 'bg-gradient-to-br from-emerald-100/95 via-emerald-50/50 to-white border-emerald-300/80 shadow-md shadow-emerald-100/40 hover:border-emerald-500 hover:shadow-lg', 'bg-gradient-to-br from-amber-100/95 via-amber-50/50 to-white border-amber-300/80 shadow-md shadow-amber-100/40 hover:border-amber-500 hover:shadow-lg', 'bg-gradient-to-br from-fuchsia-100/95 via-fuchsia-50/50 to-white border-fuchsia-300/80 shadow-md shadow-fuchsia-100/40 hover:border-fuchsia-500 hover:shadow-lg', 'bg-gradient-to-br from-sky-100/95 via-sky-50/50 to-white border-sky-300/80 shadow-md shadow-sky-100/40 hover:border-sky-500 hover:shadow-lg', 'bg-gradient-to-br from-rose-100/95 via-rose-50/50 to-white border-rose-300/80 shadow-md shadow-rose-100/40 hover:border-rose-500 hover:shadow-lg'];

    const SUCCESS_LOGIN_MSGS = [{ emoji: '🥳🎉', title: 'WUIH MANTAP!', desc: 'Berhasil masuk Suhu! Sini saya bantu ketikin nilainya~ ❤️' }];
    const ERROR_LOGIN_MSGS = [{ emoji: '🤦‍♂️🤪', title: 'GAGAL FOKUS!', desc: 'Aduh gagal! Passwordnya salah atau kurang kopi nih? ☕' }];
    const ROMANTIC_REMEDI_MSGS = [{ emoji: '🥺🌹', title: 'Tunggu Dulu Guru Keren...', desc: 'Masih ada nilai anak-anak di bawah KKM tuh. Masa depannya jangan dimerahkan ya... 🥺' }];
    const SWITCH_CLASS_MSGS = [{ emoji: '🫣💔', title: 'YAKIN SIAP BERPALING?', desc: 'Pastikan nilai di kelas ini udah kamu Kirim ya biar aman! 🥺' }];
    const KOCAK_EMPTY_WARNINGS = ["Wandeeeh bos! Nilainya masih kosong melompong gini mau dikirim? Guru gaib ya yang dapet nilai? Isinya jangan kosong kayak dompet tanggal tua dong! 🤪💸", "Astaga naga! Nilainya masih kosong bersih gini mau diunduh? Masa ngunduh angin puyuh sih? Isi dulu minimal satu nilai siswa ya bos! 👻🔥"];

    function IconLock({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;}
    function IconUser({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;}
    function IconLogOut({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;}
    function IconBookOpen({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;}
    function IconGraduationCap({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>;}
    function IconSave({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;}
    function IconSettings({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 1 0 5.66 5.66"></path></svg>;}
    function IconCheckCircle({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;}
    function IconAlertCircle({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;}
    function IconFileText({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;}
    function IconUsers({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;}
    function IconActivity({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;}
    function IconDownload({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;}
    function IconUploadCloud({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path><polyline points="16 16 12 12 8 16"></polyline></svg>;}
    function IconRefresh({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>;}
    function IconSend({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;}
    function IconEdit({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;}
    function IconTrash({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;}
    function IconPlus({className}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;}

    // =========================================================================
    // --- 3. KOMPONEN POPUP GLOBAL ---
    // =========================================================================
    function FunnyDeletePopup({ show, targetName, type, onConfirm, onCancel }) {
      if (!show) return null;
      let desc = `Beneran mau menghapus ${targetName}? Nanti kalau kangen gimana?`;
      if (type === 'teacher') desc = `Yakin mau usir Guru ${targetName}? Ntar siapa yang ngisi nilainya bos? 🥺`;
      if (type === 'student') desc = `Mau mengeluarkan ${targetName}? Jangan-jangan dia anak baek-baek... 😱`;
      if (type === 'class') desc = `Hapus Kelas ${targetName} berserta seluruh siswanya? Kosong melompong dong nanti... 🌪️`;
      if (type === 'mapel') desc = `Hapus Mata Pelajaran ${targetName} dari sekolah? Nanti anak-anak belajar apa dong... 📚`;

      return (
        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">
          <div className="relative w-full max-w-xs rounded-3xl p-5 text-center shadow-2xl bg-rose-50 border border-rose-200 transform animate-[scale_0.2s_ease-out] hover:scale-[1.03] active:scale-95 transition-all">
            <div className="text-4xl mb-2 animate-bounce">😭💔</div>
            <h2 className="text-base font-black mb-1 tracking-tight text-rose-950">YAKIN MAU HAPUS?</h2>
            <p className="text-[11px] mb-4 font-semibold text-rose-800 opacity-90">{desc}</p>
            <div className="flex gap-2">
              <button onClick={onCancel} className="flex-1 py-2 rounded-xl bg-white border border-rose-200 hover:bg-rose-100 text-rose-700 font-bold text-[11px] transition-all shadow-sm">Gak Jadi 🥺</button>
              <button onClick={onConfirm} className="flex-1 py-2 rounded-xl bg-rose-600 hover:bg-rose-700 text-white font-bold text-[11px] transition-all shadow-sm">Iya, Hapus! 💥</button>
            </div>
          </div>
        </div>
      );
    }

    function FunnyKocakPopup({ show, message, onClose }) {
      if (!show) return null;
      return (
        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">
          <div className="relative w-full max-w-xs rounded-[28px] p-6 text-center shadow-2xl bg-amber-50 border border-amber-300 transform hover:scale-[1.03] transition-all">
            <div className="text-5xl mb-3 animate-bounce">🤪💸🎒</div>
            <h2 className="text-base font-black mb-2 text-amber-950 uppercase">ASTAGA, KOSONG!</h2>
            <p className="text-xs mb-4 font-semibold text-amber-800 opacity-95 leading-relaxed">{message}</p>
            <button onClick={onClose} className="w-full py-2.5 rounded-xl text-white font-extrabold text-xs shadow-md bg-amber-600 hover:bg-amber-700 active:scale-95 transition-transform">Oke Siap Bos! 🫡</button>
          </div>
        </div>
      );
    }

    function FunnyPopup({ show, type, msgIndex, onClose }) {
      if (!show) return null;
      const msg = type === 'success' ? SUCCESS_LOGIN_MSGS[msgIndex % SUCCESS_LOGIN_MSGS.length] : ERROR_LOGIN_MSGS[msgIndex % ERROR_LOGIN_MSGS.length];
      const bg = type === 'success' ? 'bg-emerald-50 border-emerald-300' : 'bg-rose-50 border-rose-300';
      const text = type === 'success' ? 'text-emerald-900' : 'text-rose-900';
      const btn = type === 'success' ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-rose-600 hover:bg-rose-700';

      return (
        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">
          <div className={`relative w-full max-w-xs rounded-3xl p-5 text-center shadow-2xl border transform hover:scale-[1.03] active:scale-95 transition-all ${bg}`}>
            <div className="text-4xl mb-2 animate-pulse">{msg.emoji}</div>
            <h2 className={`text-base font-black mb-1 ${text}`}>{msg.title}</h2>
            <p className={`text-[11px] mb-4 font-semibold ${text} opacity-90`}>{msg.desc}</p>
            <button onClick={onClose} className={`w-full py-2 rounded-xl text-white font-bold text-[11px] shadow-sm active:scale-95 transition-transform ${btn}`}>Oke Siap Bos!</button>
          </div>
        </div>
      );
    }

    function RemediPopup({ show, msgIndex, onClose }) {
      if (!show) return null;
      const msg = ROMANTIC_REMEDI_MSGS[msgIndex % ROMANTIC_REMEDI_MSGS.length];
      return (
        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">
          <div className="relative w-full max-w-sm rounded-3xl p-5 text-center shadow-2xl bg-rose-50 border border-rose-200 transform transition-all duration-300 hover:scale-[1.03] active:scale-95">

          </div>
        </div>
      );
    }

    function SwitchPopup({ show, msgIndex, onConfirm, onCancel, targetAssign }) {
      if (!show || !targetAssign) return null;
      const msg = SWITCH_CLASS_MSGS[msgIndex % SWITCH_CLASS_MSGS.length];
      return (
        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">

            <div className="flex gap-2">
              <button onClick={onCancel} className="flex-1 py-2 rounded-xl bg-white border border-indigo-200 hover:bg-indigo-100 text-indigo-700 font-bold text-[11px] shadow-sm active:scale-95 transition-transform">Bentar, Cek Dulu!</button>
              <button onClick={onConfirm} className="flex-1 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-[11px] shadow-sm active:scale-95 transition-transform">Aman, Pindah! 🚀</button>
            </div>

    // =========================================================================
    // --- 4. KOMPONEN INDUK APLIKASI ---
    // =========================================================================
    function App() {
      const [masterData, setMasterData] = useState(DEFAULT_MASTER_DATA);
      const [currentUser, setCurrentUser] = useState(null);
      const [activeAssignment, setActiveAssignment] = useState(null);
      const [popup, setPopup] = useState({ show: false, type: 'success', index: 0 });
      const [kocakPopup, setKocakPopup] = useState({ show: false, message: '' });
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [isLoading, setIsLoading] = useState(true);

      const fetchCloudMasterData = async (silent = false) => {
        if (!silent) setIsLoading(true);
        try {
          const response = await fetch(SCRIPT_URL);
          const data = await response.json();
          // STRICT SYNC: Hanya menggunakan data yang ada di server.
          setMasterData(data);
        } catch (err) {
          console.warn("Gagal mendapatkan data cloud.", err);
          showToast("Gagal memuat data dari server.", "error");
        } finally {
          if (!silent) setIsLoading(false);
        }
      };

      useEffect(() => { fetchCloudMasterData(); }, []);

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
      };

      if (isLoading) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
            <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-3"></div>
            <p className="text-[11px] text-slate-500 font-bold tracking-widest uppercase animate-pulse">Menghubungkan ke Cloud ASTAGA...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen max-h-screen h-screen bg-slate-50 flex flex-col overflow-hidden text-xs">
          {!currentUser ? (
            <LoginScreen 
              masterData={masterData} 
              onLogin={(user, assignment) => { 
                setCurrentUser(user); setActiveAssignment(assignment); 
                if(user !== 'ADMIN') setPopup({ show: true, type: 'success', index: Math.floor(Math.random() * 10) }); 
              }} 
              onLoginFail={() => setPopup({ show: true, type: 'error', index: Math.floor(Math.random() * 10) })} 
            />
          ) : currentUser === 'ADMIN' ? (
            <AdminDashboard masterData={masterData} setMasterData={setMasterData} onLogout={() => setCurrentUser(null)} showToast={showToast} toast={toast} onRefreshData={() => fetchCloudMasterData(true)} />
          ) : (
            <Dashboard user={currentUser} activeAssignment={activeAssignment} masterData={masterData} onLogout={() => setCurrentUser(null)} showToast={showToast} toast={toast} onUpdateSuccess={(silent) => fetchCloudMasterData(silent)} setActiveAssignment={setActiveAssignment} triggerKocakPopup={(msg) => setKocakPopup({show: true, message: msg})} />
          )}
          
          <FunnyPopup show={popup.show} type={popup.type} msgIndex={popup.index} onClose={() => setPopup({ ...popup, show: false })} />
          <FunnyKocakPopup show={kocakPopup.show} message={kocakPopup.message} onClose={() => setKocakPopup({ show: false, message: '' })} />
          
          {toast.show && (
            <div className="fixed bottom-4 right-4 z-[9999] animate-in slide-in-from-bottom-2">
              <div className={`rounded-xl shadow-lg px-4 py-2.5 flex items-center space-x-2 text-white font-bold text-xs ${toast.type === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`}>
                {toast.type === 'success' ? <IconCheckCircle className="w-4 h-4" /> : <IconAlertCircle className="w-4 h-4" />}
                <span>{toast.message}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // =========================================================================
    // --- 5. KOMPONEN LAYAR LOGIN ---
    // =========================================================================
    function LoginScreen({ masterData, onLogin, onLoginFail }) {
      const [mode, setMode] = useState('guru'); 
      const [selectedGuru, setSelectedGuru] = useState('');
      const [selectedAssign, setSelectedAssign] = useState('');
      const [password, setPassword] = useState('');
      const [adminPass, setAdminPass] = useState('');

      const sortedTeachersForLogin = useMemo(() => {
        return [...(masterData.teachers || [])].sort((a, b) => a.name.localeCompare(b.name));
      }, [masterData.teachers]);

      const guruObj = masterData.teachers?.find(t => t.name === selectedGuru);

      const handleLogin = (e) => {
        e.preventDefault();
        if (mode === 'admin') {
          if (adminPass === 'admin123') onLogin('ADMIN', null); else onLoginFail();
        } else {
          if (guruObj && guruObj.password === password && selectedAssign) {
            const [kelas, mapel] = selectedAssign.split('|');
            onLogin(guruObj, { classId: kelas, mapel: mapel });
          } else onLoginFail();
        }
      };

      return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-3 font-sans bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] w-full">
          <div className="max-w-sm w-full bg-white rounded-[24px] shadow-xl border border-slate-200 relative animate-in fade-in duration-300 hover:shadow-2xl transition-all">
            <div className={`p-6 text-center transition-colors duration-500 ${mode === 'admin' ? 'bg-slate-900' : 'bg-indigo-600'}`}>
              <div className="bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 backdrop-blur-md shadow-inner">
                {mode === 'admin' ? <IconSettings className="text-white w-7 h-7 animate-[spin_4s_linear_infinite]" /> : <IconGraduationCap className="text-white w-7 h-7" />}
              </div>
              <h1 className="text-2xl font-black text-white tracking-widest leading-none animate-pulse">ASTAGA</h1>
              <p className="text-white/80 text-[10px] font-semibold uppercase tracking-wider mt-1">{mode === 'admin' ? 'Ruang Kendali Admin' : 'Asisten Sistem Terpadu Guru Al Kautsar'}</p>
            </div>
            
            <div className="p-6">
              <form onSubmit={handleLogin} className="space-y-4">
                {mode === 'guru' && (
                  <>
                    <div>
                      <label className="block text-[11px] font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Pilih Nama Guru</label>
                      <div className="relative hover:scale-[1.02] active:scale-95 transition-all duration-300">
                        <IconUser className="absolute left-3 top-2.5 h-4 w-4 text-slate-400 pointer-events-none" />
                        <select className="pl-9 w-full rounded-xl border border-slate-200 py-2.5 px-3 text-xs text-slate-800 font-bold bg-slate-50 focus:outline-none focus:border-indigo-500 cursor-pointer" value={selectedGuru} onChange={(e) => { setSelectedGuru(e.target.value); setSelectedAssign(''); }} required>
                          <option value="" className="text-slate-400">-- Klik untuk memilih --</option>
                          {sortedTeachersForLogin.map((t, i) => <option key={i} value={t.name}>{t.name}</option>)}
                        </select>
                      </div>
                    </div>
                    {guruObj && (
                      <div className="animate-in fade-in slide-in-from-top-2">
                        <label className="block text-[11px] font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Pilih Kelas & Mata Pelajaran</label>
                        <div className="relative hover:scale-[1.02] active:scale-95 transition-all duration-300">
                          <IconBookOpen className="absolute left-3 top-2.5 h-4 w-4 text-slate-400 pointer-events-none" />
                          <select className="pl-9 w-full rounded-xl border border-slate-200 py-2.5 px-3 text-xs text-slate-800 focus:outline-none focus:border-indigo-500 font-bold appearance-none cursor-pointer bg-slate-50 hover:bg-indigo-50 transition-colors" value={selectedAssign} onChange={(e) => setSelectedAssign(e.target.value)} required>
                            <option value="">-- Pilih Kelas --</option>
                            {guruObj.assignments.map((a, i) => <option key={i} value={`${a.classId}|${a.mapel}`}>Kelas {a.classId} - {a.mapel}</option>)}
                          </select>
                        </div>
                      </div>
                    )}
                  </>
                )}
                <div>
                  <label className="block text-[11px] font-bold text-slate-600 mb-1.5 uppercase tracking-wider">{mode==='admin' ? 'Akses Admin' : 'Password / PIN'}</label>
                  <div className="relative hover:scale-[1.02] active:scale-95 transition-all duration-300">
                    <IconLock className="absolute left-3 top-2.5 h-4 w-4 text-slate-400 pointer-events-none" />
                    <input type="password" placeholder="Masukkan password" value={mode==='admin'?adminPass:password} onChange={(e) => mode==='admin'?setAdminPass(e.target.value):setPassword(e.target.value)} className={`pl-9 w-full rounded-xl border-2 py-2.5 px-3 text-xs text-slate-800 font-bold bg-slate-50 focus:outline-none ${mode==='admin'?'border-slate-300 focus:border-slate-800':'border-slate-200 focus:border-indigo-500'}`} required />
                  </div>
                </div>
                <button type="submit" className={`w-full text-white font-extrabold rounded-xl py-2.5 shadow-md mt-2 text-xs tracking-wide hover:-translate-y-1 active:scale-95 transition-all duration-300 ${mode==='admin'?'bg-slate-900 hover:bg-slate-800':'bg-indigo-600 hover:bg-indigo-700'}`}>
                  {mode==='admin' ? 'BUKA PANEL ADMIN 🗝️' : 'GAS MASUK! 🚀'}
                </button>
              </form>
            </div>
            
            <div className="bg-slate-50 border-t border-slate-200 p-4 text-center">
              <button onClick={() => { setMode(mode === 'guru' ? 'admin' : 'guru'); setPassword(''); setAdminPass(''); }} className="text-[11px] font-extrabold text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-wider">
                {mode === 'guru' ? '🛠️ Masuk sebagai Admin?' : '👨‍🏫 Kembali ke Login Guru'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // =========================================================================
    // --- 6. KOMPONEN PANEL ADMIN UTAMA ---
    // =========================================================================
    function AdminDashboard({ masterData, setMasterData, onLogout, showToast, toast, onRefreshData }) {
      const [activeTab, setActiveTab] = useState('overview'); 
      const [isSyncing, setIsSyncing] = useState(false);
      const [expandedGuru, setExpandedGuru] = useState({});
      const [showResetConfirm, setShowResetConfirm] = useState(false);

      const totalGuru = masterData.teachers?.length || 0;
      const totalSiswa = Object.values(masterData.students || {}).flat().length - ((masterData.students || {})["__MAPELS__"] ? masterData.students["__MAPELS__"].length : 0);
      const totalKelas = Object.keys(masterData.students || {}).filter(k => k !== "__MAPELS__").length;
      
      const trackingData = useMemo(() => {
        let totalCellsExpected = 0, totalCellsFilled = 0;
        const list = (masterData.teachers || []).flatMap(t => 
          t.assignments.map(a => {
            const key = `${a.classId}|${a.mapel}|${t.name}`;
            const sum = masterData.gradesSummary?.[key] || { uhCount: 0, uhTotal: 0, stsCount: 0, stsTotal: 0, sasCount: 0, sasTotal: 0 };
            const expected = sum.uhTotal + sum.stsTotal + sum.sasTotal;
            const filled = sum.uhCount + sum.stsCount + sum.sasCount;
            totalCellsExpected += expected; totalCellsFilled += filled;
            const progress = expected === 0 ? 0 : Math.round((filled / expected) * 100);
            return { guru: t.name, kelas: a.classId, mapel: a.mapel, progress, completed: progress===100 };
          })
        );
        const globalProgress = totalCellsExpected === 0 ? 0 : Math.round((totalCellsFilled / totalCellsExpected) * 100);
        return { list, globalProgress };
      }, [masterData]);

      const teachersProgress = useMemo(() => {
        const map = {};
        (masterData.teachers || []).forEach(t => map[t.name] = { name: t.name, total: 0, completed: 0, assignments: [] });
        trackingData.list.forEach(item => {
          if (!map[item.guru]) map[item.guru] = { name: item.guru, total: 0, completed: 0, assignments: [] };
          map[item.guru].assignments.push(item);
          map[item.guru].total++;
          if (item.completed) map[item.guru].completed++;
        });
        return Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
      }, [masterData, trackingData]);

      const toggleGuru = (name) => { setExpandedGuru(prev => ({ ...prev, [name]: !prev[name] })); };

      const downloadTemplateGuru = () => {
        const header = ["No", "Nama Guru", "Password", "Mapel 1", "Kelas Mapel 1 (Pisahkan dgn koma)", "Mapel 2", "Kelas Mapel 2", "Mapel 3", "Kelas Mapel 3", "Mapel 4", "Kelas Mapel 4", "Mapel 5", "Kelas Mapel 5"];
        const ws = window.XLSX.utils.aoa_to_sheet([header, [1, "Pak Budi", "123", "MATEMATIKA", "10A, 10B", "", "", "", "", "", "", "", ""]]);
        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, "MasterGuru"); window.XLSX.writeFile(wb, "Template_Master_Guru.xlsx");
      };

      const downloadTemplateSiswa = () => {
        const header = ["Kelas", "No Presensi", "Nama Siswa"];
        const ws = window.XLSX.utils.aoa_to_sheet([header, ["10A", "1", "Agus Contoh"]]);
        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, "MasterSiswa"); window.XLSX.writeFile(wb, "Template_Master_Siswa.xlsx");
      };

      const syncToCloud = async (action, payloadKey, payloadData, successMsg) => {
        setIsSyncing(true);
        try {
          await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, [payloadKey]: payloadData }) });
          showToast(successMsg, "success");
        } catch (err) { showToast("Koneksi gagal, tidak tersimpan ke server.", "error"); } finally { setIsSyncing(false); }
      };

      const handleResetGrades = async () => {
        setShowResetConfirm(false); setIsSyncing(true);
        try {
          await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "resetGrades" }) });
          showToast("Berhasil! Semua rekap nilai di-reset.", "success"); onRefreshData();
        } catch (err) { showToast("Gagal reset. Cek koneksi!", "error"); } finally { setIsSyncing(false); }
      };

      const handleUploadGuru = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result); const workbook = window.XLSX.read(data, {type: 'array'});
            if (!workbook.SheetNames.length) { showToast("File Excel kosong!", "error"); return; }
            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
            const teachersMap = {};
            rows.slice(1).forEach(parts => {
              if(parts.length > 1 && parts[1]) {
                const nama = parts[1].toString().trim(); const pass = parts[2] !== "" ? String(parts[2]).trim() : "123";
                if(nama) {
                  if(!teachersMap[nama]) teachersMap[nama] = { name: nama, password: pass, assignments: [] };
                  for(let i = 0; i < 5; i++) {
                    const mIdx = 3 + (i * 2); const kIdx = 4 + (i * 2);
                    if (parts[mIdx] !== undefined && parts[kIdx] !== undefined) {
                       const mName = parts[mIdx].toString().trim();
                       const kArr = String(parts[kIdx]).split(',').map(k => k.trim()).filter(k => k);
                       if (mName && kArr.length > 0) {
                         kArr.forEach(k => { if(!teachersMap[nama].assignments.find(a => a.classId === k && a.mapel === mName)) teachersMap[nama].assignments.push({ classId: k, mapel: mName }); });
                       }
                    }
                  }
                }
              }
            });
            const newTeachers = Object.values(teachersMap).filter(t => t.assignments.length > 0);
            if(newTeachers.length > 0) { setMasterData(p => ({ ...p, teachers: newTeachers })); syncToCloud("saveMasterGuru", "teachers", newTeachers, "Data Guru tersimpan ke Cloud!"); } 
            else showToast(`Format Excel salah!`, 'error');
          } catch(err) { showToast(`Gagal baca Excel Guru.`, 'error'); }
        }; reader.readAsArrayBuffer(file); e.target.value = ''; 
      };

      const handleUploadSiswa = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result); const workbook = window.XLSX.read(data, {type: 'array'});
            if (!workbook.SheetNames.length) { showToast("File Excel kosong!", "error"); return; }
            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
            const studentsMap = { ...masterData.students }; 
            for (let k in studentsMap) { if (k !== "__MAPELS__") delete studentsMap[k]; }
            rows.slice(1).forEach((parts, idx) => {
              if(parts.length >= 3 && parts[0]) {
                const kelas = String(parts[0]).trim().toUpperCase(); const idSiswa = parts[1] !== "" ? String(parts[1]).trim() : String(idx + 1); const namaSiswa = parts[2].toString().trim();
                if(kelas && namaSiswa) { if(!studentsMap[kelas]) studentsMap[kelas] = []; studentsMap[kelas].push({ id: idSiswa, name: namaSiswa }); }
              }
            });
            if(Object.keys(studentsMap).length > 0) { setMasterData(p => ({ ...p, students: studentsMap })); syncToCloud("saveMasterSiswa", "students", studentsMap, "Data Siswa tersimpan ke Cloud!"); } 
            else showToast(`Format Excel salah!`, 'error');
          } catch(err) { showToast(`Gagal baca Excel Siswa.`, 'error'); }
        }; reader.readAsArrayBuffer(file); e.target.value = ''; 
      };

      return (
        <div className="h-screen max-h-screen flex flex-col font-sans text-xs overflow-hidden bg-slate-50">
          <FunnyDeletePopup show={showResetConfirm} targetName="Seluruh Rekap Nilai" type="class" onConfirm={handleResetGrades} onCancel={() => setShowResetConfirm(false)} />

          <header className="flex-none bg-slate-900 text-white shadow-xl h-12 flex items-center justify-between px-4 z-20">
            <div className="flex items-center space-x-2 hover:scale-[1.03] active:scale-95 transition-all cursor-pointer">
              <div className="bg-indigo-500 p-1 rounded-lg"><IconSettings className="w-4 h-4 text-white" /></div>
              <h1 className="font-extrabold text-[13px] tracking-widest flex items-center gap-1.5">ASTAGA <span className="bg-indigo-700 px-1.5 py-0.5 rounded text-[8px]">ADMIN</span></h1>
            </div>
            <div className="flex space-x-1 border border-slate-700 bg-slate-800 rounded-lg p-0.5 shadow-inner">
              <button onClick={() => setActiveTab('overview')} className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase transition-all hover:scale-[1.03] ${activeTab === 'overview' ? 'bg-indigo-500 shadow' : 'text-slate-400 hover:text-white'}`}>Progres</button>
              <button onClick={() => setActiveTab('database')} className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase transition-all hover:scale-[1.03] ${activeTab === 'database' ? 'bg-indigo-500 shadow' : 'text-slate-400 hover:text-white'}`}>Database</button>
              <button onClick={() => setActiveTab('settings')} className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase transition-all hover:scale-[1.03] ${activeTab === 'settings' ? 'bg-indigo-500 shadow' : 'text-slate-400 hover:text-white'}`}>Setting</button>
            </div>
            <button onClick={onLogout} className="text-slate-400 hover:text-rose-400 p-1.5 rounded-lg transition-all hover:scale-[1.03] hover:bg-slate-800"><IconLogOut className="w-4 h-4" /></button>
          </header>

          <main className="flex-1 overflow-y-auto scrollbar-hide p-3 sm:p-4 pb-10 max-w-5xl mx-auto w-full">
            {isSyncing && <div className="bg-indigo-50 text-indigo-700 px-3 py-2 rounded-xl flex justify-center space-x-2 font-bold animate-pulse mb-3"><div className="w-3.5 h-3.5 border-2 border-indigo-700 border-t-transparent rounded-full animate-spin"></div><span>Menyelaraskan Data...</span></div>}

            <div className="flex-1 overflow-y-auto scrollbar-hide space-y-4">
              {activeTab === 'overview' && (
                <div className="space-y-4">
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-2.5">
                    <div className="bg-gradient-to-br from-sky-100 to-sky-50 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5 hover:-translate-y-0.5 hover:scale-[1.03] transition-all"><IconUsers className="w-6 h-6 text-sky-600 p-1 bg-white rounded-lg shadow-inner" /><div><p className="text-[9px] text-sky-700 font-bold uppercase">Guru Aktif</p><h3 className="text-sm font-black text-slate-800">{totalGuru}</h3></div></div>
                    <div className="bg-gradient-to-br from-emerald-100 to-emerald-50 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5 hover:-translate-y-0.5 hover:scale-[1.03] transition-all"><IconGraduationCap className="w-6 h-6 text-emerald-600 p-1 bg-white rounded-lg shadow-inner" /><div><p className="text-[9px] text-emerald-700 font-bold uppercase">Siswa</p><h3 className="text-sm font-black text-slate-800">{totalSiswa}</h3></div></div>
                    <div className="bg-gradient-to-br from-amber-100 to-amber-50 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5 hover:-translate-y-0.5 hover:scale-[1.03] transition-all"><IconBookOpen className="w-6 h-6 text-amber-600 p-1 bg-white rounded-lg shadow-inner" /><div><p className="text-[9px] text-amber-700 font-bold uppercase">Kelas</p><h3 className="text-sm font-black text-slate-800">{totalKelas}</h3></div></div>
                    <div className="bg-gradient-to-br from-indigo-100 to-indigo-50 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5 relative overflow-hidden hover:-translate-y-0.5 hover:scale-[1.03] transition-all"><IconActivity className="w-6 h-6 text-indigo-600 p-1 bg-white rounded-lg shadow-inner z-10" /><div className="z-10"><p className="text-[9px] text-indigo-700 font-bold uppercase">Global</p><h3 className="text-sm font-black text-indigo-800">{trackingData.globalProgress}%</h3></div><div className="absolute bottom-0 left-0 h-1 bg-indigo-400" style={{width: `${trackingData.globalProgress}%`}}></div></div>
                  </div>

                  <div className="space-y-2 animate-in fade-in">
                    <div className="pb-1.5 flex justify-between items-center">
                      <div><h2 className="text-xs font-black text-slate-800 uppercase">Progres Per Guru</h2></div>
                      <button onClick={onRefreshData} className="bg-white border hover:bg-slate-50 active:scale-95 transition-all text-slate-600 font-bold px-2.5 py-1.5 rounded-lg shadow-sm flex items-center gap-1 text-[10px] hover:scale-[1.03]"><IconRefresh className="w-3.5 h-3.5" /> Sync</button>
                    </div>

                    {teachersProgress.map((g, idx) => {
                      const pct = g.total === 0 ? 0 : Math.round((g.completed / g.total) * 100);
                      const isExpanded = !!expandedGuru[g.name];
                      return (
                        <div key={idx} className={`rounded-xl border overflow-hidden shadow-sm hover:scale-[1.01] transition-all ${TEACHER_CARD_COLORS[idx%TEACHER_CARD_COLORS.length]}`}>
                          <div onClick={() => setExpandedGuru(p => ({...p, [g.name]: !p[g.name]}))} className="p-3 flex items-center justify-between cursor-pointer hover:bg-white/40">
                            <div className="flex items-center space-x-3">
                              <div className={`w-9 h-9 rounded-xl border flex items-center justify-center font-bold text-base shadow-sm ${AVATAR_COLORS[idx%AVATAR_COLORS.length]}`}>{g.name.charAt(0)}</div>
                              <div><h3 className="font-extrabold text-slate-800 text-xs">{g.name}</h3><p className="text-[9px] text-slate-500 font-bold uppercase">Mengajar {g.total} Mapel</p></div>
                            </div>
                            <div className="flex items-center gap-3">
                              <div className="text-right hidden sm:block"><span className="text-[9px] font-extrabold text-slate-400 block uppercase">Status</span><p className="text-[10px] font-black text-slate-700">{g.completed}/{g.total} Selesai</p></div>
                              <span className={`px-2 py-0.5 rounded-lg text-[10px] font-black border shadow-sm ${pct===100?'bg-emerald-50 text-emerald-800 border-emerald-300':pct>0?'bg-amber-50 text-amber-800 border-amber-300 animate-pulse':'bg-slate-50 text-slate-400'}`}>{pct}%</span>
                            </div>
                          </div>
                          {isExpanded && (
                            <div className="border-t border-slate-200/50 bg-white/40 p-3 animate-in fade-in">
                              {g.assignments.length === 0 ? <p className="text-[10px] text-center text-slate-400">Belum ada tugas.</p> : (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                  {g.assignments.map((a, i) => (
                                    <div key={i} className="bg-white/80 p-2 rounded-lg border border-slate-200/60 flex items-center justify-between shadow-sm hover:scale-[1.02] transition-all">
                                      <div><p className="font-extrabold text-slate-800 text-[11px]">{a.mapel}</p><span className="inline-block mt-0.5 bg-slate-100 text-slate-600 font-bold px-1.5 py-0.5 rounded text-[9px]">Kls {a.kelas}</span></div>
                                      <span className={`px-2 py-0.5 rounded text-[9px] font-extrabold border ${a.progress===100?'bg-teal-100 text-teal-800 border-teal-300':a.progress>0?'bg-amber-100 text-amber-800 border-amber-300 animate-pulse':'bg-slate-50 text-slate-400'}`}>{a.progress}% DONE</span>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {activeTab === 'database' && (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in">
                  <div className="bg-gradient-to-br from-indigo-50/60 to-indigo-50/10 rounded-2xl shadow-sm border border-indigo-200 flex flex-col p-5 hover:scale-[1.02] transition-all">
                    <div className="flex justify-between items-start mb-4">
                      <div className="flex items-center gap-2"><IconUser className="w-5 h-5 text-indigo-500 bg-white p-1 rounded-lg shadow-inner"/><h2 className="text-sm font-black text-slate-800">Master Guru</h2></div>
                    </div>
                    <div className="border-2 border-dashed border-indigo-300 rounded-xl p-4 text-center bg-white/80 cursor-pointer group hover:bg-white" onClick={e=>{if(e.target.tagName!=='INPUT') e.currentTarget.querySelector('input').click()}}>
                      <IconFileText className="w-7 h-7 text-indigo-400 mx-auto mb-1 group-hover:text-indigo-600" />
                      <span className="text-[10px] font-extrabold text-slate-600 group-hover:text-indigo-800">Klik & Pilih Excel Guru</span>
                      <input type="file" accept=".xls,.xlsx" className="hidden" onChange={handleUploadGuru} />
                    </div>
                  </div>
                  
                  <div className="bg-gradient-to-br from-emerald-50/60 to-emerald-50/10 rounded-2xl shadow-sm border border-emerald-200 flex flex-col p-5 hover:scale-[1.02] transition-all">
                    <div className="flex justify-between items-start mb-4">
                      <div className="flex items-center gap-2"><IconGraduationCap className="w-5 h-5 text-emerald-500 bg-white p-1 rounded-lg shadow-inner"/><h2 className="text-sm font-black text-slate-800">Master Siswa</h2></div>
                    </div>
                    <div className="border-2 border-dashed border-emerald-300 rounded-xl p-4 text-center bg-white/80 cursor-pointer group hover:bg-white" onClick={e=>{if(e.target.tagName!=='INPUT') e.currentTarget.querySelector('input').click()}}>
                      <IconFileText className="w-7 h-7 text-emerald-400 mx-auto mb-1 group-hover:text-emerald-600" />
                      <span className="text-[10px] font-extrabold text-slate-600 group-hover:text-emerald-800">Klik & Pilih Excel Siswa</span>
                      <input type="file" accept=".xls,.xlsx" className="hidden" onChange={handleUploadSiswa} />
                    </div>
                  </div>

                  <div className="bg-rose-50 border border-rose-300 rounded-2xl p-5 col-span-1 md:col-span-2 shadow-sm hover:scale-[1.01] transition-all">
                    <div className="flex items-center gap-2 mb-2"><IconAlertCircle className="w-4 h-4 text-rose-500 bg-white p-0.5 rounded shadow-inner" /><h2 className="text-sm font-black text-rose-950">Zona Bahaya</h2></div>
                    <p className="text-rose-800 text-[10px] mb-3 font-bold">Hapus semua tab nilai di Google Sheets. Master guru/siswa aman.</p>
                    <button onClick={()=>setShowResetConfirm(true)} className="bg-rose-500 hover:bg-rose-600 text-white font-bold py-2 px-4 rounded-xl text-xs shadow-md active:scale-95 transition-all">Reset Semua Rekap Nilai Siswa</button>
                  </div>
                </div>
              )}

              {activeTab === 'settings' && (
                <AdminSettingsTab masterData={masterData} setMasterData={setMasterData} syncGuru={syncToCloud} syncSiswa={syncToCloud} showToast={showToast} />
              )}
            </div>
          </main>
        </div>
      );
    }

    // =========================================================================
    // --- 7. KOMPONEN PENGATURAN ADMIN (TAB SETTINGS) ---
    // =========================================================================
    function AdminSettingsTab({ masterData, setMasterData, syncGuru, syncSiswa, showToast }) {
      const [view, setView] = useState('guru'); 
      const [newTeacherName, setNewTeacherName] = useState('');
      const [newTeacherPass, setNewTeacherPass] = useState('123');
      const [selClass, setSelClass] = useState('');
      const [newClassName, setNewClassName] = useState('');
      const [newMapelName, setNewMapelName] = useState('');

      const [editingTeacherObj, setEditingTeacherObj] = useState(null);
      const [editingTeacherName, setEditingTeacherName] = useState('');
      const [editingTeacherPass, setEditingTeacherPass] = useState('');

      const [editingStudentObj, setEditingStudentObj] = useState(null);
      const [editStudentNumber, setEditStudentNumber] = useState('');
      const [editStudentName, setEditStudentName] = useState('');

      const [editingMapel, setEditingMapel] = useState(null);
      const [editMapelName, setEditMapelName] = useState('');
      const [deletePrompt, setDeletePrompt] = useState({ show: false, type: '', target: null });

      const mapelsList = useMemo(() => (masterData.students["__MAPELS__"] || DEFAULT_MAPELS).sort(), [masterData.students]);
      const sortedTeachers = useMemo(() => [...masterData.teachers].sort((a, b) => a.name.localeCompare(b.name)), [masterData.teachers]);
      const sortedStudents = useMemo(() => {
        if (!selClass || !masterData.students[selClass]) return [];
        return [...masterData.students[selClass]].sort((a, b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
      }, [masterData.students, selClass]);

      // Modals Save Handlers
      const saveTeacher = () => {
        const n = editingTeacherName.trim(), p = editingTeacherPass.trim();
        if(!n || !p) return;
        const newData = masterData.teachers.map(t => t.name === editingTeacherObj.name ? {...t, name:n, password:p} : t);
        setMasterData(m => ({...m, teachers: newData})); syncGuru("saveMasterGuru", "teachers", newData, "Tersimpan."); setEditingTeacherObj(null);
      };
      const saveStudent = () => {
        const i = editStudentNumber.trim(), n = editStudentName.trim();
        if(!i || !n) return;
        const list = masterData.students[selClass].map(s => s.id === editingStudentObj.id ? {id:i, name:n} : s);
        const newData = {...masterData.students, [selClass]: list};
        setMasterData(m => ({...m, students: newData})); syncSiswa("saveMasterSiswa", "students", newData, "Tersimpan."); setEditingStudentObj(null);
      };
      const saveMapel = () => {
        const n = editMapelName.trim(); if(!n) return;
        const list = mapelsList.map(m => m === editingMapel ? n : m);
        const tList = masterData.teachers.map(t => ({...t, assignments: t.assignments.map(a => a.mapel===editingMapel?{...a, mapel:n}:a)}));
        const newData = {...masterData.students, "__MAPELS__": list};
        setMasterData(m => ({...m, students: newData, teachers: tList})); syncSiswa("saveMasterSiswa", "students", newData, "Tersimpan."); setEditingMapel(null);
      };

      const executeDelete = () => {
        const type = deletePrompt.type, tar = deletePrompt.target;
        if(type==='teacher') {
          const dt = masterData.teachers.filter(t => t.name !== tar);
          setMasterData(m => ({...m, teachers: dt})); syncGuru("saveMasterGuru", "teachers", dt, "Terhapus.");
        } else if(type==='class') {
          const ds = {...masterData.students}; delete ds[tar];
          setMasterData(m => ({...m, students: ds})); syncSiswa("saveMasterSiswa", "students", ds, "Terhapus."); setSelClass('');
        } else if(type==='student') {
          const ds = {...masterData.students, [selClass]: masterData.students[selClass].filter(s=>s.id!==tar)};
          setMasterData(m => ({...m, students: ds})); syncSiswa("saveMasterSiswa", "students", ds, "Terhapus.");
        } else if(type==='mapel') {
          const ds = {...masterData.students, "__MAPELS__": mapelsList.filter(m=>m!==tar)};
          setMasterData(m => ({...m, students: ds})); syncSiswa("saveMasterSiswa", "students", ds, "Terhapus.");
        }
        setDeletePrompt({show:false});
      };

      const handleAddTeacher = (e) => {
        e.preventDefault();
        const name = newTeacherName.trim(); const pass = newTeacherPass.trim();
        if(!name || !pass) return;
        if(masterData.teachers.find(t => t.name === name)) { showToast("Guru sudah ada!", "error"); return; }
        const newData = [...masterData.teachers, { name, password: pass, assignments: [] }];
        setMasterData(p => ({...p, teachers: newData}));
        syncGuru("saveMasterGuru", "teachers", newData, `Guru ditambahkan.`);
        setNewTeacherName(''); setNewTeacherPass('123'); 
      };

      const handleDeleteAssign = (teacherName, assignIdx) => {
        const newData = masterData.teachers.map(t => {
          if (t.name === teacherName) {
             const newAssigns = [...t.assignments]; newAssigns.splice(assignIdx, 1);
             return { ...t, assignments: newAssigns };
          }
          return t;
        });
        setMasterData(p => ({...p, teachers: newData}));
        syncGuru("saveMasterGuru", "teachers", newData, "Jadwal diperbarui.");
      };

      const handleAddAssign = (e, teacherName) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const mapel = fd.get('mapel').trim(); const kelas = fd.get('kelas').trim();
        if(!mapel || !kelas) return;
        const newData = masterData.teachers.map(t => {
          if(t.name === teacherName) {
            if(t.assignments.find(a => a.classId === kelas && a.mapel === mapel)) return t; 
            return { ...t, assignments: [...t.assignments, {classId: kelas, mapel: mapel}] };
          }
          return t;
        });
        setMasterData(p => ({...p, teachers: newData}));
        syncGuru("saveMasterGuru", "teachers", newData, "Jadwal ditambahkan.");
        e.target.reset();
      };

      const handleAddClass = (e) => {
        e.preventDefault();
        const c = newClassName.trim();
        if(!c || masterData.students[c]) { showToast("Kelas kosong/ada!", "error"); return; }
        const newStudents = { ...masterData.students, [c]: [] };
        setMasterData(p => ({...p, students: newStudents}));
        syncSiswa("saveMasterSiswa", "students", newStudents, `Kelas dibuat.`);
        setNewClassName(''); setSelClass(c);
      };

      const handleAddStudent = (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const id = fd.get('id').trim(); const name = fd.get('name').trim();
        if(!id || !name || !selClass) return;
        const classList = [...(masterData.students[selClass] || [])];
        if(classList.find(s => s.id === id)) { showToast("ID sudah ada!", "error"); return; }
        classList.push({id, name});
        const newStudents = { ...masterData.students, [selClass]: classList };
        setMasterData(p => ({...p, students: newStudents}));
        syncSiswa("saveMasterSiswa", "students", newStudents, "Siswa ditambahkan.");
        e.target.reset();
      };

      return (
        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in pb-4">
          <FunnyDeletePopup show={deletePrompt.show} targetName={deletePrompt.target} type={deletePrompt.type} onConfirm={executeDelete} onCancel={() => setDeletePrompt({show:false})} />

          {/* Centered Modals */}
          {editingMapel && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in">
              <div className="w-full max-w-sm rounded-[28px] bg-white border border-slate-200 shadow-2xl p-6 transform hover:scale-[1.01] transition-all">
                <div className="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                  <h3 className="font-black text-slate-800 text-sm">Edit Nama Mapel</h3>
                  <button onClick={() => setEditingMapel(null)} className="text-slate-400 hover:text-rose-600 text-xl font-bold">&times;</button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nama Mata Pelajaran</label>
                    <input type="text" value={editMapelName} onChange={e=>setEditMapelName(e.target.value)} className="w-full px-3 py-2.5 text-xs font-bold rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-fuchsia-500 bg-slate-50" />
                  </div>
                  <div className="flex gap-2 pt-2">
                    <button onClick={() => setEditingMapel(null)} className="flex-1 py-2.5 rounded-xl bg-slate-100 border text-slate-700 font-bold hover:bg-slate-200 text-xs transition-all active:scale-95 shadow-sm">Batal</button>
                    <button onClick={saveMapel} className="flex-1 py-2.5 rounded-xl bg-fuchsia-600 text-white font-bold text-xs shadow-md transition-all active:scale-95">Simpan</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {editingTeacherObj && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in">
              <div className="w-full max-w-sm rounded-[28px] bg-white border border-slate-200 shadow-2xl p-6 transform hover:scale-[1.01] transition-all">
                <h3 className="font-black mb-4">Edit Profil: {editingTeacherObj.name}</h3>
                <input type="text" value={editingTeacherName} onChange={e=>setEditingTeacherName(e.target.value)} className="w-full px-3 py-2 text-xs font-bold rounded-xl border border-slate-200 mb-2" placeholder="Nama Guru"/>
                <input type="text" value={editingTeacherPass} onChange={e=>setEditingTeacherPass(e.target.value)} className="w-full px-3 py-2 text-xs font-bold rounded-xl border border-slate-200 mb-4" placeholder="Password"/>
                <div className="flex gap-2">
                  <button onClick={()=>setEditingTeacherObj(null)} className="flex-1 py-2 rounded-xl bg-slate-100 font-bold text-xs">Batal</button>
                  <button onClick={saveTeacher} className="flex-1 py-2 rounded-xl bg-indigo-600 text-white font-bold text-xs">Simpan</button>
                </div>
              </div>
            </div>
          )}

          {editingStudentObj && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in">
              <div className="w-full max-w-sm rounded-[28px] bg-white border border-slate-200 shadow-2xl p-6 transform hover:scale-[1.01] transition-all">
                <div className="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                  <h3 className="font-black text-slate-800 text-sm">Edit Profil Siswa</h3>
                  <button onClick={() => setEditingStudentObj(null)} className="text-slate-400 hover:text-rose-600 text-xl font-bold">&times;</button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nomor Presensi / ID</label>
                    <input type="text" value={editStudentNumber} onChange={e=>setEditStudentNumber(e.target.value)} className="w-full px-3 py-2.5 text-xs font-bold rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50" />
                  </div>
                  <div>
                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nama Lengkap Siswa</label>
                    <input type="text" value={editStudentName} onChange={e=>setEditStudentName(e.target.value)} className="w-full px-3 py-2.5 text-xs font-bold rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50" />
                  </div>
                  <div className="flex gap-2 pt-2">
                    <button onClick={() => setEditingStudentObj(null)} className="flex-1 py-2.5 rounded-xl bg-slate-100 border text-slate-700 font-bold hover:bg-slate-200 text-xs transition-all active:scale-95 shadow-sm">Batal</button>
                    <button onClick={handleSaveStudentProfile} className="flex-1 py-2.5 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-700 text-xs shadow-md transition-all active:scale-95">Simpan</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          <div className="flex border-b border-slate-100 bg-slate-50 p-2 gap-2">
            <button onClick={() => setView('guru')} className={`flex-1 py-2 rounded-xl text-[11px] font-black uppercase transition-all shadow-sm active:scale-95 ${view === 'guru' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-indigo-50/50'}`}>👨‍🏫 Guru</button>
            <button onClick={() => setView('mapel')} className={`flex-1 py-2 rounded-xl text-[11px] font-black uppercase transition-all shadow-sm active:scale-95 ${view === 'mapel' ? 'bg-fuchsia-600 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-fuchsia-50/50'}`}>📚 Mapel</button>
            <button onClick={() => setView('siswa')} className={`flex-1 py-2 rounded-xl text-[11px] font-black uppercase transition-all shadow-sm active:scale-95 ${view === 'siswa' ? 'bg-emerald-600 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-emerald-50/50'}`}>🎓 Siswa</button>
          </div>

          <div className="p-4 sm:p-6">
            {view === 'guru' && (
              <div className="space-y-4 animate-in fade-in">
                <form onSubmit={handleAddTeacher} className="flex flex-col sm:flex-row gap-2.5 p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100 hover:scale-[1.01] transition-all">
                  <input type="text" placeholder="Nama Guru Baru" value={newTeacherName} onChange={e=>setNewTeacherName(e.target.value)} className="flex-1 px-3 py-2 text-xs font-bold rounded-xl border" required />
                  <input type="text" placeholder="Pass (123)" value={newTeacherPass} onChange={e=>setNewTeacherPass(e.target.value)} className="w-24 px-3 py-2 text-xs font-bold rounded-xl border" />
                  <button type="submit" className="bg-indigo-600 text-white px-5 py-2 rounded-xl text-[11px] font-black hover:bg-indigo-700 shadow-md">Tambah</button>
                </form>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                  {sortedTeachers.map((t, idx) => {
                    const clr = AVATAR_COLORS[idx % AVATAR_COLORS.length];
                    return (
                      <div key={t.name} className="flex justify-between items-center bg-slate-50 px-3 py-2.5 rounded-xl border border-slate-200 hover:scale-[1.02] transition-all group">
                        <div className="flex gap-2.5 items-center pr-2"><div className={`w-8 h-8 rounded-lg flex items-center justify-center font-black ${clr}`}>{t.name.charAt(0)}</div><span className="font-bold text-[11px]">{t.name}</span></div>
                        <div className="flex gap-1 flex-none opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                          <button onClick={() => { setEditingTeacherObj(t); setEditingTeacherName(t.name); setEditingTeacherPass(t.password); }} className="text-slate-400 hover:text-indigo-600 p-1.5 bg-white rounded-lg shadow-sm border"><IconEdit className="w-3.5 h-3.5"/></button>
                          <button onClick={() => setDeletePrompt({show:true, type:'teacher', target:t.name})} className="text-slate-400 hover:text-rose-600 p-1.5 bg-white rounded-lg shadow-sm border"><IconTrash className="w-3.5 h-3.5"/></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {view === 'mapel' && (
              <div className="space-y-4 animate-in fade-in">
                <form onSubmit={handleAddMapel} className="flex flex-col sm:flex-row gap-2.5 p-4 bg-fuchsia-50/50 rounded-2xl border border-fuchsia-100 hover:scale-[1.01] transition-all">
                  <input type="text" placeholder="Mapel Baru (Cth: Koding)" value={newMapelName} onChange={e=>setNewMapelName(e.target.value)} className="flex-1 px-3 py-2 text-xs font-bold rounded-xl border border-fuchsia-200" required />
                  <button type="submit" className="bg-fuchsia-600 text-white px-5 py-2 rounded-xl text-[11px] font-black hover:bg-fuchsia-700 shadow-md">Tambah</button>
                </form>

                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2.5">
                  {mapelsList.map((m, idx) => (
                    <div key={idx} className="flex justify-between items-center bg-slate-50 px-3 py-2.5 rounded-xl border border-slate-200 hover:scale-[1.02] transition-all group">
                      <span className="font-bold text-[11px] truncate pr-2">{m}</span>
                      <div className="flex gap-1 flex-none opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onClick={() => { setEditingMapel(m); setEditMapelName(m); }} className="text-slate-400 hover:text-indigo-600 p-1 bg-white rounded shadow-sm border"><IconEdit className="w-3.5 h-3.5"/></button>
                        <button onClick={() => setDeletePrompt({show:true, type:'mapel', target:m})} className="text-slate-400 hover:text-rose-600 p-1 bg-white rounded shadow-sm border"><IconTrash className="w-3.5 h-3.5"/></button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {view === 'siswa' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="flex flex-col sm:flex-row gap-3">
                  <div className="flex-1 bg-emerald-50/50 p-4 rounded-2xl border border-emerald-100 hover:scale-[1.01] transition-all">
                    <label className="block text-[10px] font-extrabold text-emerald-800 mb-2 uppercase tracking-widest">Pilih Kelas untuk Diedit</label>
                    <div className="relative hover:scale-[1.01] transition-transform">
                      <IconBookOpen className="absolute left-3 top-2.5 w-4 h-4 text-emerald-500" />
                      <select value={selClass} onChange={e=>{setSelClass(e.target.value); setEditingStudentObj(null);}} className="w-full pl-9 pr-3 py-2 text-xs font-bold rounded-xl border border-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-300 text-slate-800 bg-white cursor-pointer shadow-sm hover:bg-emerald-50/20 transition-all">
                        <option value="">-- Silakan Pilih Kelas --</option>
                        {Object.keys(masterData.students).filter(k => k !== "__MAPELS__").map(k => <option key={k} value={k}>Kelas {k}</option>)}
                      </select>
                    </div>
                  </div>
                  <form onSubmit={handleAddClass} className="sm:w-1/3 bg-slate-50 p-4 rounded-2xl border border-slate-200 flex flex-col gap-2 justify-end hover:border-slate-300 hover:scale-[1.01] hover:-translate-y-0.5 transition-all shadow-sm">
                    <input type="text" placeholder="Nama Kelas Baru" value={newClassName} onChange={e=>setNewClassName(e.target.value)} className="w-full px-3 py-2 text-xs font-bold rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-300 shadow-sm" required />
                    <button type="submit" className="w-full bg-slate-800 text-white px-3 py-2 rounded-xl text-[11px] font-black hover:bg-slate-700 transition-all hover:scale-[1.03] active:scale-95 shadow-md flex items-center justify-center gap-1.5"><IconPlus className="w-4 h-4"/> Buat Kelas</button>
                  </form>
                </div>

                {selClass && (
                  <div className="bg-white rounded-3xl p-5 shadow-lg border border-slate-100 animate-in fade-in slide-in-from-bottom-2">
                    <div className="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
                      <h3 className="font-black text-emerald-900 text-sm uppercase tracking-wide flex items-center gap-2"><IconUsers className="w-5 h-5 text-emerald-500"/> Daftar Siswa: Kelas {selClass}</h3>
                      <button onClick={() => setDeletePrompt({show:true, type:'class', target:selClass})} className="text-rose-600 font-bold bg-rose-50 px-2 py-1 rounded-lg">Hapus Kelas</button>
                    </div>
                    
                    <form onSubmit={handleAddStudent} className="flex flex-col sm:flex-row gap-2 mb-4 bg-emerald-50/50 p-3 rounded-xl border border-emerald-100">
                      <input name="id" type="text" placeholder="No Presensi" className="w-full sm:w-24 px-3 py-2 text-xs font-bold rounded-lg border border-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-300 shadow-sm bg-white" required />
                      <input name="name" type="text" placeholder="Nama Lengkap Siswa" className="flex-1 px-3 py-2 text-xs font-bold rounded-lg border border-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-300 shadow-sm bg-white" required />
                      <button type="submit" className="bg-emerald-600 text-white px-5 py-2 rounded-lg text-xs font-black hover:bg-emerald-700 transition-all hover:scale-[1.03] active:scale-95 shadow-md">Tambah</button>
                    </form>

                    <div className="max-h-72 overflow-y-auto pr-2 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2.5">
                      {sortedStudents.length === 0 ? <p className="text-[11px] text-slate-400 text-center py-4 col-span-full">Kelas ini masih kosong.</p> : 
                        sortedStudents.map(s => (
                          <div key={s.id} className="flex justify-between items-center bg-slate-50 px-3 py-2.5 rounded-xl border border-slate-200 hover:scale-[1.02] transition-all duration-300 group">
                            <div className="flex gap-2.5 items-center truncate pr-2">
                              <span className="text-[10px] font-black text-white bg-slate-400 px-1.5 py-0.5 rounded transition-all">{s.id}</span>
                              <span className="text-[11px] font-bold text-slate-800 truncate">{s.name}</span>
                            </div>
                            <div className="flex gap-1.5 flex-none opacity-0 group-hover:opacity-100 transition-opacity">
                              <button onClick={() => openEditStudentModal(s)} className="text-slate-400 hover:text-indigo-600 p-1.5 bg-white rounded-lg border border-slate-100 transition-all hover:scale-110 shadow-sm" title="Edit Siswa"><IconEdit className="w-3.5 h-3.5"/></button>
                              <button onClick={() => setDeletePrompt({show:true, type:'student', target:s.id})} className="text-slate-400 hover:text-rose-600 p-1.5 bg-white rounded-lg border border-slate-100 transition-all hover:scale-110 shadow-sm" title="Hapus Siswa"><IconTrash className="w-3.5 h-3.5"/></button>
                            </div>
                          </div>
                        ))
                      }
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // =========================================================================
    // --- 8. DASHBOARD GURU (SUPER RESPONSIVE & KHUSUS MAPEL) ---
    // =========================================================================
    function Dashboard({ user, activeAssignment, masterData, onLogout, showToast, onUpdateSuccess, triggerKocakPopup, setActiveAssignment }) {
      const [students, setStudents] = useState([]);
      const [grades, setGrades] = useState({});
      const [isSaving, setIsSaving] = useState(false);
      
      const [gradesHistory, setGradesHistory] = useState([]);
      const [historyIndex, setHistoryIndex] = useState(-1);
      const [showPasteModal, setShowPasteModal] = useState(false);
      const [pasteText, setPasteText] = useState('');

      const [showSwitchPopup, setShowSwitchPopup] = useState(false);
      const [switchIndex, setSwitchIndex] = useState(0);
      const [targetAssignment, setTargetAssignment] = useState(null);

      const colData = useMemo(() => getMapelSchema(activeAssignment?.mapel), [activeAssignment]);
      const fileUploadRef = useRef(null);

      const teacherProgress = useMemo(() => {
        let totalExpected = 0, totalFilled = 0;
        let assignmentsProgress = [];
        user.assignments.forEach(a => {
          const key = `${a.classId}|${a.mapel}|${user.name}`;
          const sum = masterData.gradesSummary?.[key] || { uhCount: 0, uhTotal: 0, stsCount: 0, stsTotal: 0, sasCount: 0, sasTotal: 0 };
          const expected = sum.uhTotal + sum.stsTotal + sum.sasTotal;
          const filled = sum.uhCount + sum.stsCount + sum.sasCount;
          totalExpected += expected; totalFilled += filled;
          assignmentsProgress.push({ ...a, pct: expected === 0 ? 0 : Math.round((filled / expected) * 100) });
        });
        return { globalPct: totalExpected === 0 ? 0 : Math.round((totalFilled / totalExpected) * 100), assignmentsProgress };
      }, [user.assignments, masterData.gradesSummary]);

      useEffect(() => {
        if (activeAssignment && masterData.students) {
          const classStudents = [...(masterData.students[activeAssignment.classId] || [])].sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
          setStudents(classStudents);
          
          // SINGLE SOURCE OF TRUTH: Ambil nilai asli dari data server
          const serverKey = `${activeAssignment.classId}|${activeAssignment.mapel.toUpperCase()}`;
          const serverGradesRaw = masterData.gradesData?.[serverKey] || {};

          const initialGrades = {};
          classStudents.forEach(s => { 
            const rawData = serverGradesRaw[s.id];
            if (rawData && rawData.length > 0) {
               const mapped = {};
               colData.keys.forEach((key, idx) => {
                  mapped[key] = rawData[idx] !== undefined ? rawData[idx] : "";
               });
               initialGrades[s.id] = mapped;
            } else {
               initialGrades[s.id] = colData.keys.reduce((acc, col) => ({ ...acc, [col]: col==='penguji'?user.name:'' }), {}); 
            }
          });
          
          setGrades(initialGrades); 
          setGradesHistory([initialGrades]); 
          setHistoryIndex(0);
        }
      }, [activeAssignment, colData.keys, user.name, masterData]);

      const isGradesEmpty = () => {
        if (!students.length) return true;
        return !Object.values(grades).some(studentGrades => Object.entries(studentGrades).some(([k, v]) => k !== 'penguji' && v !== '' && v !== null && v !== undefined));
      };

      const updateGrades = (newGrades) => {
        const updatedHistory = gradesHistory.slice(0, historyIndex + 1);
