    function FunnyDeletePopup({ show, targetName, type, onConfirm, onCancel }) {
      if (!show) return null;
      let desc = `Beneran mau menghapus ${targetName}? Nanti kalau kangen gimana?`;
      if (type === 'teacher') desc = `Yakin mau usir Guru ${targetName}? Ntar siapa yang ngisi nilainya bos? 🥺`;
      if (type === 'student') desc = `Mau mengeluarkan ${targetName}? Jangan-jangan dia anak baek-baek... 😱`;
      if (type === 'class') desc = `Hapus Kelas ${targetName} berserta seluruh siswanya? Kosong melompong dong nanti... 🌪️`;
      if (type === 'mapel') desc = `Hapus Mata Pelajaran ${targetName} dari sekolah? Nanti anak-anak belajar apa dong... 📚`;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">

      if (!show) return null;
      const msg = type === 'success' ? SUCCESS_LOGIN_MSGS[msgIndex % SUCCESS_LOGIN_MSGS.length] : ERROR_LOGIN_MSGS[msgIndex % ERROR_LOGIN_MSGS.length];

      const [isLoading, setIsLoading] = useState(true);

      const fetchCloudMasterData = async (silent = false) => {
        if (!silent) setIsLoading(true);
        try {
          const response = await fetch(SCRIPT_URL);
          const data = await response.json();
          if (data && data.teachers && data.teachers.length > 0) {
            setMasterData(data);
            localStorage.setItem('astaga_master', JSON.stringify(data));
          } else {
            const saved = localStorage.getItem('astaga_master');
            if (saved) setMasterData(JSON.parse(saved));
          }
        } catch (err) {
          console.warn("Gagal mendapatkan data cloud, menggunakan data lokal.", err);
          const saved = localStorage.getItem('astaga_master');
          if (saved) setMasterData(JSON.parse(saved));
        } finally {
          if (!silent) setIsLoading(false);
        }
      };

      useEffect(() => { fetchCloudMasterData(); }, []);

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
      };

      if (isLoading) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
            <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-3"></div>
            <p className="text-[11px] text-slate-500 font-bold tracking-widest uppercase animate-pulse">Menghubungkan ke Cloud ASTAGA...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen max-h-screen h-screen bg-slate-50 flex flex-col overflow-hidden text-xs">
          {!currentUser ? (
            <LoginScreen 
              masterData={masterData} 
              onLogin={(user, assignment) => { 
                setCurrentUser(user); setActiveAssignment(assignment); 
                if(user !== 'ADMIN') setPopup({ show: true, type: 'success', index: Math.floor(Math.random() * 10) }); 
              }} 
              onLoginFail={() => setPopup({ show: true, type: 'error', index: Math.floor(Math.random() * 10) })} 
            />
          ) : currentUser === 'ADMIN' ? (
            <AdminDashboard masterData={masterData} setMasterData={setMasterData} onLogout={() => setCurrentUser(null)} showToast={showToast} toast={toast} onRefreshData={() => fetchCloudMasterData(true)} />
          ) : (
            <Dashboard user={currentUser} activeAssignment={activeAssignment} masterData={masterData} onLogout={() => setCurrentUser(null)} showToast={showToast} toast={toast} onUpdateSuccess={(silent) => fetchCloudMasterData(silent)} setActiveAssignment={setActiveAssignment} triggerKocakPopup={(msg) => setKocakPopup({show: true, message: msg})} />
          )}
          
          <FunnyPopup show={popup.show} type={popup.type} msgIndex={popup.index} onClose={() => setPopup({ ...popup, show: false })} />
          <FunnyKocakPopup show={kocakPopup.show} message={kocakPopup.message} onClose={() => setKocakPopup({ show: false, message: '' })} />
        </div>
      );
    }

    // =========================================================================
    // --- 5. KOMPONEN LAYAR LOGIN ---
    // =========================================================================

        return [...masterData.teachers].sort((a, b) => a.name.localeCompare(b.name));

      const handleLoginGuru = (e) => {
        e.preventDefault();
        if (guruObj && guruObj.password === password && selectedAssign) {
          const [kelas, mapel] = selectedAssign.split('|');

        e.preventDefault();
        if (adminPass === 'admin123') onLogin('ADMIN', null); else onLoginFail();

          <div className="max-w-sm w-full bg-white rounded-[24px] shadow-xl border border-slate-200 relative animate-in fade-in duration-300 hover:shadow-2xl transition-all">
            <div className={`p-6 text-center transition-colors duration-500 ${mode === 'admin' ? 'bg-slate-900' : 'bg-indigo-600'}`}>
              <div className="bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 backdrop-blur-md shadow-inner">
                {mode === 'admin' ? <IconSettings className="text-white w-7 h-7 animate-[spin_4s_linear_infinite]" /> : <IconGraduationCap className="text-white w-7 h-7" />}
              </div>
              <h1 className="text-2xl font-black text-white tracking-widest leading-none animate-pulse">ASTAGA</h1>
              <p className="text-white/80 text-[10px] font-semibold uppercase tracking-wider mt-1">{mode === 'admin' ? 'Ruang Kendali Admin' : 'Asisten Sistem Terpadu Guru Al Kautsar'}</p>
            </div>
            
            <div className="p-6">
              {mode === 'guru' ? (
                <form onSubmit={handleLoginGuru} className="space-y-4 animate-in fade-in slide-in-from-left-4">
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Pilih Nama Guru</label>
                    <div className="relative hover:scale-[1.02] active:scale-95 transition-all duration-300">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><IconUser className="h-4 w-4 text-slate-400" /></div>
                      <select className="pl-9 w-full rounded-xl border border-slate-200 py-2.5 px-3 text-xs text-slate-800 focus:outline-none focus:border-indigo-500 font-bold appearance-none cursor-pointer bg-slate-50 hover:bg-indigo-50 transition-colors" value={selectedGuru} onChange={(e) => { setSelectedGuru(e.target.value); setSelectedAssign(''); }} required>
                        <option value="" className="text-slate-400">-- Klik untuk memilih --</option>
                        {sortedTeachersForLogin.map((t, i) => <option key={i} value={t.name}>{t.name}</option>)}
                      </select>
                    </div>
                  </div>
                  {guruObj && (
                    <div className="animate-in fade-in slide-in-from-top-2">
                      <label className="block text-[11px] font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Pilih Kelas & Mata Pelajaran</label>
                      <div className="relative hover:scale-[1.02] active:scale-95 transition-all duration-300">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><IconBookOpen className="h-4 w-4 text-slate-400" /></div>
                        <select className="pl-9 w-full rounded-xl border border-slate-200 py-2.5 px-3 text-xs text-slate-800 focus:outline-none focus:border-indigo-500 font-bold appearance-none cursor-pointer bg-slate-50 hover:bg-indigo-50 transition-colors" value={selectedAssign} onChange={(e) => setSelectedAssign(e.target.value)} required>
                          <option value="">-- Pilih Kelas --</option>
                          {guruObj.assignments.map((a, i) => <option key={i} value={`${a.classId}|${a.mapel}`}>Kelas {a.classId} - {a.mapel}</option>)}
                        </select>
                      </div>
                    </div>
                  )}
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Password / PIN</label>
                    <div className="relative hover:scale-[1.02] active:scale-95 transition-all duration-300">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><IconLock className="h-4 w-4 text-slate-400" /></div>
                      <input type="password" className="pl-9 w-full rounded-xl border-2 border-slate-200 py-2.5 px-3 text-xs text-slate-800 focus:outline-none focus:border-indigo-500 font-bold bg-slate-50 hover:bg-indigo-100 transition-colors" placeholder="Masukkan password" value={password} onChange={(e) => setPassword(e.target.value)} required />

            <div className="bg-slate-50 border-t border-slate-200 p-4 text-center">
              <button onClick={() => { setMode(mode === 'guru' ? 'admin' : 'guru'); setPassword(''); setAdminPass(''); }} className="text-[11px] font-extrabold text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-wider">
                {mode === 'guru' ? '🛠️ Masuk sebagai Admin?' : '👨‍🏫 Kembali ke Login Guru'}

            </div>
          </div>

    // =========================================================================
    // --- 6. KOMPONEN PANEL ADMIN UTAMA ---
    // =========================================================================
    function AdminDashboard({ masterData, setMasterData, onLogout, showToast, toast, onRefreshData }) {
      const [activeTab, setActiveTab] = useState('overview'); 
      const [isSyncing, setIsSyncing] = useState(false);
      const [expandedGuru, setExpandedGuru] = useState({});
      const [showResetConfirm, setShowResetConfirm] = useState(false);

      const totalGuru = masterData.teachers.length;
      const totalSiswa = Object.values(masterData.students).flat().length - (masterData.students["__MAPELS__"] ? masterData.students["__MAPELS__"].length : 0);
      const totalKelas = Object.keys(masterData.students).filter(k => k !== "__MAPELS__").length;
      
      const trackingData = useMemo(() => {
        let totalCellsExpected = 0, totalCellsFilled = 0;
        const list = masterData.teachers.flatMap(t => 
          t.assignments.map(a => {
            const key = `${a.classId}|${a.mapel}|${t.name}`;
            const sum = masterData.gradesSummary?.[key] || { uhCount: 0, uhTotal: 0, stsCount: 0, stsTotal: 0, sasCount: 0, sasTotal: 0 };
            const expected = sum.uhTotal + sum.stsTotal + sum.sasTotal;
            const filled = sum.uhCount + sum.stsCount + sum.sasCount;
            totalCellsExpected += expected; totalCellsFilled += filled;
            const progress = expected === 0 ? 0 : Math.round((filled / expected) * 100);
            return { guru: t.name, kelas: a.classId, mapel: a.mapel, progress, completed: progress===100 };
          })
        );
        const globalProgress = totalCellsExpected === 0 ? 0 : Math.round((totalCellsFilled / totalCellsExpected) * 100);
        return { list, globalProgress };
      }, [masterData]);

      const teachersProgress = useMemo(() => {
        const map = {};
        masterData.teachers.forEach(t => map[t.name] = { name: t.name, total: 0, completed: 0, assignments: [] });
        trackingData.list.forEach(item => {
          if (!map[item.guru]) map[item.guru] = { name: item.guru, total: 0, completed: 0, assignments: [] };
          map[item.guru].assignments.push(item);
          map[item.guru].total++;
          if (item.completed) map[item.guru].completed++;
        });
        return Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
      }, [masterData, trackingData]);

      const toggleGuru = (name) => { setExpandedGuru(prev => ({ ...prev, [name]: !prev[name] })); };

      const downloadTemplateGuru = () => {
        const header = ["No", "Nama Guru", "Password", "Mapel 1", "Kelas Mapel 1 (Pisahkan dgn koma)", "Mapel 2", "Kelas Mapel 2", "Mapel 3", "Kelas Mapel 3", "Mapel 4", "Kelas Mapel 4", "Mapel 5", "Kelas Mapel 5"];
        const ws = window.XLSX.utils.aoa_to_sheet([header, [1, "Pak Budi Contoh", "123", "Matematika", "10A, 10B", "", "", "", "", "", "", "", ""]]);
        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, "MasterGuru"); window.XLSX.writeFile(wb, "Template_Master_Guru.xlsx");
      };

      const downloadTemplateSiswa = () => {
        const header = ["Kelas", "No Presensi", "Nama Siswa"];
        const ws = window.XLSX.utils.aoa_to_sheet([header, ["10A", "1", "Agus Contoh"]]);
        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, "MasterSiswa"); window.XLSX.writeFile(wb, "Template_Master_Siswa.xlsx");
      };

      const syncToCloud = async (action, payloadKey, payloadData, successMsg) => {
        setIsSyncing(true);
        try {
          await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, [payloadKey]: payloadData }) });
          showToast(successMsg, "success");
        } catch (err) { showToast("Koneksi gagal, tersimpan lokal sementara.", "error"); } finally { setIsSyncing(false); }
      };

      const handleResetGrades = async () => {
        setShowResetConfirm(false); setIsSyncing(true);
        try {
          await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "resetGrades" }) });
          showToast("Berhasil! Semua rekap nilai di-reset.", "success"); onRefreshData();
        } catch (err) { showToast("Gagal reset. Cek koneksi!", "error"); } finally { setIsSyncing(false); }
      };

      const handleUploadGuru = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result); const workbook = window.XLSX.read(data, {type: 'array'});
            if (!workbook.SheetNames.length) { showToast("File Excel kosong!", "error"); return; }
            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
            const teachersMap = {};
            rows.slice(1).forEach(parts => {
              if(parts.length > 1 && parts[1]) {
                const nama = toProperCase(String(parts[1]).trim()); const pass = parts[2] !== "" ? String(parts[2]).trim() : "123";
                if(nama) {
                  if(!teachersMap[nama]) teachersMap[nama] = { name: nama, password: pass, assignments: [] };
                  for(let i = 0; i < 5; i++) {
                    const mIdx = 3 + (i * 2); const kIdx = 4 + (i * 2);
                    if (parts[mIdx] !== undefined && parts[kIdx] !== undefined) {
                       const mName = toProperCase(String(parts[mIdx]).trim());
                       const kArr = String(parts[kIdx]).split(',').map(k => k.trim().toUpperCase()).filter(k => k);
                       if (mName && kArr.length > 0) {
                         kArr.forEach(k => { if(!teachersMap[nama].assignments.find(a => a.classId === k && a.mapel === mName)) teachersMap[nama].assignments.push({ classId: k, mapel: mName }); });
                       }
                    }
                  }
                }
              }
            });
            const newTeachers = Object.values(teachersMap).filter(t => t.assignments.length > 0);
            if(newTeachers.length > 0) { setMasterData(p => ({ ...p, teachers: newTeachers })); syncToCloud("saveMasterGuru", "teachers", newTeachers, "Data Guru tersimpan ke Cloud!"); } 
            else showToast(`Format Excel salah!`, 'error');
          } catch(err) { showToast(`Gagal baca Excel Guru.`, 'error'); }
        }; reader.readAsArrayBuffer(file); e.target.value = ''; 
      };

      const handleUploadSiswa = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result); const workbook = window.XLSX.read(data, {type: 'array'});
            if (!workbook.SheetNames.length) { showToast("File Excel kosong!", "error"); return; }
            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
            const studentsMap = { ...masterData.students }; 
            for (let k in studentsMap) { if (k !== "__MAPELS__") delete studentsMap[k]; }
            rows.slice(1).forEach((parts, idx) => {
              if(parts.length >= 3 && parts[0]) {
                const kelas = String(parts[0]).trim().toUpperCase(); const idSiswa = parts[1] !== "" ? String(parts[1]).trim() : String(idx + 1); const namaSiswa = toProperCase(String(parts[2]).trim());
                if(kelas && namaSiswa) { if(!studentsMap[kelas]) studentsMap[kelas] = []; studentsMap[kelas].push({ id: idSiswa, name: namaSiswa }); }
              }
            });
            if(Object.keys(studentsMap).length > 0) { setMasterData(p => ({ ...p, students: studentsMap })); syncToCloud("saveMasterSiswa", "students", studentsMap, "Data Siswa tersimpan ke Cloud!"); } 
            else showToast(`Format Excel salah!`, 'error');
          } catch(err) { showToast(`Gagal baca Excel Siswa.`, 'error'); }
        }; reader.readAsArrayBuffer(file); e.target.value = ''; 
      };

      return (
        <div className="h-screen max-h-screen flex flex-col font-sans text-xs overflow-hidden bg-slate-50">
          <FunnyDeletePopup show={showResetConfirm} targetName="Seluruh Rekap Nilai" type="class" onConfirm={handleResetGrades} onCancel={() => setShowResetConfirm(false)} />

          <header className="flex-none bg-slate-900 text-white shadow-xl h-12 flex items-center justify-between px-4 z-20">
            <div className="flex items-center space-x-2 hover:scale-[1.03] hover:-translate-y-0.5 active:scale-95 transition-all duration-300 cursor-pointer">
              <div className="bg-indigo-500 p-1 rounded-lg"><IconSettings className="w-4 h-4 text-white" /></div>
              <h1 className="font-extrabold text-[13px] tracking-widest flex items-center gap-1.5">ASTAGA <span className="bg-indigo-700 px-1.5 py-0.5 rounded text-[8px] tracking-wide">ADMIN</span></h1>
            </div>
            <div className="flex space-x-1 border border-slate-700 bg-slate-800 rounded-lg p-0.5 shadow-inner">
              <button onClick={() => setActiveTab('overview')} className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider transition-all duration-300 hover:scale-[1.03] hover:-translate-y-0.5 active:scale-95 ${activeTab === 'overview' ? 'bg-indigo-500 text-white shadow' : 'text-slate-400 hover:text-white'}`}>Progres</button>
              <button onClick={() => setActiveTab('database')} className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider transition-all duration-300 hover:scale-[1.03] hover:-translate-y-0.5 active:scale-95 ${activeTab === 'database' ? 'bg-indigo-500 text-white shadow' : 'text-slate-400 hover:text-white'}`}>Database</button>
              <button onClick={() => setActiveTab('settings')} className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider transition-all duration-300 hover:scale-[1.03] hover:-translate-y-0.5 active:scale-95 ${activeTab === 'settings' ? 'bg-indigo-500 text-white shadow' : 'text-slate-400 hover:text-white'}`}>Pengaturan</button>
            </div>
            <button onClick={onLogout} className="text-slate-400 hover:text-rose-400 p-1.5 rounded-lg transition-all duration-300 hover:scale-[1.03] hover:-translate-y-0.5 hover:bg-slate-800" title="Keluar"><IconLogOut className="w-4 h-4" /></button>
          </header>

          <main className="flex-1 flex flex-col overflow-hidden max-w-5xl mx-auto p-3 sm:p-4 w-full min-h-0">
            {isSyncing && (
              <div className="flex-none bg-indigo-50 text-indigo-700 px-3 py-2 rounded-xl border border-indigo-200 flex items-center justify-center space-x-2 text-[10px] font-bold animate-pulse mb-3 shadow-sm uppercase tracking-wider">
                <div className="w-3.5 h-3.5 border-2 border-indigo-700 border-t-transparent rounded-full animate-spin"></div><span>Menyelaraskan Data Cloud...</span>
              </div>
            )}

            <div className="flex-1 overflow-y-auto scrollbar-hide space-y-4 pb-10">
              {activeTab === 'overview' && (
                <div className="space-y-4">
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-2.5">
                    <div className="bg-gradient-to-br from-sky-100 to-sky-50 border border-sky-300 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5 hover:-translate-y-0.5 hover:shadow-md hover:scale-[1.03] active:scale-95 transition-all duration-300 cursor-pointer">
                      <div className="bg-white border border-sky-100 p-1.5 rounded-xl shadow-inner"><IconUsers className="w-4 h-4 text-sky-600" /></div>
                      <div><p className="text-[9px] text-sky-700 font-bold uppercase tracking-wider">Guru Aktif</p><h3 className="text-sm font-black text-slate-800">{totalGuru}</h3></div>
                    </div>
                    <div className="bg-gradient-to-br from-emerald-100 to-emerald-50 border border-emerald-300 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5 hover:-translate-y-0.5 hover:shadow-md hover:scale-[1.03] active:scale-95 transition-all duration-300 cursor-pointer">
                      <div className="bg-white border border-emerald-100 p-1.5 rounded-xl shadow-inner"><IconGraduationCap className="w-4 h-4 text-emerald-600" /></div>
                      <div><p className="text-[9px] text-emerald-700 font-bold uppercase tracking-wider">Siswa</p><h3 className="text-sm font-black text-slate-800">{totalSiswa}</h3></div>
                    </div>
                    <div className="bg-gradient-to-br from-amber-100 to-amber-50 border border-amber-300/80 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5 hover:-translate-y-0.5 hover:shadow-md hover:scale-[1.03] active:scale-95 transition-all duration-300 cursor-pointer">
                      <div className="bg-white border border-amber-100 p-1.5 rounded-xl shadow-inner"><IconBookOpen className="w-4 h-4 text-amber-600" /></div>
                      <div><p className="text-[9px] text-amber-700 font-bold uppercase tracking-wider">Kelas</p><h3 className="text-sm font-black text-slate-800">{totalKelas}</h3></div>
                    </div>
                    <div className="bg-gradient-to-br from-indigo-100 to-indigo-50 border border-indigo-300/80 p-3 rounded-2xl shadow-sm flex items-center space-x-2.5 relative overflow-hidden hover:-translate-y-0.5 hover:shadow-md hover:scale-[1.03] active:scale-95 transition-all duration-300 cursor-pointer">
                      <div className="bg-white border border-indigo-100 p-1.5 rounded-xl shadow-inner"><IconActivity className="w-4 h-4 text-indigo-600" /></div>
                      <div><p className="text-[9px] text-indigo-700 font-bold uppercase tracking-wider">Global</p><h3 className="text-sm font-black text-indigo-800">{trackingData.globalProgress}%</h3></div>
                      <div className="absolute bottom-0 left-0 h-1 bg-indigo-400" style={{ width: `${trackingData.globalProgress}%` }}></div>
                    </div>
                  </div>

                  <div className="space-y-2 animate-in fade-in">
                    <div className="flex justify-between items-center mb-2">
                      <div>
                        <h2 className="text-xs font-black text-slate-800 uppercase tracking-wide">Status Kelengkapan Nilai Per Guru</h2>
                        <p className="text-[10px] text-slate-500">Klik nama guru untuk detail kelas.</p>
                      </div>
                      <button onClick={onRefreshData} className="bg-white border border-slate-200 hover:bg-slate-50 active:scale-95 transition-all text-slate-600 font-bold px-2.5 py-1.5 rounded-lg shadow-sm flex items-center space-x-1.5 text-3xs hover:scale-[1.03] hover:-translate-y-0.5 duration-300">
                        <IconRefresh className="w-3.5 h-3.5 text-slate-500" /><span>Sync Nilai</span>
                      </button>
                    </div>

                    {teachersProgress.map((guruItem, idx) => {
                      const pct = guruItem.total === 0 ? 0 : Math.round((guruItem.completed / guruItem.total) * 100);
                      const isExpanded = !!expandedGuru[guruItem.name];
                      const cardStyle = TEACHER_CARD_COLORS[idx % TEACHER_CARD_COLORS.length];

                      return (
                        <div key={idx} className={`rounded-xl border overflow-hidden shadow-sm hover:-translate-y-0.5 hover:shadow-md hover:scale-[1.01] transition-all duration-300 ${cardStyle}`}>
                          <div onClick={() => toggleGuru(guruItem.name)} className="p-3 flex flex-col sm:flex-row sm:items-center justify-between gap-2.5 cursor-pointer hover:bg-white/40">
                            <div className="flex items-center space-x-3">
                              <div className={`w-9 h-9 rounded-xl border flex items-center justify-center font-bold text-base shadow-sm ${AVATAR_COLORS[idx % AVATAR_COLORS.length]}`}>{guruItem.name.charAt(0)}</div>
                              <div>
                                <h3 className="font-extrabold text-slate-800 text-xs">{guruItem.name}</h3>
                                <p className="text-3xs text-slate-500 font-bold uppercase tracking-wider">Mengajar {guruItem.total} Kelas / Mapel</p>
                              </div>
                            </div>
                            <div className="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto border-t sm:border-t-0 pt-2 sm:pt-0 border-slate-200/50">
                              <div className="text-left sm:text-right">
                                <span className="text-3xs font-extrabold text-slate-400 uppercase tracking-wider block">Status</span>
                                <p className="text-2xs font-black text-slate-700">{guruItem.completed}/{guruItem.total} Selesai</p>
                              </div>
                              <div className="flex items-center space-x-1.5">
                                <span className="text-3xs font-extrabold text-slate-400 uppercase tracking-wider hidden xs:inline">Progres</span>
                                <span className={`px-2.5 py-0.5 rounded-lg text-2xs font-black border tracking-wider transition-all shadow-sm ${pct === 100 ? 'bg-emerald-50 text-emerald-800 border-emerald-300' : pct > 0 ? 'bg-amber-50 text-amber-800 border-amber-300 animate-pulse' : 'bg-slate-50 text-slate-400 border-slate-200'}`}>{pct}%</span>
                              </div>
                              <IconActivity className={`w-4 h-4 text-slate-400 transform transition-transform duration-300 ${isExpanded ? 'rotate-180 text-indigo-600' : ''}`} />
                            </div>
                          </div>

                          {isExpanded && (
                            <div className="border-t border-slate-200/50 bg-white/40 p-3 animate-in fade-in duration-300">
                              {guruItem.assignments.length === 0 ? <p className="text-3xs font-semibold text-slate-400 text-center py-2">Belum ada tugas kelas/subjek yang dimuat naik.</p> : (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                  {guruItem.assignments.map((assign, aIdx) => (
                                    <div key={aIdx} className="bg-white/80 backdrop-blur-sm p-2.5 rounded-lg border border-slate-200/60 flex items-center justify-between gap-2.5 shadow-sm hover:border-slate-300 hover:scale-[1.03] hover:-translate-y-0.5 active:scale-95 transition-all duration-300">
                                      <div>
                                        <p className="font-extrabold text-slate-800 text-xs">{assign.mapel}</p>
                                        <span className="inline-block mt-0.5 bg-slate-100 text-slate-600 font-bold px-1.5 py-0.5 rounded text-3xs border border-slate-200">Kelas {assign.kelas}</span>
                                      </div>
                                      <div className="flex items-center space-x-1 bg-white border border-slate-200/60 p-1 rounded-lg shadow-inner">
                                        {['uh', 'sts', 'sas'].map(type => {
                                          const val = assign[`${type}Pct`];
                                          const clr = val === 100 ? 'bg-teal-100 text-teal-800 border-teal-300 shadow-inner' : val > 0 ? 'bg-amber-100 text-amber-800 border-amber-300 animate-pulse' : 'bg-slate-50 text-slate-400 border-slate-200';
                                          return <div key={type} className={`px-2 py-0.5 rounded text-3xs font-extrabold tracking-wider border transition-all ${clr}`}>{type.toUpperCase()} {val}%</div>
                                        })}
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {activeTab === 'database' && (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in">
                  <div className="bg-gradient-to-br from-indigo-50/60 via-white to-indigo-50/10 rounded-2xl shadow-sm border border-indigo-200 flex flex-col hover:shadow-md hover:scale-[1.03] hover:-translate-y-0.5 active:scale-95 transition-all duration-300 cursor-pointer">
                    <div className="p-5 border-b border-indigo-100/50">
                      <div className="flex justify-between items-start mb-4">
                        <div className="flex items-center space-x-2">
                          <div className="bg-white border border-indigo-200 p-1.5 rounded-xl shadow-inner"><IconUser className="w-4 h-4 text-indigo-500"/></div>
                          <h2 className="text-sm font-black text-slate-800">Master Data Guru</h2>
                        </div>
                        <button onClick={downloadTemplateGuru} className="flex items-center space-x-1 text-3xs font-bold bg-white hover:bg-indigo-100 hover:text-indigo-800 border border-indigo-200 text-indigo-600 px-2 py-1 rounded-lg transition-all hover:scale-[1.05] active:scale-95 shadow-sm">
                          <IconDownload className="w-3.5 h-3.5" /> <span>Template</span>
                        </button>
                      </div>
                      <div className="border-2 border-dashed border-indigo-300 rounded-xl p-4 text-center bg-white/80 hover:bg-white hover:border-indigo-400 transition-colors relative cursor-pointer group" onClick={(e) => { if(e.target.tagName !== 'INPUT') e.currentTarget.querySelector('input').click() }}>
                        <IconFileText className="w-7 h-7 text-indigo-400 mx-auto mb-1 group-hover:text-indigo-600 transition-colors" />
                        <span className="text-2xs font-extrabold text-slate-600 group-hover:text-indigo-800 block">Klik & Pilih Excel Guru</span>
                        <input type="file" accept=".xls,.xlsx" onChange={handleUploadGuru} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                      </div>
                    </div>
                    <div className="p-5 pt-3 bg-white/40 flex-1 rounded-b-2xl">
                      <p className="font-extrabold text-3xs text-indigo-500 uppercase tracking-widest mb-2">Tersimpan: {masterData.teachers.length} Guru</p>
                      <div className="flex flex-wrap gap-1.5">
                        {masterData.teachers.map((t,i) => <span key={i} className="bg-white border border-indigo-200 px-2.5 py-0.5 rounded-lg text-3xs font-bold text-indigo-800 shadow-sm">{t.name}</span>)}
                      </div>
                    </div>
                  </div>

                  <div className="bg-gradient-to-br from-emerald-50/60 via-white to-emerald-50/10 rounded-2xl shadow-sm border border-emerald-200 flex flex-col hover:shadow-md hover:scale-[1.03] hover:-translate-y-0.5 active:scale-95 transition-all duration-300 cursor-pointer">
                    <div className="p-5 border-b border-emerald-50/50">
                      <div className="flex justify-between items-start mb-4">
                        <div className="flex items-center space-x-2">
                          <div className="bg-white border border-emerald-200 p-1.5 rounded-xl shadow-inner"><IconGraduationCap className="w-4 h-4 text-emerald-500"/></div>
                          <h2 className="text-sm font-black text-slate-800">Master Data Siswa</h2>
                        </div>
                        <button onClick={downloadTemplateSiswa} className="flex items-center space-x-1 text-3xs font-bold bg-white hover:bg-emerald-100 hover:text-emerald-800 border border-emerald-200 text-emerald-600 px-2 py-1 rounded-lg transition-all hover:scale-[1.05] active:scale-95 shadow-sm">
                          <IconDownload className="w-3.5 h-3.5" /> <span>Template</span>
                        </button>
                      </div>
                      <div className="border-2 border-dashed border-emerald-300 rounded-xl p-4 text-center bg-white/80 hover:bg-white hover:border-emerald-400 transition-colors relative cursor-pointer group" onClick={(e) => { if(e.target.tagName !== 'INPUT') e.currentTarget.querySelector('input').click() }}>
                        <IconFileText className="w-7 h-7 text-indigo-400 mx-auto mb-1 group-hover:text-emerald-600 transition-colors" />
                        <span className="text-2xs font-extrabold text-slate-600 group-hover:text-indigo-800 block">Klik & Pilih Excel Siswa</span>
                        <input type="file" accept=".xls,.xlsx" onChange={handleUploadSiswa} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                      </div>
                    </div>
                    <div className="p-5 pt-3 bg-white/40 flex-1 rounded-b-2xl">
                      <p className="font-extrabold text-3xs text-emerald-500 uppercase tracking-widest mb-2">Tersimpan: {totalKelas} Kelas</p>
                      <div className="flex flex-wrap gap-1.5">
                        {Object.keys(masterData.students).filter(k => k !== "__MAPELS__").map((k,i) => <span key={i} className="bg-white border border-emerald-200 px-2.5 py-0.5 rounded-lg text-3xs font-bold text-emerald-800 shadow-sm">Kls {k} ({masterData.students[k].length})</span>)}
                      </div>
                    </div>
                  </div>

                  <div className="bg-gradient-to-br from-rose-50 to-orange-50/60 border border-rose-300 rounded-2xl p-5 col-span-1 md:col-span-2 mt-2 shadow-sm hover:shadow-md hover:scale-[1.01] hover:-translate-y-0.5 transition-all duration-300 cursor-pointer">
                    <div className="flex items-center space-x-2 mb-2">
                      <div className="bg-white border border-rose-200 p-1.5 rounded-xl shadow-inner"><IconAlertCircle className="w-4 h-4 text-rose-500" /></div>
                      <h2 className="text-sm font-black text-rose-950">Zona Bahaya (Danger Zone)</h2>
                    </div>
                    <p className="text-rose-800 text-3xs mb-4 leading-relaxed font-bold">
                      Menghapus semua tab rekap nilai di Google Sheets anda secara permanen. Data master guru dan siswa akan tetap disimpan dengan aman.
                    </p>
                    <button onClick={() => setShowResetConfirm(true)} className="bg-rose-500 hover:bg-rose-600 active:scale-95 transition-all hover:scale-[1.03] hover:-translate-y-0.5 text-white font-bold py-2 px-4 rounded-xl text-xs shadow-md shadow-rose-500/10">
                      Reset Semua Rekap Nilai Siswa
                    </button>
                  </div>
                </div>
              )}

              {activeTab === 'settings' && (
                <div className="pb-4">
                  <AdminSettingsTab masterData={masterData} setMasterData={setMasterData} syncGuru={syncToCloud} syncSiswa={syncToCloud} showToast={showToast} />
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    // =========================================================================
    // --- 7. KOMPONEN PENGATURAN (ADMIN SETTINGS TAB) ---
    // =========================================================================
    function AdminSettingsTab({ masterData, setMasterData, syncGuru, syncSiswa, showToast }) {
      const [view, setView] = useState('guru'); 
      const [newTeacherName, setNewTeacherName] = useState('');
      const [newTeacherPass, setNewTeacherPass] = useState('123');
      const [deletePrompt, setDeletePrompt] = useState({ show: false, type: '', target: null, name: '' });
      const [expandedTeacher, setExpandedTeacher] = useState(null);
      
      const [selClass, setSelClass] = useState('');
      const [newClassName, setNewClassName] = useState('');

      const [editingTeacherObj, setEditingTeacherObj] = useState(null);
      const [editingTeacherName, setEditingTeacherName] = useState('');
      const [editingTeacherPass, setEditingTeacherPass] = useState('');

      const [editingStudentObj, setEditingStudentObj] = useState(null);
      const [editStudentNumber, setEditStudentNumber] = useState('');
      const [editStudentName, setEditStudentName] = useState('');

      const [newMapelName, setNewMapelName] = useState('');
      const [editingMapel, setEditingMapel] = useState(null);
      const [editMapelName, setEditMapelName] = useState('');

      const mapelsList = useMemo(() => {
        const storedMapels = masterData.students["__MAPELS__"] || DEFAULT_MAPELS;
        return [...storedMapels].sort((a, b) => a.localeCompare(b));
      }, [masterData.students]);

      const sortedTeachers = useMemo(() => {
        return [...masterData.teachers].sort((a, b) => a.name.localeCompare(b.name));
      }, [masterData.teachers]);

      const sortedStudents = useMemo(() => {
        if (!selClass || !masterData.students[selClass]) return [];
        return [...masterData.students[selClass]].sort((a, b) => {
          return a.id.localeCompare(b.id, undefined, {numeric: true, sensitivity: 'base'});
        });
      }, [masterData.students, selClass]);

      const handleTeacherClick = (t) => {
        if (expandedTeacher === t.name) setExpandedTeacher(null);
        else setExpandedTeacher(t.name);
      };

      const handleSaveTeacherProfileInline = (oldName) => {
        const newName = toProperCase(editingTeacherName.trim()); const newPass = editingTeacherPass.trim();
        if (!newName || !newPass) { showToast("Nama dan password kosong!", "error"); return; }
        if (newName !== oldName && masterData.teachers.find(t => t.name === newName)) { showToast("Guru sudah terdaftar!", "error"); return; }
        const newData = masterData.teachers.map(t => t.name === oldName ? { ...t, name: newName, password: newPass } : t);
        setMasterData(p => ({...p, teachers: newData}));
        syncGuru("saveMasterGuru", "teachers", newData, `Profil Guru diperbarui.`);
        if(expandedTeacher === oldName) setExpandedTeacher(newName);
      };

      const openEditStudentModal = (s) => { setEditingStudentObj(s); setEditStudentNumber(s.id); setEditStudentName(s.name); };
      const handleSaveStudentProfile = () => {
        const newId = editStudentNumber.trim(); const newName = toProperCase(editStudentName.trim());
        if (!newId || !newName) { showToast("Data kosong!", "error"); return; }
        if (newId !== editingStudentObj.id && masterData.students[selClass].find(s => s.id === newId)) { showToast("ID sudah digunakan!", "error"); return; }
        const classList = masterData.students[selClass].map(s => s.id === editingStudentObj.id ? { id: newId, name: newName } : s);
        const newStudents = { ...masterData.students, [selClass]: classList };
        setMasterData(p => ({...p, students: newStudents}));
        syncSiswa("saveMasterSiswa", "students", newStudents, `Siswa diperbarui.`);
        setEditingStudentObj(null);
      };

      const handleAddMapel = (e) => {
        e.preventDefault();
        const rawMapel = newMapelName.trim(); const mapel = rawMapel.length > 5 ? toProperCase(rawMapel) : rawMapel.toUpperCase();
        if(!mapel) return;
        if (mapelsList.includes(mapel)) { showToast("Mapel terdaftar!", "error"); return; }
        const updatedMapels = [...mapelsList, mapel];
        const newStudents = { ...masterData.students, "__MAPELS__": updatedMapels };
        setMasterData(p => ({...p, students: newStudents}));
        syncSiswa("saveMasterSiswa", "students", newStudents, `Mapel ditambahkan.`);
        setNewMapelName('');
      };

      const handleSaveMapel = () => {
        const newName = editMapelName.trim();
        if (!newName) return;
        if (newName !== editingMapel && mapelsList.includes(newName)) { showToast("Mapel sudah ada!", "error"); return; }
        const updatedMapels = mapelsList.map(m => m === editingMapel ? newName : m);
        const updatedTeachers = masterData.teachers.map(t => {
          const updatedAssigns = t.assignments.map(a => a.mapel === editingMapel ? { ...a, mapel: newName } : a);
          return { ...t, assignments: updatedAssigns };
        });
        const newStudents = { ...masterData.students, "__MAPELS__": updatedMapels };
        setMasterData(p => ({ ...p, students: newStudents, teachers: updatedTeachers }));
        syncSiswa("saveMasterSiswa", "students", newStudents, `Mapel diubah.`);
        syncGuru("saveMasterGuru", "teachers", updatedTeachers, "Jadwal guru otomatis menyesuaikan.");
        setEditingMapel(null);
      };

      const confirmDelete = () => {
        if(deletePrompt.type === 'teacher') {
          const newData = masterData.teachers.filter(t => t.name !== deletePrompt.target);
          setMasterData(p => ({...p, teachers: newData}));
          syncGuru("saveMasterGuru", "teachers", newData, `Guru dihapus.`);
          setExpandedTeacher(null);
        } else if(deletePrompt.type === 'class') {
          const newStudents = { ...masterData.students }; delete newStudents[deletePrompt.target];
          setMasterData(p => ({...p, students: newStudents}));
          syncSiswa("saveMasterSiswa", "students", newStudents, `Kelas dihapus.`);
          setSelClass('');
        } else if(deletePrompt.type === 'student') {
          const classList = masterData.students[selClass].filter(s => s.id !== deletePrompt.target);
          const newStudents = { ...masterData.students, [selClass]: classList };
          setMasterData(p => ({...p, students: newStudents}));
          syncSiswa("saveMasterSiswa", "students", newStudents, "Siswa dihapus.");
        } else if(deletePrompt.type === 'mapel') {
          const updatedMapels = mapelsList.filter(m => m !== deletePrompt.target);
          const newStudents = { ...masterData.students, "__MAPELS__": updatedMapels };
          setMasterData(p => ({...p, students: newStudents}));
          syncSiswa("saveMasterSiswa", "students", newStudents, `Mapel dihapus.`);
        }
        setDeletePrompt({ show: false, type: '', target: null, name: '' });
      };

      const handleAddTeacher = (e) => {
        e.preventDefault();
        const name = toProperCase(newTeacherName.trim()); const pass = newTeacherPass.trim();
        if(!name || !pass) return;
        if(masterData.teachers.find(t => t.name === name)) { showToast("Guru sudah ada!", "error"); return; }
        const newData = [...masterData.teachers, { name, password: pass, assignments: [] }];
        setMasterData(p => ({...p, teachers: newData}));
        syncGuru("saveMasterGuru", "teachers", newData, `Guru ditambahkan.`);
        setNewTeacherName(''); setNewTeacherPass('123'); 
      };

      const handleDeleteAssign = (teacherName, assignIdx) => {
        const newData = masterData.teachers.map(t => {
          if (t.name === teacherName) {
             const newAssigns = [...t.assignments]; newAssigns.splice(assignIdx, 1);
             return { ...t, assignments: newAssigns };
          }
          return t;
        });
        setMasterData(p => ({...p, teachers: newData}));
        syncGuru("saveMasterGuru", "teachers", newData, "Jadwal diperbarui.");
      };

      const handleAddAssign = (e, teacherName) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const mapel = fd.get('mapel'); const kelas = fd.get('kelas').trim().toUpperCase();
        if(!mapel || !kelas) return;
        const newData = masterData.teachers.map(t => {
          if(t.name === teacherName) {
            if(t.assignments.find(a => a.classId === kelas && a.mapel === mapel)) return t; 
            return { ...t, assignments: [...t.assignments, {classId: kelas, mapel: mapel}] };
          }
          return t;
        });
        setMasterData(p => ({...p, teachers: newData}));
        syncGuru("saveMasterGuru", "teachers", newData, "Jadwal ditambahkan.");
        e.target.reset();
      };

      const handleAddClass = (e) => {
        e.preventDefault();
        const c = newClassName.trim().toUpperCase();
        if(!c || masterData.students[c]) { showToast("Kelas kosong/ada!", "error"); return; }
        const newStudents = { ...masterData.students, [c]: [] };
        setMasterData(p => ({...p, students: newStudents}));
        syncSiswa("saveMasterSiswa", "students", newStudents, `Kelas dibuat.`);
        setNewClassName(''); setSelClass(c);
      };

      const handleAddStudent = (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const id = fd.get('id').trim(); const name = toProperCase(fd.get('name').trim());
        if(!id || !name || !selClass) return;
        const classList = [...(masterData.students[selClass] || [])];
        if(classList.find(s => s.id === id)) { showToast("ID sudah ada!", "error"); return; }
        classList.push({id, name});
        const newStudents = { ...masterData.students, [selClass]: classList };
        setMasterData(p => ({...p, students: newStudents}));
        syncSiswa("saveMasterSiswa", "students", newStudents, "Siswa ditambahkan.");
        e.target.reset();
      };

      return (
        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in pb-4">
          <FunnyDeletePopup show={deletePrompt.show} targetName={deletePrompt.name} type={deletePrompt.type} onConfirm={confirmDelete} onCancel={() => setDeletePrompt({show:false, type:'', target:null, name:''})} />

          {/* Centered Modals SIMETRIS */}
          {editingMapel && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">
              <div className="w-full max-w-sm rounded-[28px] bg-white border border-slate-200 shadow-2xl p-6 transform hover:scale-[1.01] transition-all">
                <div className="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                  <h3 className="font-black text-slate-800 text-sm">Edit Nama Mapel</h3>
                  <button onClick={() => setEditingMapel(null)} className="text-slate-400 hover:text-rose-600 text-xl font-bold">&times;</button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nama Mata Pelajaran</label>
                    <input type="text" value={editMapelName} onChange={e=>setEditMapelName(e.target.value)} className="w-full px-3 py-2.5 text-xs font-bold rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-fuchsia-500 bg-slate-50" />
                  </div>
                  <div className="flex gap-2 pt-2">
                    <button onClick={() => setEditingMapel(null)} className="flex-1 py-2.5 rounded-xl bg-slate-100 border text-slate-700 font-bold hover:bg-slate-200 text-xs transition-all active:scale-95 shadow-sm">Batal</button>
                    <button onClick={handleSaveMapel} className="flex-1 py-2.5 rounded-xl bg-fuchsia-600 text-white font-bold hover:bg-fuchsia-700 text-xs shadow-md transition-all active:scale-95">Simpan</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {editingStudentObj && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">
              <div className="w-full max-w-sm rounded-[28px] bg-white border border-slate-200 shadow-2xl p-6 transform hover:scale-[1.01] transition-all">
                <div className="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                  <h3 className="font-black text-slate-800 text-sm">Edit Profil Siswa</h3>
                  <button onClick={() => setEditingStudentObj(null)} className="text-slate-400 hover:text-rose-600 text-xl font-bold">&times;</button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nomor Presensi / ID</label>
                    <input type="text" value={editStudentNumber} onChange={e=>setEditStudentNumber(e.target.value)} className="w-full px-3 py-2.5 text-xs font-bold rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50" />
                  </div>

    // =========================================================================
    // --- 8. DASHBOARD GURU (SUPER RESPONSIVE, STICKY KOKOH & KHUSUS MAPEL) ---
    // =========================================================================
    function Dashboard({ user, activeAssignment, masterData, onLogout, showToast, onUpdateSuccess, triggerKocakPopup }) {
      const [students, setStudents] = useState([]);
      const [grades, setGrades] = useState({});
      const [isSaving, setIsSaving] = useState(false);
      const [showRemediPopup, setShowRemediPopup] = useState(false);
      const [remediIndex, setRemediIndex] = useState(0); 
      const fileUploadRef = useRef(null);

      const [showSwitchPopup, setShowSwitchPopup] = useState(false);
      const [switchIndex, setSwitchIndex] = useState(0);
      const [targetAssignment, setTargetAssignment] = useState(null);

      const [gradesHistory, setGradesHistory] = useState([]);
      const [historyIndex, setHistoryIndex] = useState(-1);
      const [showPasteModal, setShowPasteModal] = useState(false);
      const [pasteText, setPasteText] = useState('');

      const colData = useMemo(() => getMapelSchema(activeAssignment?.mapel), [activeAssignment]);

      const teacherProgress = useMemo(() => {
        let totalExpected = 0, totalFilled = 0;
        let assignmentsProgress = [];
        user.assignments.forEach(a => {
          const key = `${a.classId}|${a.mapel}|${user.name}`;
          const sum = masterData.gradesSummary?.[key] || { uhCount: 0, uhTotal: 0, stsCount: 0, stsTotal: 0, sasCount: 0, sasTotal: 0 };
          const expected = sum.uhTotal + sum.stsTotal + sum.sasTotal;
          const filled = sum.uhCount + sum.stsCount + sum.sasCount;
          totalExpected += expected; totalFilled += filled;
          const pct = expected === 0 ? 0 : Math.round((filled / expected) * 100);
          assignmentsProgress.push({ ...a, pct });
        });
        return { globalPct: totalExpected === 0 ? 0 : Math.round((totalFilled / totalExpected) * 100), assignmentsProgress };
      }, [user.assignments, masterData.gradesSummary]);

      useEffect(() => {
        if (activeAssignment) {
          const classStudents = [...(masterData.students[activeAssignment.classId] || [])].sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
          setStudents(classStudents);
          
          // LOAD DARI APLIKASI (CACHE / LOCAL STORAGE)
          const storageKey = `astaga_grades_${activeAssignment.classId}_${activeAssignment.mapel}`;
          let savedGrades = null;
          try { const savedDataStr = localStorage.getItem(storageKey); if (savedDataStr) savedGrades = JSON.parse(savedDataStr); } catch(e) {}

          const initialGrades = {};
          classStudents.forEach(s => { 
            if (savedGrades && savedGrades[s.id]) {
              initialGrades[s.id] = savedGrades[s.id];
            } else {
              initialGrades[s.id] = colData.keys.reduce((acc, col) => ({ ...acc, [col]: col==='penguji'?user.name:'' }), {}); 
            }
          });
          
          setGrades(initialGrades); setGradesHistory([initialGrades]); setHistoryIndex(0);
        }
      }, [activeAssignment, colData.keys, user.name]);

      const isGradesEmpty = () => {
        if (!students.length) return true;
        return !Object.values(grades).some(studentGrades => Object.entries(studentGrades).some(([k, v]) => k !== 'penguji' && v !== '' && v !== null && v !== undefined));
      };

      const updateGrades = (newGrades) => {
        const updatedHistory = gradesHistory.slice(0, historyIndex + 1);
        setGradesHistory([...updatedHistory, newGrades]); setHistoryIndex(updatedHistory.length); setGrades(newGrades);
        // AUTO-SAVE DI APLIKASI
        if (activeAssignment) {
           const storageKey = `astaga_grades_${activeAssignment.classId}_${activeAssignment.mapel}`;
           localStorage.setItem(storageKey, JSON.stringify(newGrades));
        }
      };

      const handleGradeChange = (studentId, columnKey, value) => {
        if (columnKey === 'penguji') {
           updateGrades({ ...grades, [studentId]: { ...grades[studentId], [columnKey]: value } });
           return;
        }
        if (value === '' || (!isNaN(value) && Number(value) >= 0 && Number(value) <= 100)) {
          updateGrades({ ...grades, [studentId]: { ...grades[studentId], [columnKey]: value } });
        }
      };

      // FUNGSI CERDAS PASTE VIA MODAL (MENGABAIKAN PENGUJI)
      const handlePasteBlock = () => {
        if (!pasteText.trim()) return;
        const rows = pasteText.split('\n').map(row => row.split('\t'));
        let newGrades = { ...grades }; let pasteCount = 0;
        
        // Cerdas: Jika mapel khusus, mulai paste di indeks 1 (mengabaikan kolom penguji)
        const startColIdx = colData.type === 'special' ? 1 : 0; 

        rows.forEach((row, i) => {
          const student = students[i]; if (!student) return;
          let studentGrades = { ...newGrades[student.id] };
          
          row.forEach((val, j) => {
            const colKey = colData.keys[startColIdx + j]; if (!colKey) return;
            const cleanVal = val.replace(/\r/g, '').trim();
            if (cleanVal === '' || (!isNaN(cleanVal) && Number(cleanVal) >= 0 && Number(cleanVal) <= 100)) { 
              studentGrades[colKey] = cleanVal; pasteCount++; 
            }
          });
          newGrades[student.id] = studentGrades;
        });
        updateGrades(newGrades); setShowPasteModal(false); setPasteText(''); showToast(`Tertempel ${pasteCount} nilai!`, "success");
      };

      // FUNGSI CERDAS CTRL+V DI KOTAK MANA SAJA
      const handlePaste = (e, startRowIdx, startColIdx) => {
        e.preventDefault();
        const pasteData = e.clipboardData.getData('Text'); if (!pasteData) return;
        const rows = pasteData.split('\n').map(row => row.split('\t'));
        let newGrades = { ...grades }; let pasteCount = 0;
        
        rows.forEach((row, i) => {
          const student = students[startRowIdx + i]; if (!student) return;
          let studentGrades = { ...newGrades[student.id] };
          
          row.forEach((val, j) => {
            const colKey = colData.keys[startColIdx + j]; if (!colKey) return;
            const cleanVal = val.replace(/\r/g, '').trim();
            if (colKey === 'penguji') {
              if (cleanVal !== '') { studentGrades[colKey] = cleanVal; pasteCount++; }
            } else {
              if (cleanVal === '' || (!isNaN(cleanVal) && Number(cleanVal) >= 0 && Number(cleanVal) <= 100)) { 
                 studentGrades[colKey] = cleanVal; pasteCount++; 
              }
            }
          });
          newGrades[student.id] = studentGrades;
        });
        updateGrades(newGrades); showToast(`Berhasil menempelkan ${pasteCount} data!`, 'success');
      };

      const handleUndo = () => {
        if (historyIndex > 0) {
          const prevIndex = historyIndex - 1;
          setHistoryIndex(prevIndex); setGrades(gradesHistory[prevIndex]); showToast("Undo berhasil!", "success");
        }
      };

      const handleRedo = () => {
        if (historyIndex < gradesHistory.length - 1) {
          const nextIndex = historyIndex + 1;
          setHistoryIndex(nextIndex); setGrades(gradesHistory[nextIndex]); showToast("Redo berhasil!", "success");
        }
      };

      const handleSaveToSpreadsheet = async () => {
        if (isGradesEmpty()) { triggerKocakPopup(KOCAK_EMPTY_WARNINGS[Math.floor(Math.random() * KOCAK_EMPTY_WARNINGS.length)]); return; }
        setIsSaving(true);
        
        const storageKey = `astaga_grades_${activeAssignment.classId}_${activeAssignment.mapel}`;
        localStorage.setItem(storageKey, JSON.stringify(grades)); // DUA ARAH: SIMPAN DI APLIKASI SEBELUM KIRIM
        
        const dataToSubmit = { 
          action: "saveGrades", guru: user.name, kelas: activeAssignment.classId, mapel: activeAssignment.mapel, 
          isSpecial: colData.type === 'special', schema: colData.schema, keys: colData.keys,
          grades: students.map(student => ({ id: student.id, nama: student.name, ...grades[student.id] })) 
        };
        try {
          await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dataToSubmit) });
          showToast('Selesai! Data tersimpan di Aplikasi & di Awan ☁️', 'success'); 
          onUpdateSuccess(true); 
        } catch (error) { 
          showToast('Tersimpan di Aplikasi, tapi Gagal kirim ke Awan.', 'error'); 
        } finally { 
          setIsSaving(false); 
        }
      };

      const requestSwitchClass = (assignment) => {
        if (assignment.classId === activeAssignment.classId && assignment.mapel === activeAssignment.mapel) return;
        setSwitchIndex(Math.floor(Math.random() * SWITCH_CLASS_MSGS.length)); setTargetAssignment(assignment); setShowSwitchPopup(true);
      };

      const confirmSwitchClass = () => { setActiveAssignment(targetAssignment); setShowSwitchPopup(false); };

      const downloadDetailedGradesExcel = () => {
        if (isGradesEmpty()) { triggerKocakPopup(KOCAK_EMPTY_WARNINGS[Math.floor(Math.random() * KOCAK_EMPTY_WARNINGS.length)]); return; }
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"]; const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const now = new Date(); const timeString = `${days[now.getDay()]} , ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} - Jam ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')} WIB`;

        const theKeys = colData.keys;
        const rowsData = [
          [`REKAP NILAI MATA PELAJARAN ${activeAssignment.mapel.toUpperCase()}`],
          [`Kelas: ${activeAssignment.classId}`],
          [`Guru Pengajar: ${user.name}`],
          [`Waktu Diunduh: ${timeString}`],
          [], ["No", "ID Siswa", "Nama Siswa", ...theKeys] 
        ];

        students.forEach((s, idx) => {
          const studentRow = [idx + 1, s.id, s.name];
          theKeys.forEach(col => studentRow.push(grades[s.id]?.[col] || ""));
          rowsData.push(studentRow);
        });

        const ws = window.XLSX.utils.aoa_to_sheet(rowsData);
        ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 5 } }];
        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, "Rekap_Nilai");
        window.XLSX.writeFile(wb, `Laporan_Nilai_${activeAssignment.mapel}_Kls_${activeAssignment.classId}.xlsx`); showToast("Rekap Nilai diekspor!", "success");
      };

      const handleUploadExcelGrades = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result); const workbook = window.XLSX.read(data, {type: 'array'});
            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            let newGrades = { ...grades }; let imported = 0;
            const theKeys = colData.keys;
            rows.slice(1).forEach(parts => {
              const idSiswa = String(parts[1]).trim();
              if (students.find(s => s.id === idSiswa)) {
                 let studentGrades = { ...newGrades[idSiswa] };
                 theKeys.forEach((col, idx) => {
                    const valIndex = 3 + idx;
                    if (parts[valIndex] !== undefined) {
                        const cleanVal = String(parts[valIndex]).trim();
                        if (col === 'penguji') {
                           if(cleanVal !== '') studentGrades[col] = cleanVal;
                        } else if (cleanVal === '' || (!isNaN(cleanVal) && Number(cleanVal) >= 0 && Number(cleanVal) <= 100)) { 
                           studentGrades[col] = cleanVal; imported++; 
                        }
                    }
                 });
                 newGrades[idSiswa] = studentGrades;
              }
            });
            updateGrades(newGrades); showToast(`Berhasil mengunggah ${imported} nilai!`, 'success');
          } catch(err) { showToast(`Gagal membaca file Excel.`, 'error'); }
        }; reader.readAsArrayBuffer(file); e.target.value = ''; 
      };

      return (
        <div className="h-screen max-h-screen flex flex-col font-sans text-xs overflow-hidden bg-slate-50">
          
          {/* MODAL TEMPEL NILAI EXCEL */}
          {showPasteModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in"><div className="w-full max-w-sm rounded-[28px] p-5 bg-white border border-slate-200 shadow-2xl transform hover:scale-[1.02] transition-all"><div className="text-4xl mb-2 text-center animate-bounce">📋</div><h2 className="text-sm font-black mb-1.5 text-center">Tempel Data Excel</h2><p className="text-[10px] text-slate-500 font-semibold mb-3 text-center">Salin baris nilai dari Excel (Ctrl+C), lalu paste (Ctrl+V) di kotak ini.</p><textarea rows="5" className="w-full border border-slate-300 rounded-xl p-2.5 text-[10px] focus:ring-2 focus:ring-indigo-500 mb-4 bg-slate-50" placeholder="Paste (Ctrl+V) di sini..." value={pasteText} onChange={(e) => setPasteText(e.target.value)} /><div className="flex gap-2"><button onClick={() => { setShowPasteModal(false); setPasteText(''); }} className="flex-1 py-2 rounded-xl bg-slate-100 font-bold text-[10px] hover:scale-105 active:scale-95 border border-slate-200 shadow-sm">Batal</button><button onClick={handlePasteBlock} className="flex-1 py-2 rounded-xl bg-indigo-600 text-white font-bold text-[10px] shadow-md hover:scale-105 active:scale-95">Tempel Nilai</button></div></div></div>
          )}

          <header className="flex-none bg-indigo-600 text-white shadow-md h-12 flex items-center justify-between px-4 z-30">
            <div className="flex items-center space-x-2"><IconGraduationCap className="w-6 h-6 opacity-85" /><div><h1 className="font-extrabold text-sm tracking-wide leading-none">KELAS {activeAssignment?.classId}</h1><p className="text-[9px] text-indigo-200 font-bold truncate max-w-[150px]">{activeAssignment?.mapel}</p></div></div>
            <div className="flex items-center space-x-3"><div className="text-right hidden sm:block"><p className="text-[10px] font-bold leading-tight">{user.name}</p></div><button onClick={onLogout} className="p-1.5 bg-indigo-700 hover:bg-red-500 rounded-full transition-all hover:scale-105 shadow-inner" title="Keluar"><IconLogOut className="w-4 h-4" /></button></div>
          </header>

          <main className="flex-1 flex flex-col overflow-hidden w-full">
            <div className="flex-none space-y-3 p-2 sm:p-4 pb-0">
              
              <div className="bg-gradient-to-r from-indigo-500 via-purple-500 to-fuchsia-500 rounded-xl p-3 shadow-md relative overflow-hidden flex items-center justify-between hover:scale-[1.01] transition-all">
                <div className="absolute top-0 left-0 w-full h-full bg-white opacity-5 pointer-events-none transform -skew-x-12 scale-150"></div>
                <div className="relative z-10 flex items-center gap-1.5"><IconActivity className="w-4 h-4 text-white animate-pulse"/><h2 className="text-white font-black text-[11px] uppercase tracking-widest hidden sm:block">Progres Kerjamu</h2><h2 className="text-white font-black text-[11px] uppercase tracking-widest sm:hidden">Progres</h2></div>
                <div className="relative z-10 flex-1 ml-4 sm:ml-8 max-w-sm bg-white/10 p-1.5 rounded-xl border border-white/20 backdrop-blur-sm flex items-center justify-between gap-3 shadow-inner"><span className="text-white font-black text-[9px] bg-black/20 px-2 py-0.5 rounded border border-white/10">{teacherProgress.globalPct}%</span><div className="flex-1 bg-black/20 rounded-full h-1.5 overflow-hidden"><div className="h-1.5 rounded-full transition-all duration-1000 ease-out bg-gradient-to-r from-rose-400 via-amber-400 via-emerald-400 to-cyan-300 shadow-[0_0_8px_rgba(255,255,255,0.8)]" style={{ width: `${teacherProgress.globalPct}%` }}></div></div></div>
              </div>

              <div>
                <div className="flex overflow-x-auto gap-1.5 pb-1 scrollbar-hide snap-x">
                  {teacherProgress.assignmentsProgress.map((assign, idx) => {
                    const isActive = assign.classId === activeAssignment?.classId && assign.mapel === activeAssignment?.mapel;
                    return (
                      <button key={idx} onClick={() => requestSwitchClass(assign)} className={`flex-shrink-0 flex items-center gap-2 px-2.5 py-1.5 rounded-xl border transition-all hover:scale-[1.05] active:scale-95 snap-start ${isActive ? 'bg-indigo-600 border-indigo-700 text-white shadow-md' : 'bg-white border-slate-200 text-slate-600 hover:bg-indigo-50 shadow-sm'}`}>
                        <div className="text-left"><span className={`block text-[11px] font-black ${isActive?'text-white':'text-slate-800'}`}>{assign.mapel}</span><span className={`block text-[9px] font-bold uppercase tracking-wider ${isActive?'text-indigo-200':'text-slate-400'}`}>Kls {assign.classId}</span></div>
                        <div className={`text-[10px] font-black px-1.5 py-0.5 rounded-lg shadow-inner ${isActive ? 'bg-white/20 text-white border border-white/30' : assign.pct===100?'bg-emerald-100 text-emerald-700':'bg-slate-100 text-slate-500'}`}>{assign.pct}%</div>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            <div className="flex-1 flex flex-col overflow-hidden bg-white rounded-2xl shadow-sm border border-slate-200 mt-3 min-h-0 mx-2 sm:mx-4 mb-2">
              <div className="flex-none flex items-center justify-between bg-slate-50 p-2 border-b border-slate-200">
                 <div className="flex items-center gap-1.5 overflow-x-auto scrollbar-hide py-1">
                   <button onClick={() => setShowPasteModal(true)} className="flex items-center gap-1 bg-white border border-slate-300 text-indigo-700 px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-indigo-50 active:scale-95 shadow-sm"><IconFileText className="w-3 h-3"/> Paste Excel</button>
                   <button onClick={handleUndo} disabled={historyIndex <= 0} className="flex items-center gap-1 bg-white text-slate-700 border border-slate-300 px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-slate-50 disabled:opacity-40 shadow-sm">↩️ Undo</button>
                   <button onClick={handleRedo} disabled={historyIndex >= gradesHistory.length - 1} className="flex items-center gap-1 bg-white text-slate-700 border border-slate-300 px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-slate-50 disabled:opacity-40 shadow-sm">↪️ Redo</button>
                 </div>
                 
                 <div className="flex items-center gap-1.5">
                   <button onClick={() => { const r = {}; students.forEach(s => r[s.id] = colData.keys.reduce((acc, col) => ({ ...acc, [col]: col==='penguji'?user.name:'' }), {})); updateGrades(r); showToast("Dikosongkan!", "success"); }} className="flex items-center gap-1 bg-rose-50 border border-rose-200 text-rose-600 px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-rose-100 shadow-sm">🗑️ Kosong</button>
                   <button onClick={handleSaveToSpreadsheet} disabled={isSaving || students.length === 0} className="flex items-center justify-center space-x-1 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white px-4 py-1.5 rounded-lg transition-all shadow-md disabled:opacity-50 font-black text-[10px]">
                    {isSaving ? <span className="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></span> : <IconSend className="w-3 h-3" />}
                    <span>Kirim & Save</span>
                   </button>
                 </div>
              </div>

              {/* TABLE AREA SCROLLABLE (STICKY PAKU BUMI) */}
              <div className="flex-1 overflow-auto relative bg-slate-50/50">
                <div className="min-w-max bg-white">
                  <table className="w-full text-xs text-left text-slate-600 whitespace-nowrap border-separate" style={{ borderSpacing: 0 }}>
                    <thead className="text-[10px] text-slate-700 font-extrabold uppercase tracking-wider">
                      {colData.type === 'normal' ? (
                        <tr>
                          <th className="px-2 py-3 text-center sticky-no sticky-header-no border-b border-r border-slate-300 shadow-sm">No</th>
                          <th className="px-3 py-3 sticky-nama sticky-header-nama border-b border-r border-slate-300 shadow-sm">Nama Siswa</th>
                          {colData.headers.map(h => <th key={h} className="px-2 py-3 text-center min-w-[50px] border-b border-r border-slate-300 sticky-top-row bg-slate-200">{h}</th>)}
                        </tr>
                      ) : (
                        <>
                          <tr>
                            <th rowSpan="3" className="px-2 py-2 text-center sticky-no sticky-header-no border-b border-r border-slate-300 align-middle shadow-sm">No</th>
                            <th rowSpan="3" className="px-3 py-2 sticky-nama sticky-header-nama border-b border-r border-slate-300 align-middle shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">Nama Siswa</th>
                            <th rowSpan="3" className="px-2 py-2 min-w-[130px] border-b border-r border-slate-300 text-center align-middle sticky-top-row bg-slate-200 text-indigo-700">Penguji</th>
                            {colData.schema.categories.map(cat => <th key={cat.name} colSpan={cat.items.length * 3} className="px-2 py-2 text-center border-b border-r border-slate-300 text-slate-900 font-black text-[11px] sticky-top-row" style={{backgroundColor: cat.color}}>{cat.name}</th>)}
                          </tr>
                          <tr>
                            {colData.schema.categories.map((cat) => cat.items.map((item, iIdx) => (
                              <th key={item} colSpan="3" className={`px-2 py-2 text-center border-b border-r border-slate-300 text-[10px] font-black text-slate-900 sticky-top-2 ${ITEM_BG_COLORS[iIdx % ITEM_BG_COLORS.length]}`}>{item}</th>
                            )))}
                          </tr>
                          <tr>
                            {colData.schema.categories.map((cat) => cat.items.map((item, iIdx) => (
                              <React.Fragment key={`${cat.name}-${item}-sub`}>
                                <th className={`px-1 py-1.5 text-center border-b border-r border-slate-300 text-[9px] font-bold text-slate-800 sticky-top-3 ${ITEM_BG_COLORS[iIdx % ITEM_BG_COLORS.length]}`}>UH</th>
                                <th className={`px-1 py-1.5 text-center border-b border-r border-slate-300 text-[9px] font-bold text-slate-800 sticky-top-3 ${ITEM_BG_COLORS[iIdx % ITEM_BG_COLORS.length]}`}>STS</th>
                                <th className={`px-1 py-1.5 text-center border-b border-r border-slate-300 text-[9px] font-bold text-slate-800 sticky-top-3 ${ITEM_BG_COLORS[iIdx % ITEM_BG_COLORS.length]}`}>SAT</th>
                              </React.Fragment>
                            )))}
                          </tr>
                        </>
                      )}
                    </thead>
                    <tbody>
                      {students.length === 0 ? (
                        <tr><td colSpan={colData.keys.length + 2} className="text-center py-8 font-bold text-slate-400 text-sm bg-white border-b border-slate-100">Siswa kosong. Hubungi Admin!</td></tr>
                      ) : students.map((student, rowIdx) => (
                        <tr key={student.id} className="hover:bg-indigo-50/80 group bg-white">
                          <td className="px-2 py-2 font-black text-slate-500 text-center sticky-no group-hover:bg-indigo-50 border-b border-r border-slate-200">{rowIdx + 1}</td>
                          <td className="px-3 py-2 font-bold text-slate-800 sticky-nama group-hover:bg-indigo-50 truncate max-w-[180px] border-b border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">{student.name}</td>
                          {colData.keys.map((colKey, colIdx) => {
                            const val = grades[student.id]?.[colKey];
                            
                            if (colKey === 'penguji') {
                              return <td key={colKey} className="px-1.5 py-1 border-b border-r border-slate-200 bg-white group-hover:bg-indigo-50"><input type="text" value={val||''} onChange={e=>handleGradeChange(student.id, colKey, e.target.value)} onPaste={(e) => handlePaste(e, rowIdx, colIdx)} className="w-full min-w-[110px] px-2 py-1.5 rounded-lg border border-slate-300 text-[10px] font-bold focus:ring-2 focus:ring-indigo-500 transition-all bg-white text-center shadow-inner"/></td>;
                            }
                            
                            const isRemedi = val !== '' && Number(val) < 70;
                            const isSuccess = val !== '' && Number(val) >= 70;

                            const parts = colKey.split('_');
                            const itemIdx = parts.length > 1 ? parseInt(parts[1]) : 0;
                            const bgClass = colData.type === 'special' ? ITEM_BG_COLORS[itemIdx % ITEM_BG_COLORS.length] : 'bg-white';

                            return (
                              <td key={colKey} className={`px-1 py-1.5 border-b border-r border-slate-200 ${bgClass}`}>
                                <input type="number" min="0" max="100" placeholder="-" value={val || ''} 
                                  onChange={(e) => handleGradeChange(student.id, colKey, e.target.value)} onPaste={(e) => handlePaste(e, rowIdx, colIdx)}
                                  className={`w-12 mx-auto block text-center rounded border border-slate-300 h-8 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-black text-[11px] shadow-sm bg-white
                                    ${isRemedi ? 'border-rose-500 text-rose-900 shadow-[inset_0_1px_3px_rgba(225,29,72,0.3)]' 
                                    : isSuccess ? 'border-emerald-500 text-emerald-900 shadow-[inset_0_1px_3px_rgba(16,185,129,0.3)]' 
                                    : 'text-slate-900 shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)]'}
                                  `} 
                                />
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
