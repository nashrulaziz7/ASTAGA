    // --- POPUP HAPUS DATA ADMIN ---
    function FunnyDeletePopup({ show, targetName, type, onConfirm, onCancel }) {
      if (!show) return null;
      let emoji = '😭💔';
      let title = 'YAKIN MAU HAPUS?';
      let desc = `Beneran mau menghapus ${targetName}? Nanti kalau kangen gimana?`;
      if (type === 'teacher') desc = `Yakin mau usir Guru ${targetName}? Ntar siapa yang ngisi nilainya bos? 🥺`;
      if (type === 'student') desc = `Mau mengeluarkan ${targetName}? Jangan-jangan dia anak baek-baek... 😱`;
      if (type === 'class') desc = `Hapus Kelas ${targetName} berserta seluruh siswanya? Kosong melompong dong nanti... 🌪️`;
      if (type === 'mapel') desc = `Hapus Mata Pelajaran ${targetName} dari sekolah? Nanti anak-anak belajar apa dong... 📚`;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">
          <div className="relative w-full max-w-xs rounded-3xl p-5 text-center shadow-2xl bg-rose-50 border border-rose-200 transform transition-all animate-[scale_0.2s_ease-out] hover:scale-[1.03] active:scale-95 transition-all">
            <div className="text-4xl mb-2 animate-bounce">{emoji}</div>
            <h2 className="text-base font-black mb-1 tracking-tight text-rose-950">{title}</h2>
            <p className="text-[11px] mb-4 font-semibold text-rose-800 opacity-90 leading-relaxed">{desc}</p>
            <div className="flex gap-2">

              <button onClick={onConfirm} className="flex-1 py-2 rounded-xl bg-rose-600 hover:bg-rose-700 text-white font-bold text-[11px] shadow-sm transition-all hover:scale-105 active:scale-95">Iya, Hapus! 💥</button>
            </div>
          </div>
        </div>
      );
    }

    // --- POPUP NOTIFIKASI UMUM ---
    function FunnyPopup({ show, type, msgIndex, onClose }) {
      if (!show) return null;
      const msg = type === 'success' ? SUCCESS_LOGIN_MSGS[msgIndex % SUCCESS_LOGIN_MSGS.length] : ERROR_LOGIN_MSGS[msgIndex % ERROR_LOGIN_MSGS.length];
      const bg = type === 'success' ? 'bg-emerald-50 border-emerald-300' : 'bg-rose-50 border-rose-300';
      const text = type === 'success' ? 'text-emerald-900' : 'text-rose-900';
      const btn = type === 'success' ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-rose-600 hover:bg-rose-700';

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">
          <div className={`relative w-full max-w-xs rounded-3xl p-5 text-center shadow-2xl border transform transition-all duration-300 hover:scale-[1.03] active:scale-95 ${bg}`}>
            <div className="text-4xl mb-2 animate-pulse">{msg.emoji}</div>
            <h2 className={`text-base font-black mb-1 tracking-tight ${text}`}>{msg.title}</h2>
            <p className={`text-[11px] mb-4 font-semibold ${text} opacity-90 leading-relaxed`}>{msg.desc}</p>
            <button onClick={onClose} className={`w-full py-2 rounded-xl text-white font-bold text-[11px] shadow-sm transition-all hover:scale-105 active:scale-95 ${btn}`}>Oke Siap Bos!</button>
          </div>
        </div>

              <button onClick={onConfirm} className="flex-1 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-[11px] shadow-sm transition-all hover:scale-105 active:scale-95">Aman, Pindah! 🚀</button>
            </div>
          </div>
        </div>
      );
    }

    // --- INDUK APLIKASI (SUDAH DIATUR DENGAN BENAR) ---
    function App() {
      const [masterData, setMasterData] = useState(DEFAULT_MASTER_DATA);
      const [currentUser, setCurrentUser] = useState(null);
      const [activeAssignment, setActiveAssignment] = useState(null);
      const [popup, setPopup] = useState({ show: false, type: 'success', index: 0 });
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [isLoading, setIsLoading] = useState(true);

      const fetchCloudMasterData = async () => {
        setIsLoading(true);
        try {
          const response = await fetch(SCRIPT_URL);
          const data = await response.json();
          if (data && data.teachers && data.teachers.length > 0) {
            setMasterData(data);
            localStorage.setItem('portalNilaiMasterData', JSON.stringify(data));
          } else {
            const saved = localStorage.getItem('portalNilaiMasterData');
            if (saved) setMasterData(JSON.parse(saved));
          }
        } catch (err) {
          console.warn("Gagal mendapatkan data cloud, menggunakan data lokal.", err);
          const saved = localStorage.getItem('portalNilaiMasterData');
          if (saved) setMasterData(JSON.parse(saved));
        } finally {
          setIsLoading(false);
        }
      };

        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);

                          <option value="">-- Pilih Kelas --</option>

                        </select>
                      </div>

                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Password / PIN</label>

    // --- PANEL ADMIN (DIURUTKAN SESUAI KEBUTUHAN) ---
    function AdminDashboard({ masterData, setMasterData, onLogout, showToast, toast, onRefreshData }) {

      const [isSyncing, setIsSyncing] = useState(false);
      const [expandedGuru, setExpandedGuru] = useState({});
      const [showResetConfirm, setShowResetConfirm] = useState(false);

      const totalGuru = masterData.teachers.length;
      const totalSiswa = Object.values(masterData.students).flat().length - (masterData.students["__MAPELS__"] ? masterData.students["__MAPELS__"].length : 0);
      const totalKelas = Object.keys(masterData.students).filter(k => k !== "__MAPELS__").length;
      
      // MENGHITUNG KEMAJUAN REAL-TIME DARI GOOGLE SHEETS
      const trackingData = useMemo(() => {
        let totalCellsExpected = 0;
        let totalCellsFilled = 0;
        
        const list = masterData.teachers.flatMap(t => 
          t.assignments.map(a => {
            const key = `${a.classId}|${a.mapel}|${t.name}`;
            const sum = masterData.gradesSummary?.[key] || { uhCount: 0, uhTotal: 0, stsCount: 0, stsTotal: 0, sasCount: 0, sasTotal: 0 };
            
            const totalAssignedCells = sum.uhTotal + sum.stsTotal + sum.sasTotal;
            const totalFilledCells = sum.uhCount + sum.stsCount + sum.sasCount;
            
            totalCellsExpected += totalAssignedCells;
            totalCellsFilled += totalFilledCells;

            const progress = totalAssignedCells === 0 ? 0 : Math.round((totalFilledCells / totalAssignedCells) * 100);
            
            const uhPct = sum.uhTotal === 0 ? 0 : Math.round((sum.uhCount / sum.uhTotal) * 100);
            const stsPct = sum.stsTotal === 0 ? 0 : Math.round((sum.stsCount / sum.stsTotal) * 100);
            const sasPct = sum.sasTotal === 0 ? 0 : Math.round((sum.sasCount / sum.sasTotal) * 100);

            let statusStr = "Belum Mulai";
            let badgeBg = "bg-rose-50 text-rose-700 border-rose-200 shadow-sm";
            if (progress === 100) {
              statusStr = "Selesai";
              badgeBg = "bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm";
            } else if (progress > 0) {
              statusStr = "Proses";
              badgeBg = "bg-amber-50 text-amber-700 border-amber-200 shadow-sm";
            }

            return { 
              guru: t.name, 
              kelas: a.classId, 
              mapel: a.mapel, 
              progress, 
              statusStr, 
              badgeBg,
              uhPct,
              stsPct,
              sasPct
            };
          })
        );

        list.sort((a, b) => a.progress - b.progress);
        const globalProgress = totalCellsExpected === 0 ? 0 : Math.round((totalFilled / totalCellsExpected) * 100);
        return { list, globalProgress };
      }, [masterData]);

      // --- KELOMPOK PROGRES GURU (DIURUTKAN ABJAD GURU) ---
      const teachersProgress = useMemo(() => {
        const map = {};
        masterData.teachers.forEach(t => map[t.name] = { name: t.name, total: 0, completed: 0, assignments: [] });
        trackingData.list.forEach(item => {
          if (!map[item.guru]) map[item.guru] = { name: item.guru, total: 0, completed: 0, assignments: [] };
          map[item.guru].assignments.push(item);
          map[item.guru].total++;
          if (item.progress === 100) map[item.guru].completed++;
        });

        return Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
      }, [masterData, trackingData]);

      // =========================================================================
      // --- PEMULIHAN FUNGSI ADMIN YANG HILANG (DIJAWAB TUNTAS OLEH MAESTRO) ---
      // =========================================================================
      const toggleGuru = (name) => {
        setExpandedGuru(prev => ({ ...prev, [name]: !prev[name] }));
      };

      const downloadTemplateGuru = () => {
        const header = ["No", "Nama Guru", "Password", "Mapel 1", "Kelas Mapel 1 (Pisahkan dgn koma)", "Mapel 2", "Kelas Mapel 2", "Mapel 3", "Kelas Mapel 3", "Mapel 4", "Kelas Mapel 4", "Mapel 5", "Kelas Mapel 5"];
        const ws = window.XLSX.utils.aoa_to_sheet([header, [1, "Pak Budi Contoh", "123", "Matematika", "10A, 10B", "", "", "", "", "", "", "", ""]]);
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, "MasterGuru");
        window.XLSX.writeFile(wb, "Template_Master_Guru.xlsx");
      };

      const downloadTemplateSiswa = () => {
        const header = ["Kelas", "No Presensi", "Nama Siswa"];
        const ws = window.XLSX.utils.aoa_to_sheet([header, ["10A", "1", "Agus Contoh"]]);
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, "MasterSiswa");
        window.XLSX.writeFile(wb, "Template_Master_Siswa.xlsx");
      };

      const syncToCloud = async (action, payloadKey, payloadData, successMsg) => {
        setIsSyncing(true);
        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, [payloadKey]: payloadData })
          });
          showToast(successMsg, "success");
        } catch (err) {
          showToast("Koneksi gagal, tersimpan lokal sementara.", "error");
        } finally {
          setIsSyncing(false);
        }
      };

      const handleResetGrades = async () => {
        setShowResetConfirm(false);
        setIsSyncing(true);
        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: "resetGrades" })
          });
          showToast("Berhasil! Semua rekap nilai di-reset.", "success");
          onRefreshData();
        } catch (err) {
          showToast("Gagal reset. Cek koneksi!", "error");
        } finally {
          setIsSyncing(false);
        }
      };

      const handleUploadGuru = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result);
            const workbook = window.XLSX.read(data, {type: 'array'});
            if (!workbook.SheetNames || workbook.SheetNames.length === 0) {
              showToast("File Excel tidak berisi lembar kerja apapun!", "error");
              return;
            }
            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
            const teachersMap = {};
            rows.slice(1).forEach(parts => {
              if(parts.length > 1 && parts[1]) {
                const nama = toProperCase(String(parts[1]).trim());
                const pass = parts[2] !== "" ? String(parts[2]).trim() : "123";
                if(nama) {
                  if(!teachersMap[nama]) teachersMap[nama] = { name: nama, password: pass, assignments: [] };
                  for(let i = 0; i < 5; i++) {
                    const mIdx = 3 + (i * 2);
                    const kIdx = 4 + (i * 2);
                    if (parts[mIdx] !== undefined && parts[kIdx] !== undefined) {
                       const mName = toProperCase(String(parts[mIdx]).trim());
                       const kArr = String(parts[kIdx]).split(',').map(k => k.trim().toUpperCase()).filter(k => k);
                       if (mName && kArr.length > 0) {
                         kArr.forEach(k => {
                           if(!teachersMap[nama].assignments.find(a => a.classId === k && a.mapel === mName)) {
                             teachersMap[nama].assignments.push({ classId: k, mapel: mName });
                           }
                         });
                       }
                    }
                  }
                }
              }
            });
            const newTeachers = Object.values(teachersMap).filter(t => t.assignments.length > 0);
            if(newTeachers.length > 0) {
              setMasterData(p => ({ ...p, teachers: newTeachers }));
              syncToCloud("saveMasterGuru", "teachers", newTeachers, "Data Guru tersimpan ke Cloud!");
            } else {
              showToast(`Format tabel dalam Excel tidak pas atau kosong!`, 'error');
            }
          } catch(err) {
            console.error("Guru Upload Error:", err);
            showToast(`Gagal membaca file Excel Guru.`, 'error');
          }
        };
        reader.readAsArrayBuffer(file);
        e.target.value = '';
      };

      const handleUploadSiswa = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result);
            const workbook = window.XLSX.read(data, {type: 'array'});
            if (!workbook.SheetNames || workbook.SheetNames.length === 0) {
              showToast("File Excel tidak berisi lembar kerja apapun!", "error");
              return;
            }
            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: ""});
            const studentsMap = { ...masterData.students };
            for (let k in studentsMap) {
              if (k !== "__MAPELS__") delete studentsMap[k];
            }
            rows.slice(1).forEach((parts, idx) => {
              if(parts.length >= 3 && parts[0]) {
                const kelas = String(parts[0]).trim().toUpperCase();
                const idSiswa = parts[1] !== "" ? String(parts[1]).trim() : String(idx + 1);
                const namaSiswa = toProperCase(String(parts[2]).trim());
                if(kelas && namaSiswa) {
                  if(!studentsMap[kelas]) studentsMap[kelas] = [];
                  studentsMap[kelas].push({ id: idSiswa, name: namaSiswa });
                }
              }
            });
            if(Object.keys(studentsMap).length > 0) {
              setMasterData(p => ({ ...p, students: studentsMap }));
              syncToCloud("saveMasterSiswa", "students", studentsMap, "Data Siswa tersimpan ke Cloud!");
            } else {
              showToast(`Format data siswa dalam Excel tidak pas atau kosong!`, 'error');
            }
          } catch(err) {
            console.error("Siswa Upload Error:", err);
            showToast(`Gagal membaca file Excel Siswa.`, 'error');
          }
        };
        reader.readAsArrayBuffer(file);
        e.target.value = '';
      };

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col font-sans relative text-xs">
          {/* POPUP KONFIRMASI RESET */}
          {showResetConfirm && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity animate-in fade-in">
              <div className="relative w-full max-w-sm rounded-3xl p-6 text-center shadow-2xl transform transition-all animate-[bounce_0.5s_ease-in-out] bg-rose-50 border border-rose-200">
                <div className="text-5xl mb-3 animate-pulse">😱💔🔥</div>
                <h2 className="text-xl font-extrabold mb-1.5 tracking-tight text-rose-950">YAKIN MAU RESET?</h2>
                <p className="text-xs mb-4 font-semibold text-rose-700 opacity-95 leading-relaxed">
                  Semua rekap nilai dari semua guru yang sudah masuk ke Google Sheets akan didelete permanen! <br/><br/>

                <div className="flex gap-2">
                  <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-2.5 rounded-xl bg-white border border-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-xs transition-colors hover:scale-105 active:scale-95">Gak Jadi Deh 🥺</button>

                </div>
              </div>

            <div className="max-w-7xl mx-auto px-4 h-12 flex items-center justify-between">

                <button onClick={() => setActiveTab('overview')} className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider transition-all duration-300 hover:scale-[1.03] hover:-translate-y-0.5 active:scale-95 ${activeTab === 'overview' ? 'bg-indigo-500 text-white shadow' : 'text-slate-400 hover:text-white'}`}>Progres</button>

                <button onClick={() => setActiveTab('settings')} className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider transition-all duration-300 hover:scale-[1.03] hover:-translate-y-0.5 active:scale-95 ${activeTab === 'settings' ? 'bg-indigo-500 text-white shadow' : 'text-slate-400 hover:text-white'}`}>Pengaturan</button>
              </div>
              <button onClick={onLogout} className="text-slate-300 hover:text-rose-400 px-2 py-1 rounded-lg font-bold text-2xs flex items-center space-x-1 transition-all duration-300 hover:scale-[1.03] hover:-translate-y-0.5 hover:bg-slate-800" title="Keluar"><IconLogOut className="w-4 h-4" /></button>
            </div>
          </header>

          <main className="flex-1 max-w-5xl mx-auto p-3 sm:p-4 w-full animate-in fade-in duration-500">
            {isSyncing && (
              <div className="bg-indigo-50 text-indigo-700 px-3 py-2 rounded-xl border border-indigo-200 flex items-center justify-center space-x-2 text-[10px] font-bold animate-pulse mb-3 shadow-sm uppercase tracking-wider">
                <div className="w-3 h-3 border-2 border-indigo-700 border-t-transparent rounded-full animate-spin"></div><span>Menyelaraskan data ke Google Sheets...</span>
              </div>
            )}

            {activeTab === 'overview' && (
              <div className="space-y-4">

    // --- KOMPONEN PENGATURAN GURU, SISWA DAN MAPEL ---
    function AdminSettingsTab({ masterData, setMasterData, syncGuru, syncSiswa, showToast }) {
      const [view, setView] = useState('guru'); // guru | mapel | siswa
      const [newTeacherName, setNewTeacherName] = useState('');
      const [newTeacherPass, setNewTeacherPass] = useState('123');
      
      const [deletePrompt, setDeletePrompt] = useState({ show: false, type: '', target: null, name: '', extraTarget: null });
      
      const [expandedTeacher, setExpandedTeacher] = useState(null);
      const [selClass, setSelClass] = useState('');
      const [newClassName, setNewClassName] = useState('');

      // State Pengeditan Profil Guru (Nama & Password)
      const [editingTeacherName, setEditingTeacherName] = useState('');
      const [editingTeacherPass, setEditingTeacherPass] = useState('');

      // State Pengeditan Profil Siswa (No Presensi / ID & Nama Lengkap)
      const [editingStudentId, setEditingStudentId] = useState(null);
      const [editStudentNumber, setEditStudentNumber] = useState('');
      const [editStudentName, setEditStudentName] = useState('');

      // State Mata Pelajaran Baru
      const [newMapelName, setNewMapelName] = useState('');

      // State Pengeditan Mata Pelajaran
      const [editingMapel, setEditingMapel] = useState(null);
      const [editMapelName, setEditMapelName] = useState('');

      // --- SINKRONISASI DAFTAR MAPEL AMAN DARI SPREADSHEET (SINKRON CLOUD) ---
      const mapelsList = useMemo(() => {
        const storedMapels = masterData.students["__MAPELS__"] || DEFAULT_MAPELS;
        return [...storedMapels].sort((a, b) => a.localeCompare(b));
      }, [masterData.students]);

      // --- URUTKAN GURU OTOMATIS BERDASARKAN ABJAD (A-Z) ---
      const sortedTeachers = useMemo(() => {
        return [...masterData.teachers].sort((a, b) => a.name.localeCompare(b.name));
      }, [masterData.teachers]);

      // --- URUTKAN SISWA BERDASARKAN KELAS DAN NO PRESENSI NUMERIK ---
      const sortedStudents = useMemo(() => {
        if (!selClass || !masterData.students[selClass]) return [];
        return [...masterData.students[selClass]].sort((a, b) => {
          return a.id.localeCompare(b.id, undefined, {numeric: true, sensitivity: 'base'});
        });
      }, [masterData.students, selClass]);

      const handleTeacherClick = (t) => {
        if (expandedTeacher === t.name) {
          setExpandedTeacher(null);
        } else {
          setExpandedTeacher(t.name);
          setEditingTeacherName(t.name);
          setEditingTeacherPass(t.password);
        }
      };

      const handleSaveTeacherProfile = (oldName) => {
        const newName = toProperCase(editingTeacherName.trim());
        const newPass = editingTeacherPass.trim();
        
        if (!newName || !newPass) {
          showToast("Nama dan password tidak boleh kosong!", "error");
          return;
        }

        if (newName !== oldName && masterData.teachers.find(t => t.name === newName)) {
          showToast("Nama guru tersebut sudah terdaftar!", "error");
          return;
        }

        const newData = masterData.teachers.map(t => {
          if (t.name === oldName) {
            return { ...t, name: newName, password: newPass };
          }
          return t;
        });

        setMasterData(p => ({...p, teachers: newData}));
        syncGuru("saveMasterGuru", "teachers", newData, `Profil Guru ${newName} sukses diperbarui.`);
        setExpandedTeacher(null);
      };

      const handleStartEditStudent = (s) => {
        setEditingStudentId(s.id);
        setEditStudentNumber(s.id);
        setEditStudentName(s.name);
      };

      const handleSaveStudentProfile = (oldId) => {
        const newId = editStudentNumber.trim();
        const newName = toProperCase(editStudentName.trim());

        if (!newId || !newName) {
          showToast("ID siswa dan Nama Lengkap tidak boleh kosong!", "error");
          return;
        }

        if (newId !== oldId && masterData.students[selClass].find(s => s.id === newId)) {
          showToast("Nomor presensi tersebut sudah digunakan!", "error");
          return;
        }

        const classList = masterData.students[selClass].map(s => {
          if (s.id === oldId) {
            return { id: newId, name: newName };
          }
          return s;
        });

        const newStudents = { ...masterData.students, [selClass]: classList };
        setMasterData(p => ({...p, students: newStudents}));
        syncSiswa("saveMasterSiswa", "students", newStudents, `Siswa ${newName} sukses diperbarui.`);
        setEditingStudentId(null);
      };

      // --- MANAJEMEN MAPEL (TAMBAH, EDIT, & HAPUS) ---
      const handleAddMapel = (e) => {
        e.preventDefault();
        const rawMapel = newMapelName.trim();
        const mapel = rawMapel.length > 5 ? toProperCase(rawMapel) : rawMapel.toUpperCase();
        if(!mapel) return;

        if (mapelsList.includes(mapel)) {
          showToast("Mata Pelajaran sudah terdaftar!", "error");
          return;
        }

        const updatedMapels = [...mapelsList, mapel];
        const newStudents = { ...masterData.students, "__MAPELS__": updatedMapels };
        setMasterData(p => ({...p, students: newStudents}));
        syncSiswa("saveMasterSiswa", "students", newStudents, `Mapel ${mapel} berhasil ditambahkan.`);
        setNewMapelName('');
      };

      // --- FUNGSI SAVE PENGEDITAN NAMA MAPEL (BARU) ---
      const handleSaveMapel = (oldName) => {
        const newName = editMapelName.trim();
        if (!newName) {
          showToast("Nama mata pelajaran tidak boleh kosong!", "error");
          return;
        }
        if (newName !== oldName && mapelsList.includes(newName)) {
          showToast("Mata pelajaran dengan nama tersebut sudah ada!", "error");
          return;
        }

        // 1. Perbarui array __MAPELS__
        const updatedMapels = mapelsList.map(m => m === oldName ? newName : m);

        // 2. Perbarui semua jadwal penugasan guru yang menggunakan mapel lama secara otomatis
        const updatedTeachers = masterData.teachers.map(t => {
          const updatedAssigns = t.assignments.map(a => {
            if (a.mapel === oldName) {
              return { ...a, mapel: newName };
            }
            return a;
          });
          return { ...t, assignments: updatedAssigns };
        });

        const newStudents = { ...masterData.students, "__MAPELS__": updatedMapels };
        setMasterData(p => ({
          ...p,
          students: newStudents,
          teachers: updatedTeachers
        }));

        // Sinkronisasi data ke cloud Spreadsheet
        syncSiswa("saveMasterSiswa", "students", newStudents, `Mapel ${oldName} berhasil diubah menjadi ${newName}.`);
        syncGuru("saveMasterGuru", "teachers", updatedTeachers, "Jadwal guru disesuaikan otomatis.");
        setEditingMapel(null);
      };

      const confirmDelete = () => {
        if(deletePrompt.type === 'teacher') {
          const newData = masterData.teachers.filter(t => t.name !== deletePrompt.target);
          setMasterData(p => ({...p, teachers: newData}));
          syncGuru("saveMasterGuru", "teachers", newData, `Guru ${deletePrompt.target} dihapus.`);
          setExpandedTeacher(null);
        } else if(deletePrompt.type === 'class') {
          const newStudents = { ...masterData.students };
          delete newStudents[deletePrompt.target];
          setMasterData(p => ({...p, students: newStudents}));

                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- DASHBOARD GURU (SUPER MEWAH DENGAN QUICK SWITCH) ---
    function Dashboard({ user, activeAssignment, masterData, onLogout, showToast, toast, onUpdateSuccess, setActiveAssignment }) {
      const [students, setStudents] = useState([]);
      const [grades, setGrades] = useState({});
      const [isSaving, setIsSaving] = useState(false);
      const [showRemediPopup, setShowRemediPopup] = useState(false);
      const [remediIndex, setRemediIndex] = useState(0); 
      const fileUploadRef = useRef(null);

      const [showSwitchPopup, setShowSwitchPopup] = useState(false);
      const [switchIndex, setSwitchIndex] = useState(0);
      const [targetAssignment, setTargetAssignment] = useState(null);

      const teacherProgress = useMemo(() => {
        let totalExpected = 0, totalFilled = 0;
        let assignmentsProgress = [];
        user.assignments.forEach(a => {
          const key = `${a.classId}|${a.mapel}|${user.name}`;
          const sum = masterData.gradesSummary?.[key] || { uhCount: 0, uhTotal: 0, stsCount: 0, stsTotal: 0, sasCount: 0, sasTotal: 0 };
          const expected = sum.uhTotal + sum.stsTotal + sum.sasTotal;
          const filled = sum.uhCount + sum.stsCount + sum.sasCount;
          totalExpected += expected; totalFilled += filled;
          const pct = expected === 0 ? 0 : Math.round((filled / expected) * 100);
          assignmentsProgress.push({ ...a, pct });
        });
        const globalPct = totalExpected === 0 ? 0 : Math.round((totalFilled / totalExpected) * 100);
        return { globalPct, assignmentsProgress };
      }, [user.assignments, masterData.gradesSummary]);

      // --- SINKRON SISWA OTOMATIS URUT NUMERIK ---
      useEffect(() => {
        if (activeAssignment) {
          const classStudents = masterData.students[activeAssignment.classId] || [];
          
          // Mengurutkan siswa berdasarkan nomor presensi (ID) secara numerik
          const sortedStudentsOfClass = [...classStudents].sort((a, b) => {
            return a.id.localeCompare(b.id, undefined, {numeric: true, sensitivity: 'base'});
          });

          setStudents(sortedStudentsOfClass);
          const initialGrades = {};
          sortedStudentsOfClass.forEach(s => { 
            initialGrades[s.id] = GRADE_COLUMNS.reduce((acc, col) => ({ ...acc, [col]: '' }), {}); 
          });
          setGrades(initialGrades);
        }
      }, [activeAssignment, masterData]);

      const handleGradeChange = (studentId, columnKey, value) => {
        if (value === '' || (Number(value) >= 0 && Number(value) <= 100)) {
          setGrades(prev => ({ ...prev, [studentId]: { ...prev[studentId], [columnKey]: value } }));
        }
      };

      const handlePaste = (e, startRowIdx, startColIdx) => {
        e.preventDefault();
        const pasteData = e.clipboardData.getData('Text'); if (!pasteData) return;
        const rows = pasteData.split('\n').map(row => row.split('\t'));
        let newGrades = { ...grades }; let pasteCount = 0;
        rows.forEach((row, i) => {
          const student = students[startRowIdx + i]; if (!student) return;
          let studentGrades = { ...newGrades[student.id] };
          row.forEach((val, j) => {
            const colKey = GRADE_COLUMNS[startColIdx + j]; if (!colKey) return;
            const cleanVal = val.replace(/\r/g, '').trim();
            if (cleanVal === '' || (Number(cleanVal) >= 0 && Number(cleanVal) <= 100)) { studentGrades[colKey] = cleanVal; pasteCount++; }
          });
          newGrades[student.id] = studentGrades;
        });
        setGrades(newGrades); showToast(`Berhasil menempelkan ${pasteCount} nilai!`, 'success');
      };

      const downloadGradeTemplate = () => {
        const header = ["No", "ID Siswa", "Nama Siswa", ...GRADE_COLUMNS];
        const rows = students.map((s, i) => {
           const rowData = [i + 1, s.id, s.name];
           GRADE_COLUMNS.forEach(col => rowData.push(grades[s.id]?.[col] || "")); return rowData;
        });
        const ws = window.XLSX.utils.aoa_to_sheet([header, ...rows]);
        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, "InputNilai");
        window.XLSX.writeFile(wb, `Input_Nilai_${activeAssignment.mapel}_Kls_${activeAssignment.classId}.xlsx`);
      };

      const handleUploadExcelGrades = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result); const workbook = window.XLSX.read(data, {type: 'array'});
            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            let newGrades = { ...grades }; let imported = 0;
            rows.slice(1).forEach(parts => {
              const idSiswa = String(parts[1]).trim();
              if (students.find(s => s.id === idSiswa)) {
                 let studentGrades = { ...newGrades[idSiswa] };
                 GRADE_COLUMNS.forEach((col, idx) => {
                    const valIndex = 3 + idx;
                    if (parts[valIndex] !== undefined) {
                        const cleanVal = String(parts[valIndex]).trim();
                        if (cleanVal === '' || (Number(cleanVal) >= 0 && Number(cleanVal) <= 100)) { studentGrades[col] = cleanVal; imported++; }
                    }
                 });
                 newGrades[idSiswa] = studentGrades;
              }
            });
            setGrades(newGrades); showToast(`Berhasil mengunggah ${imported} nilai!`, 'success');
          } catch(err) { showToast(`Gagal membaca file Excel.`, 'error'); }
        }; reader.readAsArrayBuffer(file); e.target.value = ''; 
      };

      const handleSaveToSpreadsheet = async () => {
        // --- VALIDASI PENILAIAN DI BAWAH KKM 70 ---
        let hasRemedi = false;
        for (const student of students) {
          for (const col of GRADE_COLUMNS) {
            const val = grades[student.id]?.[col];
            if (val !== '' && Number(val) < 70) { hasRemedi = true; break; }
          }
          if (hasRemedi) break;
        }

        if (hasRemedi) {
          setRemediIndex(Math.floor(Math.random() * ROMANTIC_REMEDI_MSGS.length));
          setShowRemediPopup(true); return; 
        }

        setIsSaving(true);
        const dataToSubmit = {
          action: "saveGrades", guru: user.name, kelas: activeAssignment.classId, mapel: activeAssignment.mapel,
          grades: students.map(student => ({ id: student.id, nama: student.name, ...grades[student.id] }))
        };

        try {
          await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dataToSubmit) });
          showToast('Selesai! Semua nilai berhasil disimpan.', 'success');
          setTimeout(() => { onUpdateSuccess(); }, 1500);
        } catch (error) { showToast('Gagal simpan. Cek internet!', 'error'); } finally { setIsSaving(false); }
      };

      const requestSwitchClass = (assignment) => {
        if (assignment.classId === activeAssignment.classId && assignment.mapel === activeAssignment.mapel) return;
        setSwitchIndex(Math.floor(Math.random() * SWITCH_CLASS_MSGS.length)); setTargetAssignment(assignment); setShowSwitchPopup(true);
      };

      const confirmSwitchClass = () => { setActiveAssignment(targetAssignment); setShowSwitchPopup(false); };

      const downloadDetailedGradesExcel = () => {
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const now = new Date(); const timeString = `${days[now.getDay()]} , ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} - Jam ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')} WIB`;

        const rowsData = [
          [`REKAP NILAI MATA PELAJARAN ${activeAssignment.mapel.toUpperCase()}`],
          [`Kelas: ${activeAssignment.classId}`],
          [`Guru Pengajar: ${user.name}`],
          [`Waktu Diunduh: ${timeString}`],
          [], 
          ["No", "ID Siswa", "Nama Siswa", ...GRADE_COLUMNS] 
        ];

        students.forEach((s, idx) => {
          const studentRow = [idx + 1, s.id, s.name];
          GRADE_COLUMNS.forEach(col => studentRow.push(grades[s.id]?.[col] || ""));
          rowsData.push(studentRow);
        });

        const ws = window.XLSX.utils.aoa_to_sheet(rowsData);
        ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 5 } }];
        ws['!cols'] = [{ wch: 4 }, { wch: 10 }, { wch: 20 }, ...GRADE_COLUMNS.map(() => ({ wch: 6 }))];

        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, "Rekap_Nilai");
        window.XLSX.writeFile(wb, `Laporan_Nilai_${activeAssignment.mapel}_Kls_${activeAssignment.classId}.xlsx`);
        showToast("Rekap Nilai berhasil diekspor!", "success");
      };

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col font-sans text-xs">
          <RemediPopup show={showRemediPopup} msgIndex={remediIndex} onClose={() => setShowRemediPopup(false)} />
          <SwitchPopup show={showSwitchPopup} msgIndex={switchIndex} onConfirm={confirmSwitchClass} onCancel={() => setShowSwitchPopup(false)} targetAssign={targetAssignment} />
          
          <header className="bg-indigo-600 text-white shadow-md sticky top-0 z-30">
            <div className="max-w-[1400px] mx-auto px-4 h-12 flex items-center justify-between">
              <div className="flex items-center space-x-2">
                <IconGraduationCap className="w-6 h-6 opacity-85" />
                <div><h1 className="font-black text-xs tracking-wide leading-tight">KELAS {activeAssignment.classId}</h1><p className="text-4xs text-indigo-200 font-medium">Mapel: {activeAssignment.mapel}</p></div>
              </div>
              <div className="flex items-center space-x-3">
                <div className="text-right hidden sm:block"><p className="text-2xs font-bold leading-tight">{user.name}</p><p className="text-3xs text-indigo-200 leading-tight">Sedang Bertugas</p></div>
                <button onClick={onLogout} className="p-1.5 bg-indigo-700 hover:bg-red-500 rounded-full transition-all duration-300 hover:scale-[1.05] active:scale-95 shadow-inner" title="Keluar"><IconLogOut className="w-4 h-4" /></button>
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-[1400px] mx-auto w-full p-2 sm:p-4 animate-in fade-in duration-300 overflow-x-hidden">
            
            <div className="bg-gradient-to-r from-indigo-500 via-purple-500 to-fuchsia-500 rounded-2xl p-4 mb-3 shadow-md relative overflow-hidden flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 hover:scale-[1.01] hover:shadow-lg transition-all duration-300">
              <div className="absolute top-0 left-0 w-full h-full bg-white opacity-5 pointer-events-none transform -skew-x-12 scale-150"></div>
              <div className="relative z-10 w-full sm:w-auto">
                <h2 className="text-white font-black text-sm mb-0.5 flex items-center gap-1.5"><IconActivity className="w-4 h-4"/> Progres Kerjamu</h2>
                <p className="text-indigo-100 font-medium text-[10px]">Ayo lengkapi nilainya biar cepat kelar bos!</p>
              </div>
              <div className="relative z-10 w-full sm:w-1/3 min-w-[200px] bg-white/10 p-2 rounded-xl border border-white/20 backdrop-blur-sm shadow-inner">
                <div className="flex justify-between text-white mb-1.5 font-bold text-[10px]"><span>Total Pengisian</span><span>{teacherProgress.globalPct}%</span></div>
                <div className="w-full bg-black/20 rounded-full h-1.5"><div className="bg-white h-1.5 rounded-full shadow-[0_0_8px_rgba(255,255,255,0.8)] transition-all duration-1000 ease-out" style={{ width: `${teacherProgress.globalPct}%` }}></div></div>
              </div>
            </div>

            <div className="mb-3">
              <p className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Kapsul Pindah Kelas:</p>
              <div className="flex overflow-x-auto gap-1.5 pb-1.5 scrollbar-hide snap-x">
                {teacherProgress.assignmentsProgress.map((assign, idx) => {
                  const isActive = assign.classId === activeAssignment.classId && assign.mapel === activeAssignment.mapel;
                  return (
                    <button key={idx} onClick={() => requestSwitchClass(assign)} className={`flex-shrink-0 flex items-center gap-2 px-2.5 py-1.5 rounded-xl border transition-all duration-300 hover:scale-[1.05] active:scale-95 snap-start ${isActive ? 'bg-indigo-600 border-indigo-700 text-white shadow-md' : 'bg-white border-slate-200 text-slate-600 hover:bg-indigo-50 shadow-sm'}`}>
                      <div className="text-left"><span className={`block text-[11px] font-black ${isActive?'text-white':'text-slate-800'}`}>{assign.mapel}</span><span className={`block text-[9px] font-bold uppercase tracking-wider ${isActive?'text-indigo-200':'text-slate-400'}`}>Kls {assign.classId}</span></div>
                      <div className={`text-[10px] font-black px-1.5 py-0.5 rounded-lg shadow-inner ${isActive ? 'bg-white/20 text-white border border-white/30' : assign.pct===100?'bg-emerald-100 text-emerald-700':'bg-slate-100 text-slate-500'}`}>{assign.pct}%</div>
                    </button>
                  );
                })}
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
              <div className="p-3 border-b border-slate-100 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-3 bg-gradient-to-r from-slate-50 to-white">
                <div>
                   <h2 className="text-xs font-black text-indigo-900 flex items-center uppercase tracking-wide"><IconFileText className="w-3.5 h-3.5 mr-1 text-indigo-500"/> Kelas {activeAssignment.classId} - {activeAssignment.mapel}</h2>
                   <p className="text-[9px] text-slate-500 mt-0.5 font-semibold">Tersimpan: <strong>{students.length} Siswa</strong>. Tips: Bisa <strong>Paste (Ctrl+V)</strong> dari Excel lho!</p>
                </div>
                
                <div className="grid grid-cols-2 sm:flex sm:flex-row items-center gap-1.5 w-full lg:w-auto">
                   <button onClick={downloadGradeTemplate} className="flex items-center justify-center space-x-1 text-[10px] font-black uppercase tracking-wider bg-amber-500 hover:bg-amber-600 active:scale-95 text-white px-2 py-2 rounded-lg transition-all shadow-sm hover:scale-105 hover:-translate-y-0.5 duration-300 w-full sm:w-auto">
                     <IconDownload className="w-3 h-3" /> <span>Template</span>
                   </button>
                   <button onClick={() => fileUploadRef.current.click()} className="flex items-center justify-center space-x-1 text-[10px] font-black uppercase tracking-wider bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white px-2 py-2 rounded-lg transition-all shadow-sm hover:scale-105 hover:-translate-y-0.5 duration-300 w-full sm:w-auto">
                     <IconUploadCloud className="w-3 h-3" /> <span>Upload</span>
                   </button>
                   <input type="file" accept=".xls,.xlsx" ref={fileUploadRef} onChange={handleUploadExcelGrades} className="hidden" />
                   <button onClick={downloadDetailedGradesExcel} className="flex items-center justify-center space-x-1 text-[10px] font-black uppercase tracking-wider bg-fuchsia-600 hover:bg-fuchsia-700 active:scale-95 text-white px-2 py-2 rounded-lg transition-all shadow-sm hover:scale-105 hover:-translate-y-0.5 duration-300 w-full sm:w-auto">
                     <IconFileText className="w-3 h-3" /> <span>Unduh Nilai</span>
                   </button>
                   <button onClick={handleSaveToSpreadsheet} disabled={isSaving || students.length === 0} className="flex items-center justify-center space-x-1 text-[10px] font-black uppercase tracking-wider bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white px-2 py-2 rounded-lg transition-all shadow-md shadow-indigo-600/20 disabled:opacity-50 hover:scale-105 hover:-translate-y-0.5 duration-300 w-full sm:w-auto">
                     {isSaving ? <span className="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></span> : <IconSave className="w-3 h-3" />}
                     <span>Kirim Nilai</span>
                   </button>
                </div>
              </div>

              <div className="p-2 sm:p-3 overflow-hidden bg-white">
                <div className="overflow-x-auto rounded-lg border border-slate-200 shadow-inner relative max-w-full">
                  <table className="w-full text-xs text-left text-slate-600 whitespace-nowrap">
                    <thead className="text-[10px] text-slate-500 bg-slate-100 border-b border-slate-200 font-extrabold sticky top-0 z-20 uppercase tracking-wider">
                      <tr>
                        <th className="px-1.5 py-2 text-center sticky left-0 bg-slate-100 z-20 shadow-[1px_0_0_0_#e2e8f0]">No</th>
                        <th className="px-2 py-2 min-w-[120px] max-w-[140px] sticky left-[30px] bg-slate-100 z-20 shadow-[1px_0_0_0_#e2e8f0] truncate">Nama Siswa</th>
                        {GRADE_COLUMNS.map(col => <th key={col} className="px-0.5 py-2 text-center min-w-[40px]">{col}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {students.length === 0 ? (
                        <tr><td colSpan={GRADE_COLUMNS.length + 2} className="text-center py-4 font-bold text-slate-400 text-[11px]">Siswa kosong. Info Admin ya!</td></tr>
                      ) : students.map((student, rowIdx) => (
                        <tr key={student.id} className="bg-white border-b border-slate-100 last:border-0 hover:bg-indigo-50/40 transition-colors group">
                          <td className="px-1.5 py-1 font-black text-slate-400 text-center sticky left-0 bg-white group-hover:bg-indigo-50 shadow-[1px_0_0_0_#e2e8f0] z-10 text-[10px]">{rowIdx + 1}</td>
                          <td className="px-2 py-1 font-bold text-slate-800 sticky left-[30px] bg-white group-hover:bg-indigo-50 shadow-[1px_0_0_0_#e2e8f0] z-10 truncate max-w-[140px] text-[11px] leading-tight">{student.name}</td>
                          {GRADE_COLUMNS.map((col, colIdx) => {
                            const val = grades[student.id]?.[col];
                            const isRemedi = val !== '' && Number(val) < 70;
                            const isSuccess = val !== '' && Number(val) >= 70;
                            return (
                              <td key={col} className="px-0.5 py-1">
                                <input type="number" min="0" max="100" placeholder="-" value={val || ''} 
                                  onChange={(e) => handleGradeChange(student.id, col, e.target.value)} onPaste={(e) => handlePaste(e, rowIdx, colIdx)}
                                  className={`w-10 text-center rounded-md border h-8 focus:outline-none focus:ring-1 focus:ring-indigo-300 transition-all font-black text-[11px] hover:-translate-y-0.5 hover:shadow-sm duration-300
                                    ${isRemedi ? 'border-rose-400 bg-rose-50 text-rose-900 focus:bg-white' : isSuccess ? 'border-emerald-400 bg-emerald-50 text-emerald-900 focus:bg-white' : 'border-slate-300 text-slate-900 hover:border-indigo-400 focus:bg-indigo-50/20'}
                                  `} 
                                />
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </main>

          {toast && toast.show && (
            <div className="fixed bottom-4 right-4 z-50 animate-in slide-in-from-bottom-2">
              <div className={`rounded-xl shadow-lg px-4 py-2.5 flex items-center space-x-2 text-white font-bold ${toast.type === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`}>
                {toast.type === 'success' ? <IconCheckCircle className="w-4 h-4" /> : <IconAlertCircle className="w-4 h-4" />}
                <span className="text-xs">{toast.message}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
